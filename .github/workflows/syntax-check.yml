---
name: Playbook syntax check

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  syntax-check:
    name: syntax-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: pip install ansible-core

      - name: Install dependencies
        run: |
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy role install -r requirements.yml

      - name: Syntax check all playbooks
        env:
          # Playbooks requiring subscription-only collections (redhat.rhel_system_roles)
          SKIP_PLAYBOOKS: |
            playbooks/rhel/rhsm-system-register.yml
            playbooks/openshift_virtualization/aap-25-vm/2-register-to-rhsm.yml
        run: |
          failed=0
          for playbook in $(find playbooks -name '*.yml' -o -name '*.yaml' | sort); do
            if echo "${SKIP_PLAYBOOKS}" | grep -qx "${playbook}"; then
              echo "Skipping ${playbook} (requires subscription-only collection)"
              continue
            fi
            echo "Checking ${playbook}..."
            if ! ansible-playbook --syntax-check "${playbook}"; then
              failed=1
            fi
          done
          exit "${failed}"
