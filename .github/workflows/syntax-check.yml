---
name: Playbook syntax check

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  syntax-check:
    name: syntax-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install ansible-core
        run: pip install ansible-core

      - name: Install dependencies
        run: |
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy role install -r requirements.yml

      - name: Syntax check all playbooks
        env:
          # Files under playbooks/ that ansible-playbook --syntax-check cannot parse:
          #  - ansible-navigator.yml: navigator config, not a playbook (top-level dict)
          #  - rhsm-system-register / 2-register-to-rhsm: subscription-only collections
          SKIP_PLAYBOOKS: |
            playbooks/aap/ansible-navigator.yml
            playbooks/rhel/rhsm-system-register.yml
            playbooks/openshift_virtualization/aap-25-vm/2-register-to-rhsm.yml
        run: |
          # Exclude non-playbook YAML: task-include sidecars (_*.yml), any
          # tasks/ subdirectory (Ansible convention), transport/ task-include
          # sidecars (e.g. playbooks/armbian/transport/*), and files/ data dirs
          # (e.g. cloud-init user-data shipped via ansible.builtin.copy).
          failed=0
          for playbook in $(find playbooks \
              \( -path '*/tasks/*' -o -path '*/transport/*' -o -path '*/files/*' -o -name '_*' \) -prune \
              -o \( -name '*.yml' -o -name '*.yaml' \) -print | sort); do
            if echo "${SKIP_PLAYBOOKS}" | grep -qx "${playbook}"; then
              echo "Skipping ${playbook} (requires subscription-only collection)"
              continue
            fi
            echo "Checking ${playbook}..."
            if ! ansible-playbook --syntax-check "${playbook}"; then
              failed=1
            fi
          done
          exit "${failed}"
