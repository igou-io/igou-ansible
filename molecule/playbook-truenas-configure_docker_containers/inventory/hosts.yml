---
all:
  children:
    # The instance sits in BOTH groups: `molecule` (what the provisioner
    # create/destroy plays and this scenario's prepare/verify target) and
    # `truenas` (what every play in the imported playbook matches). The
    # scenario's group_vars/truenas.yml supplies the container fixture the
    # real igou-inventory group_vars/truenas.yml would.
    molecule:
      hosts:
        truenas-mock:
          mp:
            podman: {}
            docker: {}
    truenas:
      hosts:
        truenas-mock: {}
