---
# Run the real system-update playbook against the molecule containers.
# ansible_limit must come in as a play-parse-time var (group_vars are too
# late to template `hosts:`), and update_reboot stays off — containers
# can't reboot.
- name: Converge
  ansible.builtin.import_playbook: ../../playbooks/system-update.yaml
  vars:
    ansible_limit: all  # noqa: var-naming[read-only] — repo-wide AAP targeting convention
    update_reboot: false
