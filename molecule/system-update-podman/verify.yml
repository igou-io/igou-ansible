---
# Assert the update actually converged: a check-mode "upgrade everything"
# must report no changes.
- name: Verify
  hosts: all
  gather_facts: true
  tasks:

    - name: Simulate dist-upgrade (Debian family)
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true
      check_mode: true
      register: apt_sim
      when: ansible_facts.os_family == 'Debian'

    - name: Assert no packages left to upgrade (Debian family)
      ansible.builtin.assert:
        that: apt_sim is not changed
      when: ansible_facts.os_family == 'Debian'

    - name: Simulate full update (RedHat family)
      ansible.builtin.dnf:
        name: "*"
        state: latest  # noqa: package-latest — check-mode probe for pending updates
      check_mode: true
      register: dnf_sim
      when: ansible_facts.os_family == 'RedHat'

    - name: Assert no packages left to update (RedHat family)
      ansible.builtin.assert:
        that: dnf_sim is not changed
      when: ansible_facts.os_family == 'RedHat'
