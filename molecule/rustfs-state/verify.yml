---
# Verify, in order:
#   1. the role repairs the drift side_effect.yml injected — asserting the
#      EXACT change set — and server-side state is independently confirmed
#      (podman exec into the server container: buckets are directories in
#      /data);
#   2. a follow-up run is clean;
#   3. drift-detection mode (the nightly AAP job's mode) reports pending
#      changes, FAILS, and mutates nothing;
#   4. a real converge then applies exactly those changes (bucket create +
#      versioning enable);
#   5. the versioning suspend branch converges;
#   6. a spec'd-out resource is REPORTED as unmanaged, never deleted;
#   7. dead credentials fail the play (liveness path).
- name: Verify
  hosts: localhost
  gather_facts: false
  vars_files:
    - files/vars.yml
  vars:
    _probe_versioned:
      name: drift-probe
      versioning: true
    _probe_suspended:
      name: drift-probe
      versioning: false
    _spec_with_probe:
      - "{{ rustfs_state_molecule_instance
            | combine({'buckets': rustfs_state_molecule_instance.buckets + [_probe_versioned]}) }}"
    _spec_with_probe_suspended:
      - "{{ rustfs_state_molecule_instance
            | combine({'buckets': rustfs_state_molecule_instance.buckets + [_probe_suspended]}) }}"
  tasks:
    # ---- 1. repair injected drift, assert the exact change set ----
    - name: Re-converge over injected drift
      ansible.builtin.include_role:
        name: rustfs_state

    - name: Assert all four drifts were caught and repaired (exact set)
      ansible.builtin.assert:
        that:
          - rustfs_state_changes | sort == [
              'molecule:bucket:app-backups:lifecycle:import',
              'molecule:bucket:app-backups:versioning:enable',
              'molecule:policy:app-rw:update',
              'molecule:user:app-user:attach:app-rw',
              'molecule:user:app-user:create',
            ] | sort
          - rustfs_state_liveness_failures | length == 0
        fail_msg: "unexpected change set: {{ rustfs_state_changes }}"

    - name: Read server-side bucket directories
      ansible.builtin.command: podman exec molecule-rustfs ls /data
      register: _server_buckets
      changed_when: false

    - name: Assert managed buckets exist server-side (independent of role bookkeeping)
      ansible.builtin.assert:
        that:
          - "'app-data' in _server_buckets.stdout_lines"
          - "'app-backups' in _server_buckets.stdout_lines"
          - "'drift-probe' not in _server_buckets.stdout_lines"

    # ---- 2. clean follow-up run ----
    - name: Converge again (must be clean)
      ansible.builtin.include_role:
        name: rustfs_state

    - name: Assert the follow-up run found nothing to do
      ansible.builtin.assert:
        that:
          - rustfs_state_changes | length == 0
          - rustfs_state_unmanaged | length == 0
          - rustfs_state_liveness_failures | length == 0
        fail_msg: >-
          not clean after repair: changes={{ rustfs_state_changes }}
          unmanaged={{ rustfs_state_unmanaged }}

    # ---- 3. drift-detection mode: reports, fails, mutates nothing ----
    # check_mode on the include propagates to the role's tasks; the
    # explicit fail_on_drift stands in for ansible_check_mode, which only
    # reflects a play-level --check.
    - name: Drift-detection mode must fail on pending changes without applying them
      block:
        # check_mode is not a valid keyword on include_role itself; a
        # wrapping block propagates it to the included tasks.
        - name: Run role in check mode against a spec with an extra bucket
          check_mode: true
          vars:
            rustfs_state_instances: "{{ _spec_with_probe }}"
            rustfs_state_fail_on_drift: true
          block:
            - name: Include role under check mode
              ansible.builtin.include_role:
                name: rustfs_state

        - name: Unreachable — drift detection must have failed above
          ansible.builtin.fail:
            msg: drift-detection mode passed despite pending changes
      rescue:
        - name: Assert the failure was the drift assert, with the exact pending set
          ansible.builtin.assert:
            that:
              - rustfs_state_changes | sort == [
                  'molecule:bucket:drift-probe:create',
                  'molecule:bucket:drift-probe:versioning:enable',
                ] | sort
            fail_msg: "unexpected drift report: {{ rustfs_state_changes }}"

    - name: Re-read server-side bucket directories
      ansible.builtin.command: podman exec molecule-rustfs ls /data
      register: _server_buckets_after_check
      changed_when: false

    - name: Assert check mode created nothing server-side
      ansible.builtin.assert:
        that: "'drift-probe' not in _server_buckets_after_check.stdout_lines"

    # ---- 4. real converge applies exactly the pending changes ----
    - name: Converge the probe spec for real
      ansible.builtin.include_role:
        name: rustfs_state
      vars:
        rustfs_state_instances: "{{ _spec_with_probe }}"

    - name: Assert exactly the probe changes were applied
      ansible.builtin.assert:
        that:
          - rustfs_state_changes | sort == [
              'molecule:bucket:drift-probe:create',
              'molecule:bucket:drift-probe:versioning:enable',
            ] | sort
        fail_msg: "unexpected change set: {{ rustfs_state_changes }}"

    - name: Read server-side bucket directories after probe converge
      ansible.builtin.command: podman exec molecule-rustfs ls /data
      register: _server_buckets_probe
      changed_when: false

    - name: Assert the probe bucket exists server-side
      ansible.builtin.assert:
        that: "'drift-probe' in _server_buckets_probe.stdout_lines"

    # ---- 5. versioning suspend branch ----
    - name: Converge with the probe bucket set to versioning false
      ansible.builtin.include_role:
        name: rustfs_state
      vars:
        rustfs_state_instances: "{{ _spec_with_probe_suspended }}"

    - name: Assert the suspend branch converged (exact set)
      ansible.builtin.assert:
        that:
          - rustfs_state_changes == ['molecule:bucket:drift-probe:versioning:suspend']
        fail_msg: "unexpected change set: {{ rustfs_state_changes }}"

    # ---- 6. unmanaged reporting (deletion safety, positive path) ----
    - name: Converge the original spec (probe bucket now unmanaged)
      ansible.builtin.include_role:
        name: rustfs_state

    - name: Assert the probe bucket is reported unmanaged and untouched
      ansible.builtin.assert:
        that:
          - rustfs_state_changes | length == 0
          - "'molecule:bucket:drift-probe' in rustfs_state_unmanaged"
        fail_msg: >-
          unmanaged reporting broken: changes={{ rustfs_state_changes }}
          unmanaged={{ rustfs_state_unmanaged }}

    - name: Read server-side bucket directories after unmanaged run
      ansible.builtin.command: podman exec molecule-rustfs ls /data
      register: _server_buckets_final
      changed_when: false

    - name: Assert the unmanaged bucket was not deleted
      ansible.builtin.assert:
        that: "'drift-probe' in _server_buckets_final.stdout_lines"

    # ---- 7. liveness failure path ----
    - name: Liveness failure path — wrong provided secret must fail the play
      block:
        - name: Run role with a bad user secret
          ansible.builtin.include_role:
            name: rustfs_state
          vars:
            rustfs_state_instances:
              - name: molecule-bad
                endpoint: "{{ rustfs_state_molecule_endpoint }}"
                admin_access_key: "{{ rustfs_state_molecule_admin_access_key }}"
                admin_secret_key: "{{ rustfs_state_molecule_admin_secret_key }}"
                users:
                  - name: app-user
                    policies:
                      - app-rw
                    secret_key: definitely-not-the-secret
                    liveness_bucket: app-data

        - name: Unreachable — the role must have failed above
          ansible.builtin.fail:
            msg: liveness check passed with a wrong secret
      rescue:
        - name: Assert the failure was the liveness assert
          ansible.builtin.assert:
            that:
              - "'molecule-bad:app-user' in rustfs_state_liveness_failures"
            fail_msg: "role failed for an unexpected reason: {{ ansible_failed_result | default({}) }}"
