---
# rustfs_state role test: converge a throwaway RustFS server from empty,
# prove idempotence, inject drift, prove re-converge fixes it, and prove
# the credential-liveness failure path. Requires podman.
prerun: false

dependency:
  name: galaxy
  options:
    ignore_errors: true

driver:
  name: default
  options:
    managed: false

platforms:
  - name: localhost

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/roles
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
            ansible_python_interpreter: "{{ ansible_playbook_python }}"

scenario:
  name: rustfs-state
  test_sequence:
    - destroy
    - syntax
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - destroy
