---
# Shared desired state for the rustfs-state scenario. Mirrors the live
# schema shapes: one custom policy, one plain bucket, one versioned bucket
# with tag-keyed lifecycle rules, one user with attachment + liveness.
rustfs_molecule_endpoint: http://127.0.0.1:9100
rustfs_molecule_admin_access_key: molecule-admin
rustfs_molecule_admin_secret_key: molecule-admin-secret-key
rustfs_molecule_user_secret_key: molecule-user-secret-key

rustfs_instances:
  - name: molecule
    endpoint: "{{ rustfs_molecule_endpoint }}"
    admin_access_key: "{{ rustfs_molecule_admin_access_key }}"
    admin_secret_key: "{{ rustfs_molecule_admin_secret_key }}"

    policies:
      - name: app-rw
        document:
          ID: ""
          Version: "2012-10-17"
          Statement:
            - Sid: ListAndDescribeBucket
              Effect: Allow
              Condition: {}
              Action:
                - s3:ListBucket
                - s3:GetBucketLocation
                - s3:ListBucketMultipartUploads
              Resource:
                - arn:aws:s3:::app-data
            - Sid: ReadWriteDeleteObjects
              Effect: Allow
              Condition: {}
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
                - s3:AbortMultipartUpload
                - s3:ListMultipartUploadParts
              Resource:
                - arn:aws:s3:::app-data/*

    buckets:
      - name: app-data
        versioning: false
      - name: app-backups
        versioning: true
        lifecycle:
          # `rc ilm rule import` requires an id on every rule; comparison
          # ignores id differences (server may regenerate them).
          rules:
            - id: 11111111-1111-1111-1111-111111111111
              status: Enabled
              prefix: backups/
              tags:
                tier: daily
              noncurrentVersionExpiration:
                noncurrentDays: 14
            - id: 22222222-2222-2222-2222-222222222222
              status: Enabled
              prefix: backups/
              noncurrentVersionExpiration:
                noncurrentDays: 90

    users:
      - name: app-user
        policies:
          - app-rw
        secret_key: "{{ rustfs_molecule_user_secret_key }}"
        liveness_bucket: app-data
