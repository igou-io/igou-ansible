---
all:
  children:
    molecule:
      hosts:
        ghapp-devenv:
          mp:
            kubevirt:
              boot_source:
                type: container_disk
                image: quay.io/containerdisks/centos-stream:10
              ssh_user: cloud-user
              cpu:
                cores: 2
              memory: 4Gi
              # Burst placement: pin to casval like the devenv/hermes provision
              # playbooks. The machine-type/architecture pin matches the burst
              # MachineSet capacity labels (see playbooks/devenv/provision-vm.yml).
              node_selector:
                node-role.kubernetes.io/burst: ""
              tolerations:
                - key: workload
                  operator: Equal
                  value: burst
                  effect: NoSchedule
              vm_overrides:
                spec:
                  template:
                    spec:
                      architecture: amd64
                      domain:
                        machine:
                          type: pc-q35-rhel9.6.0
        ghapp-hermes:
          mp:
            kubevirt:
              boot_source:
                type: container_disk
                image: quay.io/containerdisks/centos-stream:10
              ssh_user: cloud-user
              cpu:
                cores: 2
              memory: 4Gi
              node_selector:
                node-role.kubernetes.io/burst: ""
              tolerations:
                - key: workload
                  operator: Equal
                  value: burst
                  effect: NoSchedule
              vm_overrides:
                spec:
                  template:
                    spec:
                      architecture: amd64
                      domain:
                        machine:
                          type: pc-q35-rhel9.6.0
