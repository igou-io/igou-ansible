---
# Health verification of the deployed devenv host. bootstrap.yml now runs the
# igou-devenv devcontainer NATIVELY (`devcontainer up`, host-network + privileged)
# under a systemd unit — there is no standalone code-server container anymore.
# This verify asserts: docker up + the scratch disk backs /var/lib/docker; the
# legacy standalone container is gone; the igou-devenv devcontainer is running and
# serving code-server on :8080 with auth ENFORCED (login page served, forged
# cookie bounced); the igou-devenv.service unit is enabled + active; the
# in-container test suite passes; code-server is reachable from OUTSIDE the
# cluster via the NodePort; the systemd unit cleanly cycles the container on
# restart/stop/start; and core health + the devcontainer's systemd autostart both
# survive a VM reboot.

- name: Verify the devenv host deployment health
  hosts: devenv-devenv
  gather_facts: false
  vars:
    # Login-page markers observed in the live code-server response. code-server
    # 302-redirects an unauthenticated GET / to ./login; uri follows it (default
    # follow_redirects: safe) and returns the login HTML, which carries the
    # <title>code-server login</title> and a password <input name="password">.
    # Asserting these (not just the substring 'code-server', which the
    # authenticated workbench also contains) proves auth is actually enforced.
    cs_login_title: code-server login
    cs_password_input: name="password"
  tasks:
    - name: Collect service facts
      ansible.builtin.service_facts:
      become: true

    - name: Assert the docker daemon is running
      ansible.builtin.assert:
        that:
          - ansible_facts.services['docker.service'].state == 'running'
        fail_msg: docker.service is not running

    # --- firewalld declarations (#399 ports, #408 TFTP-reply rule) ----------
    # prepare.yml installed and enabled firewalld to mirror the kickstarted
    # physical devhost; converge must have declared the ports/rules on top.
    # The NodePort play below is the end-to-end proof for 8080; here we assert
    # the runtime AND permanent config (the latter is what a reboot reloads).
    - name: Assert firewalld is running (prepare enabled it)
      ansible.builtin.assert:
        that:
          - ansible_facts.services['firewalld.service'].state == 'running'
        fail_msg: >-
          firewalld.service is not running — the bootstrap firewalld tasks
          were gated off and this scenario verified nothing (#399/#408)

    - name: List the firewalld ports and rich rules (runtime + permanent)
      ansible.builtin.command:
        cmd: "firewall-cmd {{ item }}"
      become: true
      register: __fw_lists
      changed_when: false
      loop:
        - --list-ports
        - --list-rich-rules
        - --permanent --list-ports
        - --permanent --list-rich-rules

    - name: Assert the devenv service ports are open, runtime and permanent (#399)
      ansible.builtin.assert:
        that:
          - "'8080/tcp' in __fw_lists.results[0].stdout"
          - "'9100/tcp' in __fw_lists.results[0].stdout"
          - "'8080/tcp' in __fw_lists.results[2].stdout"
          - "'9100/tcp' in __fw_lists.results[2].stdout"
        fail_msg: >-
          code-server/node_exporter ports missing from firewalld:
          runtime [{{ __fw_lists.results[0].stdout }}],
          permanent [{{ __fw_lists.results[2].stdout }}]

    - name: Assert the TFTP-reply accept rules are present, runtime and permanent (#408)
      ansible.builtin.assert:
        that:
          - __fw_lists.results[1].stdout is search('source address="' ~ item ~ '/32"')
          - __fw_lists.results[3].stdout is search('source address="' ~ item ~ '/32"')
        fail_msg: >-
          TFTP-reply rich rule for {{ item }} missing:
          runtime [{{ __fw_lists.results[1].stdout }}],
          permanent [{{ __fw_lists.results[3].stdout }}]
      loop:
        - 10.10.9.1
        - 10.10.45.1

    - name: Assert the docker scratch disk is what backs /var/lib/docker
      ansible.builtin.command:
        cmd: findmnt -n -o SOURCE /var/lib/docker
      register: __docker_mount
      changed_when: false
      failed_when: __docker_mount.rc != 0

    # bootstrap.yml removes the pre-devcontainer standalone container; assert it
    # is actually gone so a stale one can't mask the native devcontainer on :8080.
    - name: Inspect the legacy standalone code-server container
      community.docker.docker_container_info:
        name: igou-devenv-code-server
      become: true
      register: __legacy_cs

    - name: Assert the legacy standalone code-server container is absent
      ansible.builtin.assert:
        that:
          - not __legacy_cs.exists
        fail_msg: >-
          the legacy igou-devenv-code-server container still exists — bootstrap
          should have removed it in favor of the native devcontainer

    - name: Inspect the igou-devenv devcontainer
      community.docker.docker_container_info:
        name: igou-devenv
      become: true
      register: __devcontainer

    - name: Assert the igou-devenv devcontainer is running
      ansible.builtin.assert:
        that:
          - __devcontainer.exists
          - __devcontainer.container.State.Running
          - not __devcontainer.container.State.Restarting
        fail_msg: the igou-devenv devcontainer is not running

    # The autostart unit (#380) — its presence + enabled + active state is what
    # makes the reboot resilience play below meaningful; assert it up front.
    # noqa command-instead-of-module: systemd_service requires an action
    # (required_one_of state/enabled/...), so it can't do a pure status query;
    # `systemctl show --value` returns exactly the two property values to assert.
    - name: Read the igou-devenv.service enabled + active state  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: systemctl show igou-devenv.service --property=UnitFileState,ActiveState --value
      register: __unit_state
      changed_when: false

    - name: Assert the igou-devenv.service unit is enabled and active
      ansible.builtin.assert:
        that:
          - "'enabled' in __unit_state.stdout_lines"
          - "'active' in __unit_state.stdout_lines"
        fail_msg: >-
          igou-devenv.service is not enabled+active
          (UnitFileState/ActiveState = {{ __unit_state.stdout_lines }})

    - name: Probe code-server over HTTPS (self-signed) until it answers
      ansible.builtin.uri:
        url: https://localhost:8080/
        validate_certs: false
        return_content: true
      register: __cs_http
      retries: 12
      delay: 5
      until: __cs_http.status == 200

    - name: Assert the unauthenticated response is the code-server LOGIN page
      ansible.builtin.assert:
        that:
          - cs_login_title in __cs_http.content
          - cs_password_input in __cs_http.content
        fail_msg: >-
          port 8080 answered but did not serve the code-server login page —
          authentication does not look enforced

    # A forged session cookie must NOT be accepted: code-server bounces it back
    # to the login page rather than serving the workbench. We assert the login
    # marker is present (equivalently: the workbench was NOT served) without ever
    # learning the real password — the point is only that auth is enforced.
    - name: Probe code-server with a forged session cookie
      ansible.builtin.uri:
        url: https://localhost:8080/
        validate_certs: false
        return_content: true
        headers:
          Cookie: code-server-session=forged-not-a-real-token
      register: __cs_forged

    - name: Assert the forged cookie is bounced to the login page
      ansible.builtin.assert:
        that:
          - cs_password_input in __cs_forged.content
        fail_msg: >-
          a forged session cookie was not sent to the login page — code-server
          is serving the workbench without valid credentials

    - name: Check the devcontainer CLI is installed for the login user
      ansible.builtin.command:
        cmd: ~/.local/bin/devcontainer --version
      register: __devcontainer_cli
      changed_when: false

    - name: Check the igou-devenv repo clone
      ansible.builtin.stat:
        path: "{{ ansible_user_dir | default('/home/igou') }}/igou-devenv/.git"
      register: __devenv_repo

    - name: Assert devcontainer prerequisites are in place
      ansible.builtin.assert:
        that:
          - __devcontainer_cli.rc == 0
          - __devenv_repo.stat.exists
          - __devenv_repo.stat.isdir
        fail_msg: devcontainer CLI or the igou-devenv clone is missing

# In-container acceptance: run the repo's OWN checks inside the running
# devcontainer (each make target docker-execs via `devcontainer exec`). The
# container is named igou-devenv (its runArgs --name). test-tools proves the
# toolchain baked into the published image; test-podman is the load-bearing one
# — pull/run/build with nested rootless podman, the exact primitive the
# --privileged / user-namespace host prereqs exist to enable. test-env / test-ssh
# (need 1Password) are out of scope; test-qemu / test-sandbox-primitives (need
# nested KVM) are not hard requirements here — test-qemu runs informational-only.
- name: Verify the devcontainer's own test suite passes in-container
  hosts: devenv-devenv
  gather_facts: true
  vars:
    devenv_dir: "{{ ansible_user_dir }}/igou-devenv"
    # make test-* shell out to `devcontainer exec`, which lives in ~/.local/bin;
    # a non-login Ansible SSH shell doesn't have it on PATH. Applied per task
    # (not play-level) so it isn't templated against the implicit fact-gathering
    # task, which runs before ansible_env/ansible_user_dir exist.
    devenv_path: "{{ ansible_user_dir }}/.local/bin:{{ ansible_env.PATH }}"
  tasks:
    - name: Inspect the devcontainer container
      community.docker.docker_container_info:
        name: igou-devenv
      become: true
      register: __devcontainer

    - name: Assert the devcontainer container is running
      ansible.builtin.assert:
        that:
          - __devcontainer.exists
          - __devcontainer.container.State.Running
          - not __devcontainer.container.State.Restarting
        fail_msg: the igou-devenv devcontainer is not running

    - name: Run the in-container tool suite (make test-tools)
      ansible.builtin.command:
        cmd: make test-tools
        chdir: "{{ devenv_dir }}"
      environment:
        PATH: "{{ devenv_path }}"
      register: __test_tools
      changed_when: false

    - name: Run the in-container nested-podman suite (make test-podman)
      ansible.builtin.command:
        cmd: make test-podman
        chdir: "{{ devenv_dir }}"
      environment:
        PATH: "{{ devenv_path }}"
      register: __test_podman
      changed_when: false

    - name: Run the in-container qemu suite (informational — kvm may be absent)
      ansible.builtin.command:
        cmd: make test-qemu
        chdir: "{{ devenv_dir }}"
      environment:
        PATH: "{{ devenv_path }}"
      register: __test_qemu
      changed_when: false
      failed_when: false

    - name: Report the informational qemu result
      ansible.builtin.debug:
        msg: >-
          make test-qemu rc={{ __test_qemu.rc }} (informational, non-fatal —
          nested KVM is not required by this scenario)

# External reachability: prove code-server is answering through the NodePort
# service converge created, from OUTSIDE the VM. Runs on the controller (which
# reaches cluster node InternalIPs directly — that is how molecule SSHes to the
# VM). The nodePort is cluster-allocated (converge pins nothing), so discover it
# and a node InternalIP from the API — the ansible-molecule SA can list both
# nodes and namespaced Services — then probe and re-assert the login page.
- name: Verify code-server is reachable from outside the cluster via NodePort
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    devenv_bootstrap_namespace: molecule
    devenv_bootstrap_cs_service: devenv-devenv-code-server
    cs_login_title: code-server login
    cs_password_input: name="password"
  tasks:
    - name: Look up the code-server NodePort service
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Service
        name: "{{ devenv_bootstrap_cs_service }}"
        namespace: "{{ devenv_bootstrap_namespace }}"
      register: __cs_svc

    - name: Assert the NodePort service exists with an allocated nodePort
      ansible.builtin.assert:
        that:
          - __cs_svc.resources | length == 1
          - (__cs_svc.resources[0].spec.ports[0].nodePort | default(0)) | int > 0
        fail_msg: the code-server NodePort service is missing or has no nodePort

    - name: Look up cluster nodes for an InternalIP
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
      register: __cs_nodes

    - name: Resolve the code-server nodePort and a reachable node InternalIP
      ansible.builtin.set_fact:
        __cs_nodeport: "{{ __cs_svc.resources[0].spec.ports[0].nodePort }}"
        __cs_node_ip: >-
          {{ (__cs_nodes.resources[0].status.addresses
              | selectattr('type', 'equalto', 'InternalIP')
              | map(attribute='address') | first) }}

    - name: Probe code-server over the NodePort until it answers
      ansible.builtin.uri:
        url: "https://{{ __cs_node_ip }}:{{ __cs_nodeport }}/"
        validate_certs: false
        return_content: true
      register: __cs_ext
      retries: 12
      delay: 5
      until: __cs_ext.status == 200

    - name: Assert the external NodePort probe lands on the login page
      ansible.builtin.assert:
        that:
          - cs_login_title in __cs_ext.content
          - cs_password_input in __cs_ext.content
        fail_msg: >-
          the code-server NodePort answered but did not serve the login page

# 1Password environment switching (OPTIONAL, gated) — exercise the container's
# use()/unuse() shell functions end-to-end against the `molecule` vault. With no
# MOLECULE_OP_* token this play is a single skip debug.
#
# Each check runs as ONE `bash -ic` script via `docker exec` (the same in-
# container exec pattern the make test-* plays use). `-i` is required: use() is
# an interactive-shell function defined by ~/.bashrc, which `docker exec` sources
# because BASH_ENV/-i pull it in. Every invocation is a FRESH shell — no state
# survives between tasks — so multi-step checks are each fully self-contained and
# exit nonzero on the first failed assertion. Scripts assert by EXIT CODE and
# file inspection and never echo a resolved secret (synthetic here, but the
# discipline is the point). NO_AUTO_TMUX=1 belt-and-suspenders the tmux
# auto-attach guard (already inert: it only fires when TERM_PROGRAM=vscode, which
# a docker exec shell is not).
#
# The registry check covers use()'s containers-auth.json flow: REGISTRY_HOST/
# _USERNAME/_PASSWORD are consumed (never exported as plain vars) into a temp
# auth dir — REGISTRY_AUTH_FILE points at its config.json (0600, docker-style
# "auths" schema shared by podman/buildah/skopeo) and DOCKER_CONFIG at the
# directory; unuse removes the dir and unsets both. The password is only ever
# prefix-checked through base64, never printed.
- name: Verify the container's 1Password environment switching (use/unuse)
  hosts: devenv-devenv
  gather_facts: false
  tasks:
    - name: Report that 1Password verification is skipped
      ansible.builtin.debug:
        msg: 1Password integration checks skipped (no token provided)
      when: not (devenv_bootstrap_op_enabled | bool)

    - name: Run the in-container use()/unuse() checks
      when: devenv_bootstrap_op_enabled | bool
      become: true
      block:
        - name: Auth smoke — op resolves a molecule-vault reference
          ansible.builtin.command:
            argv:
              - docker
              - exec
              - -e
              - NO_AUTO_TMUX=1
              - igou-devenv
              - bash
              - -ic
              - |
                op read op://molecule/use-simple/username >/dev/null \
                  || { echo "auth smoke: op read failed" >&2; exit 1; }
                echo "auth-smoke ok"
          register: __op_smoke
          changed_when: false

        - name: Simple env — values export, '='-bearing host is exact, plain untouched
          ansible.builtin.command:
            argv:
              - docker
              - exec
              - -e
              - NO_AUTO_TMUX=1
              - igou-devenv
              - bash
              - -ic
              - |
                fail() { echo "FAIL: $1" >&2; exit 1; }
                use molecule-simple || fail "use molecule-simple returned nonzero"
                [ -n "${TEST_USERNAME:-}" ] || fail "TEST_USERNAME empty"
                [ -n "${TEST_PASSWORD:-}" ] || fail "TEST_PASSWORD empty"
                [ "${TEST_HOST:-}" = 'https://use-simple.molecule.invalid:6443/?scope=admin&x=1' ] \
                  || fail "TEST_HOST does not match the exact '='-bearing value"
                [ "${TEST_PLAIN:-}" = 'plain-value-unchanged' ] || fail "TEST_PLAIN changed"
                [ "${OP_ENV:-}" = 'molecule-simple' ] || fail "OP_ENV != molecule-simple"
                echo "simple-env ok"
          register: __op_simple
          changed_when: false

        - name: Stacking and selective unuse — survivors, fallback, full clear
          ansible.builtin.command:
            argv:
              - docker
              - exec
              - -e
              - NO_AUTO_TMUX=1
              - igou-devenv
              - bash
              - -ic
              - |
                fail() { echo "FAIL: $1" >&2; exit 1; }
                use molecule-simple || fail "use molecule-simple"
                use molecule-registry || fail "use molecule-registry"
                unuse molecule-registry || fail "unuse molecule-registry"
                [ -n "${TEST_USERNAME:-}" ] || fail "simple vars did not survive selective unuse"
                [ -z "${REGISTRY_AUTH_FILE:-}" ] || fail "REGISTRY_AUTH_FILE survived unuse molecule-registry"
                [ -z "${DOCKER_CONFIG:-}" ] || fail "DOCKER_CONFIG survived unuse molecule-registry"
                [ "${OP_ENV:-}" = 'molecule-simple' ] || fail "OP_ENV did not fall back to molecule-simple"
                unuse || fail "unuse (all) returned nonzero"
                [ -z "${OP_ENV:-}" ] || fail "OP_ENV set after unuse all"
                [ -z "${OP_ENV_LIST:-}" ] || fail "OP_ENV_LIST set after unuse all"
                [ -z "${TEST_USERNAME:-}" ] || fail "TEST_USERNAME set after unuse all"
                echo "stack-unuse ok"
          register: __op_stack
          changed_when: false

        - name: KUBECONFIG_DATA — file 0600 with the decoded server, cleaned on unuse
          ansible.builtin.command:
            argv:
              - docker
              - exec
              - -e
              - NO_AUTO_TMUX=1
              - igou-devenv
              - bash
              - -ic
              - |
                fail() { echo "FAIL: $1" >&2; exit 1; }
                use molecule-kubeconfig || fail "use molecule-kubeconfig"
                [ -n "${KUBECONFIG:-}" ] || fail "KUBECONFIG not set"
                [ -f "$KUBECONFIG" ] || fail "kubeconfig file missing"
                m=$(stat -c %a "$KUBECONFIG"); [ "$m" = "600" ] || fail "kubeconfig mode $m != 600"
                grep -q 'use-kubeconfig.molecule.invalid' "$KUBECONFIG" \
                  || fail "decoded kubeconfig missing the expected server host"
                saved="$KUBECONFIG"
                unuse molecule-kubeconfig || fail "unuse molecule-kubeconfig"
                [ ! -e "$saved" ] || fail "temp kubeconfig not deleted by unuse"
                [ -z "${KUBECONFIG:-}" ] || fail "KUBECONFIG still set after unuse"
                echo "kubeconfig-data ok"
          register: __op_kubedata
          changed_when: false

        - name: TOKEN+HOST — rendered kubeconfig has host and insecure-skip-tls-verify
          ansible.builtin.command:
            argv:
              - docker
              - exec
              - -e
              - NO_AUTO_TMUX=1
              - igou-devenv
              - bash
              - -ic
              - |
                fail() { echo "FAIL: $1" >&2; exit 1; }
                use molecule-k8s-token || fail "use molecule-k8s-token"
                [ -n "${KUBECONFIG:-}" ] || fail "KUBECONFIG not set"
                [ -f "$KUBECONFIG" ] || fail "kubeconfig file missing"
                grep -q 'use-k8s-token.molecule.invalid' "$KUBECONFIG" \
                  || fail "rendered kubeconfig missing the token host"
                grep -q 'insecure-skip-tls-verify: true' "$KUBECONFIG" \
                  || fail "rendered kubeconfig missing insecure-skip-tls-verify: true"
                saved="$KUBECONFIG"
                unuse molecule-k8s-token || fail "unuse molecule-k8s-token"
                [ ! -e "$saved" ] || fail "temp kubeconfig not cleaned up by unuse"
                echo "k8s-token ok"
          register: __op_k8stoken
          changed_when: false

        - name: Registry — containers-auth.json written 0600, cleaned up on unuse
          ansible.builtin.command:
            argv:
              - docker
              - exec
              - -e
              - NO_AUTO_TMUX=1
              - igou-devenv
              - bash
              - -ic
              - |
                fail() { echo "FAIL: $1" >&2; exit 1; }
                use molecule-registry || fail "use molecule-registry"
                # REGISTRY_* inputs are consumed into the auth file, never
                # exported as plain vars.
                [ -z "${REGISTRY_HOST:-}" ] || fail "REGISTRY_HOST leaked as a plain export"
                [ -z "${REGISTRY_PASSWORD:-}" ] || fail "REGISTRY_PASSWORD leaked as a plain export"
                [ -n "${REGISTRY_AUTH_FILE:-}" ] || fail "REGISTRY_AUTH_FILE not set"
                [ -f "$REGISTRY_AUTH_FILE" ] || fail "auth file missing"
                m=$(stat -c %a "$REGISTRY_AUTH_FILE"); [ "$m" = "600" ] || fail "auth file mode $m != 600"
                [ "${DOCKER_CONFIG:-}" = "$(dirname "$REGISTRY_AUTH_FILE")" ] \
                  || fail "DOCKER_CONFIG is not the auth file's directory"
                auth=$(jq -er '.auths["registry.molecule.invalid"].auth' "$REGISTRY_AUTH_FILE") \
                  || fail "auths entry for registry.molecule.invalid missing"
                # Prefix-check the decoded user:pass only — never print it.
                case "$(printf '%s' "$auth" | base64 -d)" in
                  'molecule+testrobot:'*) : ;;
                  *) fail "decoded auth does not start with molecule+testrobot:" ;;
                esac
                saved_dir="$DOCKER_CONFIG"
                unuse molecule-registry || fail "unuse molecule-registry"
                [ ! -e "$saved_dir" ] || fail "auth dir not removed by unuse"
                [ -z "${REGISTRY_AUTH_FILE:-}" ] || fail "REGISTRY_AUTH_FILE survived unuse"
                [ -z "${DOCKER_CONFIG:-}" ] || fail "DOCKER_CONFIG survived unuse"
                echo "registry ok"
          register: __op_registry
          changed_when: false

        - name: Failure path — bad ref fails cleanly with no residue
          ansible.builtin.command:
            argv:
              - docker
              - exec
              - -e
              - NO_AUTO_TMUX=1
              - igou-devenv
              - bash
              - -ic
              - |
                fail() { echo "FAIL: $1" >&2; exit 1; }
                use molecule-bad && fail "use molecule-bad unexpectedly succeeded"
                env | grep -q '^_USE_KEYS_molecule_bad=' && fail "_USE_KEYS residue after failed use"
                [ "${OP_ENV:-}" != 'molecule-bad' ] || fail "OP_ENV wrongly set to molecule-bad"
                echo "failure-path ok"
          register: __op_badref
          changed_when: false

        - name: Summarize the 1Password checks
          ansible.builtin.debug:
            msg: >-
              1Password use()/unuse() checks passed: auth-smoke, simple-env,
              stack-unuse, kubeconfig-data, k8s-token, registry, failure-path.

# The devcontainer's systemd lifecycle: `systemctl restart igou-devenv` must
# cleanly cycle the container (ExecStop removes it — the repo's `make down` — then
# ExecStart's `devcontainer up` brings a fresh one back), `systemctl stop` must
# actually stop/remove it, and `systemctl start` must recreate it. The container
# is matched by the devcontainer CLI's local_folder label (same key ExecStop
# filters on). State that must survive lives on host bind mounts, so cycling the
# container is non-destructive; code-server comes back on :8080 each time.
- name: Verify the igou-devenv.service restart/stop/start lifecycle
  hosts: devenv-devenv
  gather_facts: false
  become: true
  vars:
    cs_login_title: code-server login
    devenv_bootstrap_label: label=devcontainer.local_folder=/home/igou/igou-devenv
  tasks:
    - name: Capture the devcontainer id before the restart
      ansible.builtin.command:
        cmd: docker ps -q --filter "{{ devenv_bootstrap_label }}"
      register: __cid_before
      changed_when: false

    - name: Assert a devcontainer is running before the restart
      ansible.builtin.assert:
        that:
          - __cid_before.stdout | length > 0
        fail_msg: no igou-devenv container was running before the restart test

    - name: Restart the unit (ExecStop down -> ExecStart up)
      ansible.builtin.systemd_service:
        name: igou-devenv.service
        state: restarted

    - name: Capture the devcontainer id after the restart
      ansible.builtin.command:
        cmd: docker ps -q --filter "{{ devenv_bootstrap_label }}"
      register: __cid_after
      changed_when: false

    - name: Assert the restart RECREATED the container (new id, still running)
      ansible.builtin.assert:
        that:
          - __cid_after.stdout | length > 0
          - __cid_after.stdout != __cid_before.stdout
        fail_msg: >-
          systemctl restart did not cycle the container (id unchanged) — ExecStop
          did not bring it down before ExecStart brought it back up

    - name: Probe code-server after the restart until it answers
      ansible.builtin.uri:
        url: https://localhost:8080/
        validate_certs: false
        return_content: true
      register: __cs_restart
      retries: 36
      delay: 5
      until: __cs_restart.status == 200

    - name: Assert code-server serves the login page after the restart
      ansible.builtin.assert:
        that:
          - cs_login_title in __cs_restart.content
        fail_msg: code-server did not return to the login page after the restart

    - name: Stop the unit (ExecStop = the repo's `make down`)
      ansible.builtin.systemd_service:
        name: igou-devenv.service
        state: stopped

    - name: Look for any container matching the label after stop
      ansible.builtin.command:
        cmd: docker ps -aq --filter "{{ devenv_bootstrap_label }}"
      register: __cid_stopped
      changed_when: false

    - name: Assert stop REMOVED the container (not merely left it running)
      ansible.builtin.assert:
        that:
          - __cid_stopped.stdout | length == 0
        fail_msg: >-
          systemctl stop left a container behind — ExecStop did not remove it

    - name: Start the unit again (ExecStart)
      ansible.builtin.systemd_service:
        name: igou-devenv.service
        state: started

    - name: Capture the devcontainer id after the start
      ansible.builtin.command:
        cmd: docker ps -q --filter "{{ devenv_bootstrap_label }}"
      register: __cid_restarted
      changed_when: false

    - name: Assert start brought a fresh container back up
      ansible.builtin.assert:
        that:
          - __cid_restarted.stdout | length > 0
        fail_msg: systemctl start did not bring the devcontainer back up

    - name: Probe code-server after the start until it answers
      ansible.builtin.uri:
        url: https://localhost:8080/
        validate_certs: false
        return_content: true
      register: __cs_started
      retries: 36
      delay: 5
      until: __cs_started.status == 200

    - name: Assert code-server serves the login page after the start
      ansible.builtin.assert:
        that:
          - cs_login_title in __cs_started.content
        fail_msg: code-server did not return to the login page after start

# Reboot resilience — LAST on purpose: a reboot is destructive and slow, so a
# failure here must not poison the results above. Reboot the KubeVirt VM, then
# re-assert the core health set survives AND that the devcontainer AUTO-RESTARTS
# via igou-devenv.service — the whole reason the unit exists. Unlike the
# pre-systemd design (devcontainer restart policy 'no', operator reran
# `make up-release`), no manual recovery step is needed now: systemd brings the
# container back on boot. We assert that reality: docker back up, the scratch
# disk still mounted (its fstab entry, written by prepare with state: mounted,
# persists), the unit active again, the container running, and code-server
# enforcing auth on :8080.
- name: Verify core health + devcontainer autostart survive a VM reboot
  hosts: devenv-devenv
  gather_facts: false
  become: true
  vars:
    cs_login_title: code-server login
    cs_password_input: name="password"
    devenv_bootstrap_label: label=devcontainer.local_folder=/home/igou/igou-devenv
  tasks:
    # The only mutating task in verify beyond the lifecycle play — reboot is
    # inherently a change, honestly reported as changed rather than masked.
    - name: Reboot the KubeVirt VM and wait for it to come back
      ansible.builtin.reboot:
        # Generous: this is a full KubeVirt VM boot, not a container restart.
        reboot_timeout: 600

    - name: Wait for docker to be running again after the reboot
      ansible.builtin.service_facts:
      register: __svc_post
      until: >-
        __svc_post.ansible_facts.services['docker.service'].state | default('')
        == 'running'
      retries: 12
      delay: 5

    - name: Assert the scratch disk is still mounted at /var/lib/docker
      ansible.builtin.command:
        cmd: findmnt -n -o SOURCE /var/lib/docker
      register: __docker_mount_post
      changed_when: false
      failed_when: __docker_mount_post.rc != 0

    # igou-devenv.service is a oneshot that runs `devcontainer up` on boot; give
    # it time to pull-through/relaunch and settle to active (exited).
    # noqa command-instead-of-module: polling ActiveState in an until loop —
    # systemd_service requires an action param and can't be used as a query.
    - name: Wait for igou-devenv.service to autostart the devcontainer  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: systemctl show igou-devenv.service --property=ActiveState --value
      register: __unit_post
      changed_when: false
      until: __unit_post.stdout == 'active'
      retries: 60
      delay: 5

    - name: Capture the devcontainer id after the reboot
      ansible.builtin.command:
        cmd: docker ps -q --filter "{{ devenv_bootstrap_label }}"
      register: __cid_post
      changed_when: false

    - name: Assert the devcontainer auto-restarted via systemd (no manual step)
      ansible.builtin.assert:
        that:
          - __cid_post.stdout | length > 0
        fail_msg: >-
          the igou-devenv devcontainer did not come back after reboot —
          igou-devenv.service should have autostarted it (`devcontainer up`)

    - name: Probe code-server over HTTPS after the reboot until it answers
      ansible.builtin.uri:
        url: https://localhost:8080/
        validate_certs: false
        return_content: true
      register: __cs_http_post
      retries: 36
      delay: 5
      until: __cs_http_post.status == 200

    - name: Assert code-server serves the login page after the reboot
      ansible.builtin.assert:
        that:
          - cs_login_title in __cs_http_post.content
          - cs_password_input in __cs_http_post.content
        fail_msg: code-server did not come back on the login page after reboot
