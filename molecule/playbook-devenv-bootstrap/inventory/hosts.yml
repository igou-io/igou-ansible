---
all:
  children:
    # bootstrap.yml targets the `devenv` inventory group (its hosts default is
    # `{{ ansible_limit | default('devenv') }}`), so the instance is placed in
    # BOTH groups: `molecule` (what the provisioner create/prepare/destroy
    # plays and this scenario's own converge/verify plays target by name) and
    # `devenv` (what the imported bootstrap play matches). The scenario's
    # group_vars/devenv.yml supplies the vars the real igou-inventory
    # group_vars/devenv/ would (e.g. the code-server password) — molecule does
    # NOT load that repo's inventory.
    devenv:
      hosts:
        devenv-devenv: {}
    # The production builder (vscode) is in armbian_builders as well as devenv;
    # bootstrap.yml's TFTP-reply firewalld rule (#408) gates on that
    # membership, so the instance mirrors it to exercise the rule.
    armbian_builders:
      hosts:
        devenv-devenv: {}
    molecule:
      hosts:
        # Named devenv-devenv on purpose: it is the kubevirt.core inventory
        # name of the production VM (namespace-vmname), matching how a real
        # devenv VM appears; the SSH/code-server NodePort selectors key on it.
        devenv-devenv:
          mp:
            kubevirt:
              # Boot from the SAME golden image production clones (the
              # centos-stream10 DataSource tracks its DataImportCron-managed
              # rolling PVC), so image drift between test and production is
              # impossible. Needs the ansible-molecule CDI grants from
              # igou-openshift#428. Size matches production's vm_root_size;
              # storage_class omitted -> cluster default, like production.
              boot_source:
                type: data_volume_source_ref
                source_ref:
                  name: centos-stream10
                  namespace: openshift-virtualization-os-images
                size: 30Gi
              # Log in as the same user the production cloud-init seeds; the
              # devhost packages role's user-level npm/@devcontainers/cli
              # steps run as the login user.
              ssh_user: igou
              cpu:
                cores: 4
              memory: 8Gi
              # Dedicated docker storage — formatted and mounted by prepare.yml.
              extra_disks:
                - name: docker-scratch
                  serial: docker
                  disk:
                    bus: virtio
              extra_volumes:
                - name: docker-scratch
                  emptyDisk:
                    capacity: 20Gi
              # Deliberately NOT pinned to the casval burst node (unlike the
              # production provision-vm.yml and role-ghapp-e2e): a transient 8Gi
              # test VM fits the tenant workers, and unpinned means the test
              # runs even when the burst node is scaled to zero. Copy the
              # node_selector/tolerations/machine-type block from role-ghapp-e2e's
              # inventory if burst placement is ever wanted here.
