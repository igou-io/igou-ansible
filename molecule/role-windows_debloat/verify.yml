---
# Verify = INDEPENDENT evidence the debloat actually happened — raw Appx/registry
# reads and on-disk checks, never a re-read of the role's own registers.
- name: Verify — independent evidence for windows_debloat
  hosts: windows
  gather_facts: false
  vars:
    # A representative sample of the default windows_debloat_remove_appx list —
    # if any of these still register (provisioned OR all-users), removal failed.
    windows_debloat_sample_appx:
      - Microsoft.BingNews
      - Microsoft.GamingApp
      - Microsoft.XboxGamingOverlay
      - Microsoft.ZuneMusic
      - MSTeams
  tasks:
    # Raw Appx state: search the provisioned image packages AND the all-users
    # installs for any sampled identity, independent of the role's shell output.
    - name: Read remaining Appx packages for the sampled identities (independent read)
      ansible.windows.win_shell: |
        $sample = @('{{ windows_debloat_sample_appx | join("', '") }}')
        $found = @()
        foreach ($name in $sample) {
          if (Get-AppxProvisionedPackage -Online | Where-Object DisplayName -eq $name) { $found += "provisioned:$name" }
          if (Get-AppxPackage -AllUsers -Name $name -ErrorAction SilentlyContinue) { $found += "alluser:$name" }
        }
        $found -join ', '
      register: _appx_remaining
      changed_when: false

    - name: Assert none of the sampled Appx packages remain
      ansible.builtin.assert:
        that:
          - _appx_remaining.stdout | trim | length == 0
        fail_msg: >-
          Sampled bloatware Appx packages still present: {{ _appx_remaining.stdout }}.
        success_msg: >-
          None of the sampled Appx identities remain
          ({{ windows_debloat_sample_appx | join(', ') }}).

    # Read the key consumer-content / telemetry registry values back directly.
    - name: Read the debloat registry values (independent read)
      ansible.windows.win_shell: |
        function Get-Val($path, $name) {
          try { (Get-ItemProperty -Path $path -Name $name -ErrorAction Stop).$name } catch { 'MISSING' }
        }
        "consumer=$(Get-Val 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\CloudContent' 'DisableWindowsConsumerFeatures')"
        "telemetry=$(Get-Val 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection' 'AllowTelemetry')"
        "suggestions=$(Get-Val 'HKCU:\Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager' 'SystemPaneSuggestionsEnabled')"
      register: _debloat_regvals
      changed_when: false

    - name: Assert the debloat registry values read back as set
      ansible.builtin.assert:
        that:
          - "'consumer=1' in _debloat_regvals.stdout_lines"
          - "'telemetry=0' in _debloat_regvals.stdout_lines"
          - "'suggestions=0' in _debloat_regvals.stdout_lines"
        fail_msg: >-
          Expected DisableWindowsConsumerFeatures=1, AllowTelemetry=0,
          SystemPaneSuggestionsEnabled=0. Got: {{ _debloat_regvals.stdout_lines }}.
        success_msg: >-
          Registry reads confirm DisableWindowsConsumerFeatures=1,
          AllowTelemetry=0, SystemPaneSuggestionsEnabled=0.

    # OneDrive.exe must be gone from both known install locations.
    - name: Read OneDrive.exe presence in both known locations (independent read)
      ansible.windows.win_shell: |
        $exes = @(
          "$env:LOCALAPPDATA\Microsoft\OneDrive\OneDrive.exe",
          "$env:ProgramFiles\Microsoft OneDrive\OneDrive.exe"
        )
        if ($exes | Where-Object { Test-Path $_ }) { 'present' } else { 'absent' }
      register: _onedrive_present
      changed_when: false

    - name: Assert OneDrive.exe is absent from both locations
      ansible.builtin.assert:
        that:
          - "'absent' in _onedrive_present.stdout"
        fail_msg: OneDrive.exe is still present in a known location after the uninstall pass.
        success_msg: OneDrive.exe is absent from both known locations.
