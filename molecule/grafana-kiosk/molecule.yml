---
# Grafana kiosk scenario: converges BOTH browser stacks (cog + chromium)
# inside guests capped at the Pi Zero 2 W's 512MB, then smoke-tests real
# browser rendering inside that memory envelope.
#
# Provisioning is delegated to david_igou.molecule_provisioners
# (inventory-driven; see inventory/hosts.yml for the instances and
# inventory/group_vars/ for the memory caps and kiosk vars). Backends:
# podman (default) / docker containers, or PROVISIONER=kubevirt for real
# 512MiB VMs on the cluster - the kubevirt path also supports no-destroy
# render inspection (see playbooks/grafana-kiosk/README.md "Render testing").
prerun: false

ansible:
  cfg:
    defaults:
      # molecule generates its own ansible.cfg, so restate collection/role
      # resolution paths
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/roles:${MOLECULE_PROJECT_DIRECTORY}/.ansible/roles:~/.ansible/roles
      collections_path: ${MOLECULE_PROJECT_DIRECTORY}/.ansible/collections:~/.ansible/collections
  executor:
    args:
      ansible_playbook:
        - --inventory=inventory/
        - --inventory=${MOLECULE_EPHEMERAL_DIRECTORY}/inventory/
  playbooks:
    create: create.yml
    destroy: destroy.yml
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml

dependency:
  name: galaxy
  options:
    requirements-file: collections.yml

scenario:
  name: grafana-kiosk
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible
