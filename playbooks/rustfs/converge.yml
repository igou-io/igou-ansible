---
# Reconcile RustFS in-server state (policies, buckets, versioning,
# lifecycle, users, attachments) against the declarative spec in
# igou-inventory (group_vars/rustfs.yml) and verify that the credentials
# stored in 1Password actually authenticate. igou-inventory#122.
#
# Modes:
#   converge:        run as-is; applies drift, fails on dead credentials
#   drift detection: run with --check --diff; applies nothing, FAILS when
#                    any drift or a dead credential is found (AAP job
#                    template rustfs_state_drift, nightly)
#
# Targets the `rustfs` inventory group — a control stub with
# ansible_connection: local; the role reaches each instance's HTTPS
# endpoint itself via the pinned rc CLI. Requires OP_CONNECT_HOST /
# OP_CONNECT_TOKEN (AAP: the onepassword-connect-token credential).
- name: Reconcile RustFS instances
  hosts: "{{ host | default('rustfs') }}"
  gather_facts: false
  roles:
    - rustfs_state
