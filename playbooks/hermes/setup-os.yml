---
- name: Hermes guest convergence - base OS setup
  # Hermes guest convergence - BASE OS phase. Runs during the egress install
  # window because package installation needs repository access. Prepares the
  # persistent state disk (/dev/vdb -> ~/.hermes), installs host packages, starts
  # clock sync, and ensures the hermes service user can run shell-based tooling.
  #
  # Run order: setup-os (egress open) -> setup-hermes (egress open) -> lock egress
  # -> configure.
  #
  # Target only the host AAP passes via ansible_limit (e.g. hermes-hermes from the
  # kubevirt dynamic inventory). `hosts: all` would fan the state-disk mkfs out
  # across the whole fleet - match the linux_baseline convention instead.
  hosts: "{{ ansible_limit | default('hermes-hermes') }}"
  become: true
  vars:
    hermes_user: hermes
    hermes_home: /home/hermes
    hermes_state_device: /dev/vdb
    hermes_state_mount: "{{ hermes_home }}/.hermes"
    # Inventory/group_vars must override this placeholder before image pull.
    hermes_devenv_image: ghcr.io/igou-io/igou-devenv
    hermes_devenv_image_tag: "latest"
    hermes_devenv_image_ref: "{{ hermes_devenv_image }}:{{ hermes_devenv_image_tag }}"
    hermes_podman_subid_start: 100000
    hermes_podman_subid_count: 65536
    hermes_podman_subid_end: "{{ (hermes_podman_subid_start | int) + (hermes_podman_subid_count | int) - 1 }}"
    hermes_podman_graphroot: "{{ hermes_state_mount }}/containers/storage"
    centos_stream_major: "10"
    centos_stream_repo_base: "https://mirror.stream.centos.org/{{ centos_stream_major }}-stream"
    centos_stream_repo_backup_suffix: ansible-pre-mirror-pin
    centos_stream_repos:
      - name: baseos
        description: "CentOS Stream {{ centos_stream_major }} - BaseOS"
        file: centos
        baseurl: "{{ centos_stream_repo_base }}/BaseOS/$basearch/os/"
        enabled: true
        gpgcheck: true
      - name: appstream
        description: "CentOS Stream {{ centos_stream_major }} - AppStream"
        file: centos
        baseurl: "{{ centos_stream_repo_base }}/AppStream/$basearch/os/"
        enabled: true
        gpgcheck: true
      - name: extras-common
        description: "CentOS Stream {{ centos_stream_major }} - Extras packages"
        file: centos-addons
        baseurl: "https://mirror.stream.centos.org/SIGs/{{ centos_stream_major }}-stream/extras/$basearch/extras-common/"
        enabled: true
        gpgcheck: true
  tasks:
    - name: Validate the target is CentOS Stream {{ centos_stream_major }}
      ansible.builtin.assert:
        that:
          - ansible_facts["distribution"] == "CentOS"
          - ansible_facts["distribution_major_version"] == centos_stream_major
          - ansible_facts["distribution_release"] == "Stream"
        fail_msg: >-
          Hermes base OS setup supports only CentOS Stream {{ centos_stream_major }}.
          Detected distribution={{ ansible_facts["distribution"] }},
          major={{ ansible_facts["distribution_major_version"] }},
          release={{ ansible_facts["distribution_release"] }}.
      become: true

    - name: Create xfs filesystem on the Hermes state device
      community.general.filesystem:
        fstype: xfs
        dev: "{{ hermes_state_device }}"
        force: false   # format only when the device is unformatted
      become: true

    - name: Mount the Hermes state device and persist it in fstab
      ansible.posix.mount:
        path: "{{ hermes_state_mount }}"
        src: "{{ hermes_state_device }}"
        fstype: xfs
        opts: defaults
        state: mounted
      become: true

    - name: Ensure Hermes state mount is owned by hermes
      ansible.builtin.file:
        path: "{{ hermes_state_mount }}"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0700"
      become: true

    - name: Check existing CentOS repo files before pinning mirrors
      ansible.builtin.stat:
        path: "/etc/yum.repos.d/{{ item }}.repo"
      become: true
      loop: "{{ centos_stream_repos | map(attribute='file') | unique | list }}"
      register: centos_stream_repo_file_stats

    - name: Back up original CentOS repo files before pinning mirrors
      ansible.builtin.copy:
        src: "{{ item.stat.path }}"
        dest: "{{ item.stat.path }}.{{ centos_stream_repo_backup_suffix }}"
        remote_src: true
        force: false
        mode: preserve
      become: true
      loop: "{{ centos_stream_repo_file_stats.results }}"
      loop_control:
        label: "{{ item.stat.path }}"
      when: item.stat.exists

    # OVN-Kubernetes EgressFirewall DNS allow rules permit the queried hostname,
    # not arbitrary hosts returned by CentOS metalinks, mirrorlists, or redirects.
    # Pin these repos to mirror.stream.centos.org so OS updates need only that
    # single external CentOS repo hostname. CRB is intentionally not configured.
    - name: Pin CentOS Stream repo baseurls to mirror.stream.centos.org
      community.general.ini_file:
        path: "/etc/yum.repos.d/{{ item.file }}.repo"
        section: "{{ item.name }}"
        option: baseurl
        value: "{{ item.baseurl }}"
        no_extra_spaces: true
        owner: root
        group: root
        mode: "0644"
        backup: true
      become: true
      loop: "{{ centos_stream_repos }}"
      notify:
        - Clean DNF metadata
        - Rebuild DNF metadata cache

    - name: Set CentOS Stream repo descriptions
      community.general.ini_file:
        path: "/etc/yum.repos.d/{{ item.file }}.repo"
        section: "{{ item.name }}"
        option: name
        value: "{{ item.description }}"
        no_extra_spaces: true
        owner: root
        group: root
        mode: "0644"
        backup: true
      become: true
      loop: "{{ centos_stream_repos }}"
      notify:
        - Clean DNF metadata
        - Rebuild DNF metadata cache

    - name: Preserve GPG checking on managed CentOS Stream repos
      community.general.ini_file:
        path: "/etc/yum.repos.d/{{ item.file }}.repo"
        section: "{{ item.name }}"
        option: gpgcheck
        value: "{{ item.gpgcheck | ternary('1', '0') }}"
        no_extra_spaces: true
        owner: root
        group: root
        mode: "0644"
        backup: true
      become: true
      loop: "{{ centos_stream_repos }}"
      notify:
        - Clean DNF metadata
        - Rebuild DNF metadata cache

    - name: Set enabled state on managed CentOS Stream repos
      community.general.ini_file:
        path: "/etc/yum.repos.d/{{ item.file }}.repo"
        section: "{{ item.name }}"
        option: enabled
        value: "{{ item.enabled | ternary('1', '0') }}"
        no_extra_spaces: true
        owner: root
        group: root
        mode: "0644"
        backup: true
      become: true
      loop: "{{ centos_stream_repos }}"
      notify:
        - Clean DNF metadata
        - Rebuild DNF metadata cache

    - name: Disable CentOS Stream repo metalinks
      community.general.ini_file:
        path: "/etc/yum.repos.d/{{ item.file }}.repo"
        section: "{{ item.name }}"
        option: metalink
        state: absent
        owner: root
        group: root
        mode: "0644"
        backup: true
      become: true
      loop: "{{ centos_stream_repos }}"
      notify:
        - Clean DNF metadata
        - Rebuild DNF metadata cache

    - name: Disable CentOS Stream repo mirrorlists
      community.general.ini_file:
        path: "/etc/yum.repos.d/{{ item.file }}.repo"
        section: "{{ item.name }}"
        option: mirrorlist
        state: absent
        owner: root
        group: root
        mode: "0644"
        backup: true
      become: true
      loop: "{{ centos_stream_repos }}"
      notify:
        - Clean DNF metadata
        - Rebuild DNF metadata cache

    - name: Refresh DNF metadata after repo pinning changes
      ansible.builtin.meta: flush_handlers

    - name: Update installed OS packages
      ansible.builtin.dnf:
        name: "*"
        state: latest  # noqa: package-latest - intentional OS update during the egress install window
        update_only: true
      become: true

    # Install the host packages the convergence needs, here in the setup phase
    # because it runs during the egress window (dnf needs the mirrors). configure.yml
    # runs with egress LOCKED, so it can only enable nftables, not install it.
    #   - acl: Ansible hands become->unprivileged-hermes temp files via POSIX ACLs
    #     (setfacl); without it, the broken NFSv4 `chmod A+user:...` fallback fails.
    #   - nftables: the centos-stream10 cloud image ships neither the nft binary nor
    #     nftables.service, which configure.yml enables for the egress ruleset.
    #   - chrony: the centos-stream10 cloud image SHIPS it active by default, but
    #     ensure-present is cheap insurance - a wrong VM clock breaks TLS validation
    #     against the OpenShift router/api.telegram.org and skews journald correlation
    #     (observed pre-rebuild: VM clock ran ~24h behind real time).
    #   - podman/rootless runtime packages: prepare the host for a later Hermes
    #     Docker terminal backend pointed at /usr/bin/podman, without installing
    #     Docker Engine or privileged container support on the VM host.
    #   - policycoreutils-python-utils: semanage support for persistent SELinux
    #     labels on the rootless Podman graphroot stored on the state disk.
    - name: Install host packages the convergence needs
      ansible.builtin.package:
        name:
          - acl
          - nftables
          - chrony
          - podman
          - containers-common
          - fuse-overlayfs
          - slirp4netns
          - passt
          - shadow-utils
          - policycoreutils-python-utils
        state: present
      become: true

    # Make chrony explicit even though the cloud image enables it - if a future
    # image variant drops the default, we still get a syncing clock.
    - name: Ensure chronyd is enabled and running (clock sync)
      ansible.builtin.systemd:
        name: chronyd
        enabled: true
        state: started
      become: true

    # baseline creates hermes as a service user with /sbin/nologin, but the installer
    # (and the agent, which executes shell/Python) needs a real login shell - without
    # it `become_user: hermes -i` exits "This account is currently not available."
    - name: Ensure the hermes user has a usable login shell
      ansible.builtin.user:
        name: "{{ hermes_user }}"
        shell: /bin/bash
      become: true

    - name: Read hermes passwd entry
      ansible.builtin.getent:
        database: passwd
        key: "{{ hermes_user }}"
      become: true

    - name: Set hermes UID fact
      ansible.builtin.set_fact:
        hermes_uid: "{{ ansible_facts.getent_passwd[hermes_user][1] }}"

    - name: Set rootless Podman environment for hermes
      ansible.builtin.set_fact:
        hermes_podman_environment:
          XDG_RUNTIME_DIR: "/run/user/{{ hermes_uid }}"

    - name: Ensure user namespaces are enabled for rootless containers
      ansible.posix.sysctl:
        name: user.max_user_namespaces
        value: "28633"
        state: present
        reload: true
      become: true

    - name: Read subordinate UID mappings
      ansible.builtin.slurp:
        src: /etc/subuid
      register: hermes_subuid_file
      become: true

    - name: Read subordinate GID mappings
      ansible.builtin.slurp:
        src: /etc/subgid
      register: hermes_subgid_file
      become: true

    - name: Determine whether hermes already has subordinate UID/GID mappings
      ansible.builtin.set_fact:
        hermes_has_subuid: >-
          {{
            (hermes_subuid_file.content | b64decode).splitlines()
            | select('match', '^' ~ hermes_user ~ ':')
            | list
            | length > 0
          }}
        hermes_has_subgid: >-
          {{
            (hermes_subgid_file.content | b64decode).splitlines()
            | select('match', '^' ~ hermes_user ~ ':')
            | list
            | length > 0
          }}

    # ansible.builtin.user does not manage subordinate UID ranges. Use usermod
    # only when slurp-based pre-checks show no mapping exists.
    - name: Add subordinate UID range for hermes
      ansible.builtin.command:
        cmd: >-
          usermod --add-subuids
          {{ hermes_podman_subid_start }}-{{ hermes_podman_subid_end }}
          {{ hermes_user }}
      when: not hermes_has_subuid
      register: hermes_subuid_added
      changed_when: true
      become: true

    # ansible.builtin.user does not manage subordinate GID ranges. Use usermod
    # only when slurp-based pre-checks show no mapping exists.
    - name: Add subordinate GID range for hermes
      ansible.builtin.command:
        cmd: >-
          usermod --add-subgids
          {{ hermes_podman_subid_start }}-{{ hermes_podman_subid_end }}
          {{ hermes_user }}
      when: not hermes_has_subgid
      register: hermes_subgid_added
      changed_when: true
      become: true

    # systemd has no Ansible module for loginctl linger; creates keeps this
    # idempotent and avoids restarting an already enabled user manager.
    - name: Enable lingering for hermes user services
      ansible.builtin.command:
        cmd: "loginctl enable-linger {{ hermes_user }}"
        creates: "/var/lib/systemd/linger/{{ hermes_user }}"
      become: true

    - name: Ensure hermes user manager is running
      ansible.builtin.systemd:
        name: "user@{{ hermes_uid }}.service"
        state: started
      become: true

    - name: Create hermes rootless containers config and storage directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0700"
      loop:
        - "{{ hermes_home }}/.config"
        - "{{ hermes_home }}/.config/containers"
        - "{{ hermes_state_mount }}/containers"
        - "{{ hermes_podman_graphroot }}"
      become: true

    - name: Configure rootless Podman storage on Hermes state disk
      ansible.builtin.template:
        src: hermes-containers-storage.conf.j2
        dest: "{{ hermes_home }}/.config/containers/storage.conf"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0600"
      become: true

    - name: Persist SELinux context for Hermes rootless Podman storage
      community.general.sefcontext:
        target: "{{ hermes_podman_graphroot }}(/.*)?"
        seuser: unconfined_u
        setype: container_file_t
        state: present
      become: true

    # The state disk mounted at ~/.hermes can arrive unlabeled. Apply the
    # persisted context before Podman starts containers from that graphroot.
    - name: Apply SELinux context to Hermes rootless Podman storage
      ansible.builtin.command:
        cmd: "restorecon -RFv {{ hermes_podman_graphroot }}"
      register: hermes_podman_storage_restorecon
      changed_when: hermes_podman_storage_restorecon.stdout | trim | length > 0
      become: true

    # Podman has no native module for applying changed subuid/subgid mappings to
    # existing rootless storage; only run this after this play adds a mapping.
    - name: Apply rootless Podman mapping changes
      ansible.builtin.command:
        cmd: podman system migrate
      become: true
      become_user: "{{ hermes_user }}"
      become_flags: "-i"
      environment: "{{ hermes_podman_environment }}"
      changed_when: false
      when: hermes_subuid_added is changed or hermes_subgid_added is changed

    - name: Gather rootless Podman system information as hermes
      containers.podman.podman_system_info:
        executable: /usr/bin/podman
      become: true
      become_user: "{{ hermes_user }}"
      become_flags: "-i"
      environment: "{{ hermes_podman_environment }}"
      register: hermes_podman_info

    - name: Validate rootless Podman for hermes
      ansible.builtin.assert:
        that:
          - hermes_podman_info.podman_system_info.host.security.rootless | bool
          - hermes_podman_info.podman_system_info.store.graphRoot == hermes_podman_graphroot
          - hermes_podman_info.podman_system_info.store.runRoot == "/run/user/" ~ hermes_uid ~ "/containers"
        fail_msg: >-
          Rootless Podman for {{ hermes_user }} must be active and use
          {{ hermes_podman_graphroot }} for graphRoot.

    - name: Require pinned igou-devenv image tag
      ansible.builtin.assert:
        that:
          - hermes_devenv_image_tag is defined
          - hermes_devenv_image_tag | length > 0
          - hermes_devenv_image_tag != "latest"
        fail_msg: >-
          hermes_devenv_image_tag must be pinned by inventory/group_vars before
          setup-os.yml pulls the Hermes runtime image. Do not use latest for the
          Hermes runtime image.

    - name: Pull Hermes Podman backend image during egress-open setup phase
      containers.podman.podman_image:
        name: "{{ hermes_devenv_image_ref }}"
        state: present
        pull: true
        executable: /usr/bin/podman
      become: true
      become_user: "{{ hermes_user }}"
      become_flags: "-i"
      environment: "{{ hermes_podman_environment }}"
      register: hermes_podman_pull

    # containers.podman.podman_container does not expose one-shot command output
    # clearly enough to assert the future runtime identity. Keep podman run here
    # so the smoke test proves whoami=igou under the planned keep-id mapping.
    # timeout keeps first-run ID-mapped layer preparation from hanging forever.
    - name: Smoke test igou-devenv image with rootless Podman keep-id mapping
      ansible.builtin.command:
        cmd: >-
          timeout --kill-after=30s 10m
          podman run --rm
          --entrypoint /usr/bin/bash
          --userns=keep-id:uid=1000,gid=1000
          --user=1000:1000
          -e HOME=/home/igou
          -e BASH_ENV=/home/igou/.bashrc
          {{ hermes_devenv_image_ref }}
          -lc 'whoami && id && command -v bash && command -v podman || true'
      become: true
      become_user: "{{ hermes_user }}"
      become_flags: "-i"
      environment: "{{ hermes_podman_environment }}"
      register: hermes_devenv_smoke_test
      changed_when: false
      failed_when: >-
        hermes_devenv_smoke_test.rc != 0
        or (hermes_devenv_smoke_test.stdout_lines | default([]) | first) != "igou"

    # Future configure.yml phase handoff:
    # - set HERMES_DOCKER_BINARY=/usr/bin/podman for the Hermes gateway process
    # - manage Hermes config.yaml with terminal.backend: docker
    # - set docker_image to {{ hermes_devenv_image }}:<pinned-tag>
    # - set HOME=/home/igou and use keep-id UID/GID 1000 docker_extra_args
    # - use explicit many-volume mappings from /home/hermes into /home/igou
    # - do not mount all of /home/hermes or use privileged containers
    - name: Create host-side directories for future igou-devenv Hermes runtime mounts
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0700"
      loop:
        - "{{ hermes_home }}/agent-repos"
        - "{{ hermes_state_mount }}/cache"
        - "{{ hermes_state_mount }}/cache/documents"
        - "{{ hermes_home }}/.ssh"
        - "{{ hermes_home }}/.kube"
        - "{{ hermes_home }}/.claude"
        - "{{ hermes_home }}/.codex"
        - "{{ hermes_home }}/.config"
        - "{{ hermes_home }}/.config/opencode"
        - "{{ hermes_home }}/.config/gh"
        - "{{ hermes_home }}/.config/argocd"
        - "{{ hermes_home }}/.local"
        - "{{ hermes_home }}/.local/share"
        - "{{ hermes_home }}/.local/share/opencode"
        - "{{ hermes_home }}/.local/share/cursor-agent"
        - "{{ hermes_home }}/.terraform.d"
      become: true

    - name: Create optional mounted user config files if absent
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: touch
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "{{ item.mode }}"
        access_time: preserve
        modification_time: preserve
      loop:
        - { path: "{{ hermes_home }}/.claude.json", mode: "0600" }
        - { path: "{{ hermes_home }}/.gitconfig", mode: "0644" }
      become: true
  handlers:
    - name: Clean DNF metadata
      ansible.builtin.command:
        cmd: dnf clean metadata
      become: true
      changed_when: true

    - name: Rebuild DNF metadata cache
      ansible.builtin.command:
        cmd: dnf makecache
      become: true
      changed_when: false
