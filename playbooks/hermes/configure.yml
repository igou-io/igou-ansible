---
- name: Hermes guest convergence — configure phase (environment + nftables + unit)
  # Hermes guest convergence — CONFIGURE phase. Normally runs with egress LOCKED;
  # enable hermes_terminal_backend_image_pre_pull only when egress is available.
  # Updates managed keys in the environment file, renders the in-guest
  # nftables egress backstop, persistent journald, and two hardened systemd USER
  # units: the agent gateway (hermes-gateway.service) and the dashboard web UI
  # (hermes-dashboard.service), so both survive reboot/reprovision.
  # Run order: install (egress open) → lock egress → configure.
  # (Formerly the hermes_agent role's tasks/configure.yml, inlined here.)
  #
  # Target only the host AAP passes via ansible_limit (matches linux_baseline);
  # `hosts: all` would run the Hermes configure phase across the whole fleet.
  hosts: "{{ ansible_limit | default('hermes-hermes') }}"
  become: true
  vars:
    hermes_user: hermes
    hermes_home: /home/hermes
    hermes_state_mount: "{{ hermes_home }}/.hermes"
    hermes_terminal_backend_image: ghcr.io/igou-io/igou-devenv
    hermes_terminal_backend_image_ref: "{{ hermes_terminal_backend_image }}:{{ hermes_terminal_backend_image_tag }}"
    hermes_terminal_backend_image_prune_old_tags: true
    hermes_terminal_backend_container_user: igou
    hermes_terminal_backend_container_uid: 1000
    hermes_terminal_backend_container_gid: 1000
    hermes_terminal_backend_container_home: /home/igou
    hermes_terminal_backend_container_shell: /usr/bin/bash
    hermes_terminal_backend_container_bash_env: "{{ hermes_terminal_backend_container_home }}/.bashrc"
    # In-guest nftables coarse egress backstop CIDR (OVN EgressFirewall is the real
    # control); allowed on tcp/8080 for the in-cluster LLM service.
    hermes_cluster_service_cidr: "172.30.0.0/16"
    # Dashboard hardening: native BasicAuthProvider (scrypt password gate, no OAuth
    # IDP / Nous Portal) + file-browser confinement. Auth values are sourced from
    # `hermes_env_values` in group_vars/hermes.yml. Empty username = the auth
    # provider is a no-op (dashboard unit stays down, fail closed).
    hermes_dashboard_files_root: "{{ hermes_state_mount }}/dashboard-files"
    # The dashboard web UI runs as a managed systemd --user unit
    # (hermes-dashboard.service) so it survives reboot/reprovision and self-restarts
    # — replacing the prior out-of-band `nohup hermes dashboard`, which a rebuild
    # silently wiped. It binds non-loopback behind the BasicAuthProvider and is only
    # enabled when an auth username is set (fail closed — see the start task below).
    hermes_dashboard_host: "0.0.0.0"
    hermes_dashboard_port: 9119
    # Runtime coding-agent overlay (agent-update): versioned claude/codex/
    # opencode/cursor installs on the STATE disk that shadow the image-baked
    # pins on both execution surfaces (the terminal containers mount it at
    # ~/.agents/runtime, the host reaches it at ~/.hermes/agent-runtime; a
    # ~/.bashrc.d PATH snippet on each surface gives it precedence). Runtime
    # pulls are the operator-accepted freshness path — no age gate, no
    # review-time pin; verification where vendors offer it (claude PGP, codex
    # SHA256SUMS). The baked pins stay the reviewed fallback baseline:
    # `agent-update reset` clears the overlay and they resolve again.
    hermes_agent_runtime_dir: "{{ hermes_state_mount }}/agent-runtime"
    # Same trust anchor as the igou-devenv image build (CLAUDE_CODE_PGP_FPR).
    hermes_agent_update_claude_pgp_fpr: "31DDDE24DDFAB679F42D7BD2BAA929FF1A7ECACE"
    hermes_agent_update_ttl_seconds: 3600
    hermes_agent_update_keep_versions: 3
    # ghapp token broker wiring (gated OFF — flip with
    # -e hermes_ghapp_broker_enabled=true, same gate as the broker deploy in
    # setup-hermes.yml). When enabled the terminal containers mount the broker
    # runtime directory (directory, not the socket file, so a broker restart
    # doesn't leave stale bind-mounted inodes), get GHAPP_BROKER_SOCKET so
    # ghapp/gh-app/git-credential-ghapp mint through the broker, and LOSE the
    # static GH_TOKEN forward and the mounted human gh config.
    # NOTE: mounted without :Z — /run/ghbroker is a root-managed runtime dir
    # shared with the broker; if SELinux blocks the socket connect on the VM,
    # resolve at the podman level (label=disable for this mount), not by
    # relabeling the system directory.
    # NB: NOT set as a play var — play vars outrank inventory group_vars, which
    # would shadow a group_vars override (e.g. group_vars/hermes_test.yml sets
    # it true). Referenced as `hermes_ghapp_broker_enabled | default(false)`
    # below, so it defaults off unless a group/host var or -e sets it.
    hermes_ghapp_broker_runtime_dir: /run/ghbroker
    hermes_ghapp_broker_socket: "{{ hermes_ghapp_broker_runtime_dir }}/ghbroker.sock"
    hermes_terminal_config:
      backend: docker
      docker_image: "{{ hermes_terminal_backend_image_ref }}"
      cwd: /workspace
      timeout: 300
      docker_mount_cwd_to_workspace: false
      docker_persist_across_processes: false
      docker_orphan_reaper: true
      lifetime_seconds: 1800
      container_cpu: 4
      container_memory: 8192
      container_persistent: true
      docker_run_as_host_user: false
      docker_env: >-
        {{
          {
            'HOME': hermes_terminal_backend_container_home,
            'BASH_ENV': hermes_terminal_backend_container_bash_env,
            'PYTHONUNBUFFERED': '1',
          }
          | combine(
              {'GHAPP_BROKER_SOCKET': hermes_ghapp_broker_socket}
              if (hermes_ghapp_broker_enabled | default(false) | bool) else {}
            )
        }}
      docker_forward_env: >-
        {{
          ([] if (hermes_ghapp_broker_enabled | default(false) | bool) else ['GH_TOKEN'])
          + ['OPENCODE_GO_API_KEY']
        }}
      docker_extra_args:
        - "--userns=keep-id:uid={{ hermes_terminal_backend_container_uid }},gid={{ hermes_terminal_backend_container_gid }}"
        - "--user={{ hermes_terminal_backend_container_uid }}:{{ hermes_terminal_backend_container_gid }}"
      docker_volumes: >-
        {{
          [
            '/home/hermes/agent-repos:/workspace:Z',
            '/home/hermes/.hermes/cache/documents:/output:Z',
            '/home/hermes/.gitconfig:' ~ hermes_terminal_backend_container_home ~ '/.gitconfig:ro,Z',
            '/home/hermes/.netrc:' ~ hermes_terminal_backend_container_home ~ '/.netrc:ro,Z',
            '/home/hermes/.ssh:' ~ hermes_terminal_backend_container_home ~ '/.ssh:ro,Z',
            '/home/hermes/.kube:' ~ hermes_terminal_backend_container_home ~ '/.kube:ro,Z',
            '/home/hermes/.claude:' ~ hermes_terminal_backend_container_home ~ '/.claude:Z',
            '/home/hermes/.claude.json:' ~ hermes_terminal_backend_container_home ~ '/.claude.json:Z',
            '/home/hermes/.codex:' ~ hermes_terminal_backend_container_home ~ '/.codex:Z',
            '/home/hermes/.agents/skills:' ~ hermes_terminal_backend_container_home ~ '/.agents/skills:Z',
            '/home/hermes/.config/opencode:' ~ hermes_terminal_backend_container_home ~ '/.config/opencode:Z',
            '/home/hermes/.local/share/opencode:' ~ hermes_terminal_backend_container_home ~ '/.local/share/opencode:Z',
            '/home/hermes/.config/argocd:' ~ hermes_terminal_backend_container_home ~ '/.config/argocd:Z',
            '/home/hermes/.config/cursor:' ~ hermes_terminal_backend_container_home ~ '/.config/cursor:ro,Z',
            '/home/hermes/.cursor:' ~ hermes_terminal_backend_container_home ~ '/.cursor:Z',
            '/home/hermes/.terraform.d:' ~ hermes_terminal_backend_container_home ~ '/.terraform.d:Z',
            '/home/hermes/.hermes/agent-runtime:' ~ hermes_terminal_backend_container_home ~ '/.agents/runtime:Z',
            '/home/hermes/.hermes/agent-runtime/bashenv.d/10-agent-runtime.sh:' ~ hermes_terminal_backend_container_home ~ '/.bashrc.d/10-agent-runtime.sh:ro,Z',
            '/home/hermes/.config/gcp-sa:' ~ hermes_terminal_backend_container_home ~ '/.config/gcp-sa:ro,Z',
          ]
          + (
              [hermes_ghapp_broker_runtime_dir ~ ':' ~ hermes_ghapp_broker_runtime_dir]
              if (hermes_ghapp_broker_enabled | default(false) | bool)
              else ['/home/hermes/.config/gh:' ~ hermes_terminal_backend_container_home ~ '/.config/gh:Z']
            )
        }}
  tasks:
    - name: Update managed Hermes environment values
      ansible.builtin.lineinfile:
        dest: "{{ hermes_state_mount }}/.env"
        regexp: "^{{ item.key | regex_escape }}="
        line: "{{ item.key }}={{ item.value }}"
        create: true
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0600"
      become: true
      # GHAPP_BROKER_SOCKET is appended for the gateway process itself when the
      # ghapp broker is enabled, so the in-process github_app_* plugin tools
      # also mint through the broker instead of needing key material.
      loop: >-
        {{
          (
            hermes_env_values
            | combine(
                {'GHAPP_BROKER_SOCKET': hermes_ghapp_broker_socket}
                if (hermes_ghapp_broker_enabled | default(false) | bool) else {}
              )
          )
          | dict2items | rejectattr('value', 'equalto', '') | list
        }}
      no_log: true
      notify:
        - Restart the Hermes gateway user unit
        - Restart the Hermes dashboard user unit

    # Ambient HTTP basic-auth for services agents scrape (`curl -n`; Python
    # requests/httpx also honor .netrc). Declared as hermes_netrc_machines in
    # group_vars/hermes.yml with 1Password lookups — the credential never
    # appears in prompts, skills, or shell history. Always written (possibly
    # empty) so the terminal-backend bind mount below has a valid source.
    - name: Provision the hermes user .netrc
      ansible.builtin.copy:
        dest: "/home/{{ hermes_user }}/.netrc"
        content: |-
          # Managed by Ansible - playbooks/hermes/configure.yml
          {% for m in hermes_netrc_machines | default([]) %}
          machine {{ m.machine }}
            login {{ m.login }}
            password {{ m.password }}
          {% endfor %}
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0600"
      become: true
      no_log: true

    # GCP service-account keys for Google API access from agent sessions and
    # cron sandbox runs (e.g. storescrape -> Sheets). Same contract as .netrc:
    # declared as hermes_gcp_sa_keys in group_vars/hermes.yml with 1Password
    # lookups, written here, bind-mounted read-only into terminal containers —
    # the key never appears in prompts, skills, or shell history. The directory
    # is always present (possibly empty) so the bind mount has a valid source.
    - name: Ensure the GCP service-account key directory exists
      ansible.builtin.file:
        path: "/home/{{ hermes_user }}/.config/gcp-sa"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0700"
      become: true

    - name: Provision GCP service-account keys
      ansible.builtin.copy:
        dest: "/home/{{ hermes_user }}/.config/gcp-sa/{{ item.name }}.json"
        content: "{{ lookup('community.general.onepassword', item.item, field=item.field, vault=item.vault) }}"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0600"
      loop: "{{ hermes_gcp_sa_keys | default([]) }}"
      loop_control:
        label: "{{ item.name }}"
      become: true
      no_log: true

    # When the broker is enabled, override the bundled `github-auth` skill (which
    # tells the agent to use PATs / SSH / gh login) with a broker-first version:
    # for any GitHub op the agent mints a scoped token from the broker socket and
    # uses it directly. Hermes auto-loads this skill on GitHub tasks, so agent
    # sessions authenticate via the broker without being told. Written AFTER the
    # installer (setup-hermes), which restores the stock skill each run.
    - name: Ensure the github-auth skill directory exists
      ansible.builtin.file:
        path: "{{ hermes_state_mount }}/skills/github/github-auth"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0755"
      become: true
      when: hermes_ghapp_broker_enabled | default(false) | bool

    - name: Install the broker-first github-auth skill (overrides the bundled one)
      ansible.builtin.copy:
        src: files/github-auth-broker-SKILL.md
        dest: "{{ hermes_state_mount }}/skills/github/github-auth/SKILL.md"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0644"
      become: true
      when: hermes_ghapp_broker_enabled | default(false) | bool

    # tirith (the pre-exec command scanner) blocks plain-HTTP URLs in terminal
    # commands (plain_http_to_sink). The in-cluster sands-of-time API is HTTP by
    # design (ClusterIP service, no route), so agents need a rule-scoped trust
    # entry for that one hostname. The trust store lives in ~/.config/tirith on
    # the ROOT disk (not the state PVC), so a rebuild wipes it — reseed here.
    - name: Check tirith trust for the in-cluster sands-of-time entry
      ansible.builtin.command:
        cmd: grep -q sands-of-time.sands-of-time.svc.cluster.local /home/{{ hermes_user }}/.config/tirith/trust.json
      become: true
      register: hermes_tirith_sot_trust
      changed_when: false
      failed_when: false

    - name: Trust the in-cluster sands-of-time hostname in tirith (plain-HTTP rule only)
      ansible.builtin.command:
        cmd: >-
          {{ hermes_state_mount }}/bin/tirith trust add
          sands-of-time.sands-of-time.svc.cluster.local
          --rule plain_http_to_sink
      become: true
      become_user: "{{ hermes_user }}"
      when: hermes_tirith_sot_trust.rc != 0
      changed_when: true

    - name: Map legacy Hermes devenv image tag to terminal backend image tag
      ansible.builtin.set_fact:
        hermes_terminal_backend_image_tag: "{{ hermes_devenv_image_tag }}"
      when:
        - hermes_terminal_backend_image_tag is not defined
        - hermes_devenv_image_tag is defined

    - name: Require pinned Hermes terminal backend image tag
      ansible.builtin.assert:
        that:
          - hermes_terminal_backend_image is defined
          - hermes_terminal_backend_image | default('') | length > 0
          - hermes_terminal_backend_image_tag is defined
          - hermes_terminal_backend_image_tag | default('') | length > 0
          - hermes_terminal_backend_image_tag != "latest"
        fail_msg: >-
          hermes_terminal_backend_image and hermes_terminal_backend_image_tag must be
          set by inventory/group_vars before configure.yml writes the Hermes
          terminal runtime config.
          Do not use latest for the Hermes runtime image.

    - name: Resolve the hermes uid
      ansible.builtin.getent:
        database: passwd
        key: "{{ hermes_user }}"
      become: true

    - name: Set Hermes rootless Podman environment
      ansible.builtin.set_fact:
        hermes_uid: "{{ ansible_facts.getent_passwd[hermes_user][1] }}"
        hermes_podman_environment:
          XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[hermes_user][1] }}"

    # Rootless Podman needs the hermes user manager and /run/user/<uid> before
    # any pull/prewarm/prune task uses XDG_RUNTIME_DIR. loginctl enables linger
    # for future boots, and starting user@<uid>.service makes the runtime present
    # immediately on fresh VMs.
    - name: Ensure the hermes user has systemd linger enabled
      ansible.builtin.command:
        cmd: "loginctl enable-linger {{ hermes_user }}"
      args:
        creates: "/var/lib/systemd/linger/{{ hermes_user }}"
      become: true

    - name: Ensure the hermes user manager is running
      ansible.builtin.systemd:
        name: "user@{{ hermes_uid }}.service"
        state: started
      become: true

    - name: Manage Hermes terminal backend image lifecycle
      when: hermes_terminal_backend_image_pre_pull | default(false) | bool
      block:
        # QUIESCE the live gateway BEFORE any image ops. The gateway
        # (hermes-gateway.service, a rootless systemd --user unit) continuously
        # spawns and removes ephemeral podman exec-sandbox containers on the SAME
        # rootless-podman graphroot that the pull/prewarm/prune tasks below use.
        # Two independent podman processes doing concurrent overlayfs
        # copy-up/rename on the same XFS dirs previously tripped a kernel XFS bug
        # and shut the filesystem down. Stop the gateway (and dashboard) and drain
        # any still-running containers so nothing else touches podman while the
        # image lifecycle runs. Nothing here restarts them: the gateway is brought
        # back up unconditionally at play end ("Enable and restart the Hermes
        # gateway user unit") and the dashboard by its auth-gated restart task.
        - name: Stop the Hermes gateway and dashboard user units before image ops
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: stopped
            scope: user
          become: true
          become_user: "{{ hermes_user }}"
          environment:
            XDG_RUNTIME_DIR: "/run/user/{{ hermes_uid }}"
          loop:
            - hermes-gateway.service
            - hermes-dashboard.service

        - name: Drain any running rootless Podman containers before image ops
          ansible.builtin.command:
            cmd: "{{ item }}"
          become: true
          become_user: "{{ hermes_user }}"
          become_flags: "-i"
          environment: "{{ hermes_podman_environment }}"
          loop:
            - podman stop --all --time 30
            - podman rm --all --force
          changed_when: false

        - name: Pre-pull Hermes terminal backend image
          containers.podman.podman_image:
            name: "{{ hermes_terminal_backend_image_ref }}"
            state: present
            pull: true
            executable: /usr/bin/podman
          become: true
          become_user: "{{ hermes_user }}"
          become_flags: "-i"
          environment: "{{ hermes_podman_environment }}"

        # 20m (not 10m): the first keep-id run after a fresh pull cold-builds an
        # ID-mapped copy of every layer of the multi-GB devenv image, which can
        # exceed 10m under IO load (see the matching note in setup-os.yml).
        - name: Pre-warm Hermes terminal backend image with rootless Podman keep-id mapping
          ansible.builtin.command:
            cmd: >-
              timeout --kill-after=30s 20m
              podman run --rm
              --entrypoint {{ hermes_terminal_backend_container_shell }}
              --userns=keep-id:uid={{ hermes_terminal_backend_container_uid }},gid={{ hermes_terminal_backend_container_gid }}
              --user={{ hermes_terminal_backend_container_uid }}:{{ hermes_terminal_backend_container_gid }}
              -e HOME={{ hermes_terminal_backend_container_home }}
              -e BASH_ENV={{ hermes_terminal_backend_container_bash_env }}
              {{ hermes_terminal_backend_image_ref }}
              -lc 'whoami; id -u; id -g; pwd'
          become: true
          become_user: "{{ hermes_user }}"
          become_flags: "-i"
          environment: "{{ hermes_podman_environment }}"
          register: hermes_terminal_backend_image_prewarm
          changed_when: false
          failed_when: >-
            hermes_terminal_backend_image_prewarm.rc != 0
            or (hermes_terminal_backend_image_prewarm.stdout_lines | default([]) | length) < 3
            or hermes_terminal_backend_image_prewarm.stdout_lines[0] != hermes_terminal_backend_container_user
            or hermes_terminal_backend_image_prewarm.stdout_lines[1] != (hermes_terminal_backend_container_uid | string)
            or hermes_terminal_backend_image_prewarm.stdout_lines[2] != (hermes_terminal_backend_container_gid | string)

        - name: Manage old Hermes terminal backend image tags
          when: hermes_terminal_backend_image_prune_old_tags | default(true) | bool
          block:
            - name: Gather local Hermes terminal backend image tags
              containers.podman.podman_image_info:
                executable: /usr/bin/podman
              become: true
              become_user: "{{ hermes_user }}"
              become_flags: "-i"
              environment: "{{ hermes_podman_environment }}"
              register: hermes_terminal_backend_image_info

            - name: Initialize local Hermes terminal backend image reference list
              ansible.builtin.set_fact:
                hermes_terminal_backend_local_image_refs: []

            - name: Build local Hermes terminal backend image reference list
              ansible.builtin.set_fact:
                hermes_terminal_backend_local_image_refs: >-
                  {{
                    hermes_terminal_backend_local_image_refs
                    + (item.RepoTags | default([], true))
                    + (item.Names | default([], true))
                  }}
              loop: "{{ hermes_terminal_backend_image_info.images | default([]) }}"
              loop_control:
                label: "{{ item.Id | default('unknown') }}"

            - name: Require desired Hermes terminal backend image to be local before pruning
              ansible.builtin.assert:
                that:
                  - hermes_terminal_backend_image_ref in (hermes_terminal_backend_local_image_refs | unique | list)
                fail_msg: >-
                  Refusing to prune old Hermes terminal backend image tags because
                  {{ hermes_terminal_backend_image_ref }} is not present in the local
                  rootless Podman image store for {{ hermes_user }}.

            - name: Set old Hermes terminal backend image tag list
              ansible.builtin.set_fact:
                hermes_terminal_backend_old_image_refs: >-
                  {{
                    hermes_terminal_backend_local_image_refs
                    | select('match', '^' ~ (hermes_terminal_backend_image | regex_escape) ~ ':[^:]+$')
                    | reject('equalto', hermes_terminal_backend_image_ref)
                    | unique
                    | list
                  }}

            - name: Prune old Hermes terminal backend image tags
              containers.podman.podman_image:
                name: "{{ item }}"
                state: absent
                force: true
                executable: /usr/bin/podman
              become: true
              become_user: "{{ hermes_user }}"
              become_flags: "-i"
              environment: "{{ hermes_podman_environment }}"
              loop: "{{ hermes_terminal_backend_old_image_refs }}"
              loop_control:
                label: "{{ item }}"

    # Confined root for the dashboard file browser (HERMES_DASHBOARD_FILES_ROOT) —
    # locks /api/files to this dir instead of allowing arbitrary host file read.
    - name: Ensure the dashboard file-browser root exists
      ansible.builtin.file:
        path: "{{ hermes_dashboard_files_root }}"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0700"
      become: true

    - name: Create host-side directories for igou-devenv Hermes runtime mounts
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0700"
      loop:
        - "{{ hermes_home }}/agent-repos"
        - "{{ hermes_state_mount }}/cache"
        - "{{ hermes_state_mount }}/cache/documents"
        - "{{ hermes_home }}/.ssh"
        - "{{ hermes_home }}/.kube"
        - "{{ hermes_home }}/.claude"
        - "{{ hermes_home }}/.codex"
        - "{{ hermes_home }}/.agents"
        - "{{ hermes_home }}/.agents/skills"
        - "{{ hermes_home }}/.config"
        - "{{ hermes_home }}/.config/opencode"
        - "{{ hermes_home }}/.config/gh"
        - "{{ hermes_home }}/.config/argocd"
        - "{{ hermes_home }}/.config/cursor"
        - "{{ hermes_home }}/.cursor"
        - "{{ hermes_home }}/.local"
        - "{{ hermes_home }}/.local/share"
        - "{{ hermes_home }}/.local/share/opencode"
        - "{{ hermes_home }}/.terraform.d"
      become: true

    - name: Create optional mounted user config files if absent
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: touch
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "{{ item.mode }}"
        access_time: preserve
        modification_time: preserve
      loop:
        - { path: "{{ hermes_home }}/.claude.json", mode: "0600" }
        - { path: "{{ hermes_home }}/.gitconfig", mode: "0644" }
      become: true

    # ── Runtime coding-agent overlay (agent-update) ─────────────────────────
    # Created BEFORE the merged config is written: the terminal mounts below
    # reference the overlay dir and the PATH snippet file, and podman would
    # otherwise create a missing single-file bind source as a directory.
    - name: Create the agent-runtime overlay directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ hermes_agent_runtime_dir }}", mode: "0755" }
        - { path: "{{ hermes_agent_runtime_dir }}/bin", mode: "0755" }
        - { path: "{{ hermes_agent_runtime_dir }}/tools", mode: "0755" }
        - { path: "{{ hermes_agent_runtime_dir }}/state", mode: "0700" }
        - { path: "{{ hermes_agent_runtime_dir }}/bashenv.d", mode: "0755" }
      become: true

    # One snippet works on both surfaces (it probes both candidate paths);
    # rendered twice: into the overlay (bind-mounted to the container's
    # ~/.bashrc.d) and into the hermes user's host ~/.bashrc.d. The skel
    # ~/.bashrc sources ~/.bashrc.d/*, and the terminal tool's
    # BASH_ENV=~/.bashrc makes every non-interactive command inherit it.
    - name: Render the agent-runtime PATH snippet (overlay copy, container-mounted)
      ansible.builtin.template:
        src: agent-runtime-path.sh.j2
        dest: "{{ hermes_agent_runtime_dir }}/bashenv.d/10-agent-runtime.sh"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0644"
      become: true

    - name: Ensure the hermes user bashrc.d directory exists (host PATH seam)
      ansible.builtin.file:
        path: "/home/{{ hermes_user }}/.bashrc.d"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0755"
      become: true

    - name: Render the agent-runtime PATH snippet (host bashrc.d)
      ansible.builtin.template:
        src: agent-runtime-path.sh.j2
        dest: "/home/{{ hermes_user }}/.bashrc.d/10-agent-runtime.sh"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0644"
      become: true

    # The opencode installer (setup-hermes install phase) appends its own
    # `export PATH=~/.opencode/bin:$PATH` to ~/.bashrc — AFTER the ~/.bashrc.d
    # loop, so the stale host opencode shadows the agent-runtime overlay
    # (observed: Hermes session resolved host 1.17.13 over overlay v1.18.3).
    # Strip it here; the PATH snippet above appends ~/.opencode/bin as an
    # end-of-PATH fallback instead. Canonical converge order install ->
    # configure means a fresh install's re-added line is stripped again.
    - name: Remove the opencode installer PATH lines from the hermes bashrc
      ansible.builtin.lineinfile:
        path: "/home/{{ hermes_user }}/.bashrc"
        regexp: "{{ item }}"
        state: absent
      loop:
        - '^# opencode$'
        - '^export PATH=/home/{{ hermes_user }}/\.opencode/bin:\$PATH$'
      become: true

    # Host copy is root-owned in /usr/local/bin (not agent-writable); the
    # overlay copy sits on the agent-writable state disk so terminal sessions
    # can run it, and is re-asserted from the same template every converge.
    - name: Install agent-update (host copy, root-owned)
      ansible.builtin.template:
        src: agent-update.sh.j2
        dest: /usr/local/bin/agent-update
        owner: root
        group: root
        mode: "0755"
      become: true

    - name: Install agent-update into the overlay bin (reachable inside containers)
      ansible.builtin.template:
        src: agent-update.sh.j2
        dest: "{{ hermes_agent_runtime_dir }}/bin/agent-update"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0755"
      become: true

    # Skill telling the agent it may update its own coding CLIs "as needed".
    # Written AFTER the installer (setup-hermes) like the github-auth skill,
    # so an installer run can't remove it for long.
    - name: Ensure the agent-update skill directory exists
      ansible.builtin.file:
        path: "{{ hermes_state_mount }}/skills/tools/agent-update"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0755"
      become: true

    - name: Install the agent-update skill
      ansible.builtin.copy:
        src: files/agent-update-SKILL.md
        dest: "{{ hermes_state_mount }}/skills/tools/agent-update/SKILL.md"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0644"
      become: true

    - name: Check Hermes config.yaml
      ansible.builtin.stat:
        path: "{{ hermes_state_mount }}/config.yaml"
      register: hermes_config_yaml_stat
      become: true

    - name: Read Hermes config.yaml
      ansible.builtin.slurp:
        src: "{{ hermes_state_mount }}/config.yaml"
      register: hermes_config_yaml_slurp
      when: hermes_config_yaml_stat.stat.exists
      become: true

    - name: Normalize existing Hermes config content
      ansible.builtin.set_fact:
        hermes_config_yaml_content: >-
          {{
            (
              hermes_config_yaml_slurp.content | default('') | b64decode | trim
            )
            if hermes_config_yaml_stat.stat.exists else ''
          }}

    - name: Parse existing Hermes config
      ansible.builtin.set_fact:
        hermes_existing_config: >-
          {{
            (
              hermes_config_yaml_content | from_yaml
            )
            if (hermes_config_yaml_content | length > 0) else {}
          }}

    - name: Build managed Hermes config with terminal backend
      ansible.builtin.set_fact:
        hermes_merged_config: >-
          {{
            (hermes_existing_config | default({}, true))
            | combine({'terminal': hermes_terminal_config}, recursive=True)
          }}

    - name: Write merged Hermes config.yaml
      ansible.builtin.copy:
        dest: "{{ hermes_state_mount }}/config.yaml"
        content: "{{ hermes_merged_config | to_nice_yaml(indent=2, sort_keys=false) }}"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0600"
      become: true
      notify:
        - Restart the Hermes gateway user unit
        - Restart the Hermes dashboard user unit

    - name: Assert merged Hermes terminal backend config is present
      ansible.builtin.assert:
        that:
          - hermes_merged_config.terminal.backend == "docker"
          - hermes_merged_config.terminal.docker_image == hermes_terminal_backend_image_ref
          - hermes_merged_config.terminal.docker_env.HOME == hermes_terminal_backend_container_home
          - hermes_merged_config.terminal.docker_env.BASH_ENV == hermes_terminal_backend_container_bash_env
          - ("--userns=keep-id:uid=" ~ hermes_terminal_backend_container_uid ~ ",gid=" ~ hermes_terminal_backend_container_gid) in hermes_merged_config.terminal.docker_extra_args
          - ("--user=" ~ hermes_terminal_backend_container_uid ~ ":" ~ hermes_terminal_backend_container_gid) in hermes_merged_config.terminal.docker_extra_args
          - "'/home/hermes/agent-repos:/workspace:Z' in hermes_merged_config.terminal.docker_volumes"
          - ('/home/hermes/.agents/skills:' ~ hermes_terminal_backend_container_home ~ '/.agents/skills:Z') in hermes_merged_config.terminal.docker_volumes
          - ('/home/hermes/.hermes/agent-runtime:' ~ hermes_terminal_backend_container_home ~ '/.agents/runtime:Z') in hermes_merged_config.terminal.docker_volumes
          - ('/home/hermes/.hermes/agent-runtime/bashenv.d/10-agent-runtime.sh:' ~ hermes_terminal_backend_container_home ~ '/.bashrc.d/10-agent-runtime.sh:ro,Z') in hermes_merged_config.terminal.docker_volumes

    - name: Assert the ghapp broker terminal wiring
      ansible.builtin.assert:
        that:
          - hermes_merged_config.terminal.docker_env.GHAPP_BROKER_SOCKET == hermes_ghapp_broker_socket
          - "'GH_TOKEN' not in hermes_merged_config.terminal.docker_forward_env"
          - (hermes_ghapp_broker_runtime_dir ~ ':' ~ hermes_ghapp_broker_runtime_dir) in hermes_merged_config.terminal.docker_volumes
          - hermes_merged_config.terminal.docker_volumes | select('search', '/.config/gh:') | length == 0
        fail_msg: >-
          hermes_ghapp_broker_enabled is true but the terminal config still
          carries the legacy GH_TOKEN/gh-config wiring or lacks the broker
          socket mount/env.
      when: hermes_ghapp_broker_enabled | default(false) | bool

    - name: Ensure the nftables drop-in directory exists
      ansible.builtin.file:
        path: /etc/nftables.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      become: true

    - name: Render the Hermes egress nftables ruleset
      ansible.builtin.template:
        src: hermes-egress.nft.j2
        dest: /etc/nftables.d/hermes-egress.nft
        owner: root
        group: root
        mode: "0644"
      become: true
      register: hermes_nft_ruleset

    - name: Ensure /etc/sysconfig/nftables.conf includes the drop-in
      ansible.builtin.lineinfile:
        path: /etc/sysconfig/nftables.conf
        line: 'include "/etc/nftables.d/hermes-egress.nft"'
        create: true
        owner: root
        group: root
        mode: "0644"
      become: true

    - name: Enable and start the nftables service for boot-time persistence
      ansible.builtin.systemd:
        name: nftables
        enabled: true
        state: started
      become: true

    - name: Validate the Hermes egress ruleset (dry-run) before loading
      ansible.builtin.command:
        cmd: nft -c -f /etc/nftables.d/hermes-egress.nft
      become: true
      changed_when: false

    # Deliberately a task (not a handler): the load is an explicit, in-order step
    # — render → dry-run validate → load — so the preceding `nft -c` catches an
    # invalid ruleset before this ever applies it. noqa silences the no-handler
    # idiom (the role formerly sat in .ansible-lint exclude_paths; inlined here it
    # is linted, and converting to a handler would defer the load to play-end).
    - name: Load the Hermes egress ruleset now  # noqa: no-handler
      ansible.builtin.command:
        cmd: nft -f /etc/nftables.d/hermes-egress.nft
      become: true
      when: hermes_nft_ruleset is changed
      changed_when: true

    # NOTE: ~/.hermes/skills is intentionally left to the installer. Do NOT chmod it
    # read-only — Hermes's autonomous skill creation is a core feature and a 0555
    # clamp would break it (and is not real immutability anyway). Proper immutable,
    # Git-gated skills are deferred §5.5 work.

    - name: Ensure the hermes user systemd unit directory exists
      ansible.builtin.file:
        path: "{{ hermes_home }}/.config/systemd/user"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0755"
      become: true

    - name: Remove the legacy Hermes gateway user unit name
      ansible.builtin.file:
        path: "{{ hermes_home }}/.config/systemd/user/hermes.service"
        state: absent
      become: true
      notify: Restart the Hermes gateway user unit

    - name: Ensure the Hermes gateway user unit drop-in directory exists
      ansible.builtin.file:
        path: "{{ hermes_home }}/.config/systemd/user/hermes-gateway.service.d"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0755"
      become: true

    - name: Remove the temporary dashboard Podman runtime test drop-in
      ansible.builtin.file:
        path: "{{ hermes_home }}/.config/systemd/user/hermes-dashboard.service.d/90-podman-runtime-test.conf"
        state: absent
      become: true
      notify: Restart the Hermes dashboard user unit

    - name: Render the Hermes gateway systemd user unit
      ansible.builtin.template:
        src: hermes-gateway.service.j2
        dest: "{{ hermes_home }}/.config/systemd/user/hermes-gateway.service"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0644"
      become: true
      notify: Restart the Hermes gateway user unit

    - name: Render the Hermes gateway Podman runtime drop-in
      ansible.builtin.template:
        src: hermes-gateway-podman-runtime.conf.j2
        dest: "{{ hermes_home }}/.config/systemd/user/hermes-gateway.service.d/10-podman-runtime.conf"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0644"
      become: true
      notify: Restart the Hermes gateway user unit

    - name: Render the hardened Hermes dashboard systemd user unit
      ansible.builtin.template:
        src: hermes-dashboard.service.j2
        dest: "{{ hermes_home }}/.config/systemd/user/hermes-dashboard.service"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0644"
      become: true
      notify: Restart the Hermes dashboard user unit

    # Nightly overlay refresh: host-side timer so freshness never depends on
    # the agent asking (Hermes cron approvals are deny). Runs agent-update
    # from /usr/local/bin as the hermes user.
    - name: Render the agent-runtime update timer units
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "{{ hermes_home }}/.config/systemd/user/{{ item }}"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0644"
      loop:
        - agent-runtime-update.service
        - agent-runtime-update.timer

    # Reload the per-user systemd manager so the new units are visible.
    # XDG_RUNTIME_DIR is required or `systemctl --user` can't find the bus
    # ("Failed to connect to bus").
    - name: Reload the hermes user systemd manager
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user
      become: true
      become_user: "{{ hermes_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[hermes_user][1] }}"

    - name: Enable and restart the Hermes gateway user unit
      ansible.builtin.systemd:
        name: hermes-gateway.service
        enabled: true
        state: restarted
        scope: user
      become: true
      become_user: "{{ hermes_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[hermes_user][1] }}"

    # The dashboard unit is enabled + started as the managed replacement for the
    # old out-of-band nohup, so it must come up on its own after a reboot/reprovision.
    # Guard on the auth username: with --host 0.0.0.0 and no --insecure, Hermes
    # refuses to bind unless the BasicAuthProvider is registered, so starting it
    # without creds would crash-loop. No username = the dashboard stays down
    # (fail closed) — pass the auth extra-vars to activate.
    - name: Enable and restart the Hermes dashboard user unit
      ansible.builtin.systemd:
        name: hermes-dashboard.service
        enabled: true
        state: restarted
        scope: user
      become: true
      become_user: "{{ hermes_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[hermes_user][1] }}"
      when: (hermes_env_values.HERMES_DASHBOARD_BASIC_AUTH_USERNAME | default('')) | length > 0

    - name: Enable and start the agent-runtime update timer
      ansible.builtin.systemd:
        name: agent-runtime-update.timer
        enabled: true
        state: started
        scope: user
      become: true
      become_user: "{{ hermes_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[hermes_user][1] }}"

    - name: Ensure the journald drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      become: true

    # CentOS Stream 10 ships no /etc/systemd/journald.conf (the vendor default lives
    # in /usr/lib/systemd); use a drop-in so persistent storage applies regardless.
    - name: Make journald storage persistent (drop-in)
      ansible.builtin.copy:
        dest: /etc/systemd/journald.conf.d/10-hermes-persistent.conf
        content: |
          [Journal]
          Storage=persistent
        owner: root
        group: root
        mode: "0644"
      become: true
      notify: Restart journald

    # END-OF-PLAY HEALTH GATES. This play once SUCCEEDED over a dead filesystem:
    # the state XFS shut itself down mid-converge (concurrent rootless-podman
    # activity tripped a kernel XFS bug), every access to the state disk returned
    # Input/output error, yet the systemd units stayed "active" so the AAP job
    # went green and nobody noticed for days. These pure, side-effect-free checks
    # FAIL LOUD at play end so a future mid-run fault turns the job RED instead.
    #
    # flush_handlers FIRST: the gateway/dashboard restart handlers run at play
    # end, AFTER all tasks — so a plain "gateway active" assertion here would race
    # a not-yet-fired restart handler and false-pass (or false-fail) on a stale
    # unit state. Flushing forces any pending restarts to happen NOW, so the
    # checks below observe the post-restart reality.
    - name: Flush pending restart handlers before asserting health
      ansible.builtin.meta: flush_handlers

    - name: Assert Hermes end-of-play health
      block:
        # State mount writable: a shut-down XFS returns EIO on EVERY operation,
        # so a real read-write-delete probe as the hermes user fails loudly here
        # instead of the play silently passing over a dead disk. Plain file IO —
        # no XDG_RUNTIME_DIR/podman env needed. changed_when: false + the probe
        # file is removed in the same command, so this leaves no side effect.
        - name: Probe the Hermes state mount is writable (catches an EIO / shut-down fs)
          ansible.builtin.command:
            cmd: >-
              bash -lc 'f={{ hermes_state_mount }}/.configure_health_probe;
              echo ok > "$f" && cat "$f" && rm -f "$f"'
          become: true
          become_user: "{{ hermes_user }}"
          register: hermes_state_probe
          changed_when: false
          failed_when: >-
            hermes_state_probe.rc != 0
            or 'ok' not in hermes_state_probe.stdout

        # Gateway unit active: the durable agent gateway must be up at play end.
        # It may have JUST been restarted by the flushed handler above, so a brief
        # activating->active transition is normal — retry/until absorbs it rather
        # than false-failing on a momentary "activating". scope: user + become_user
        # hermes + XDG_RUNTIME_DIR matches the systemd --user idiom used above.
        - name: Verify the Hermes gateway user unit is active
          ansible.builtin.systemd:
            name: hermes-gateway.service
            scope: user
          become: true
          become_user: "{{ hermes_user }}"
          environment:
            XDG_RUNTIME_DIR: "/run/user/{{ hermes_uid }}"
          register: hermes_gateway_state
          until: hermes_gateway_state.status.ActiveState == "active"
          retries: 5
          delay: 3

        # No XFS shutdown / state-disk EIO during this run: scan the kernel log
        # for the state-device (vdb, the XFS state disk) failure signature. The
        # units can stay "active" over a dead fs, so unit state alone is not
        # enough — the kernel is the source of truth. Match the vd[b-z] XFS
        # shutdown/corruption strings SPECIFICALLY to avoid false positives from
        # unrelated benign log lines; grep rc is ignored (no match = rc 1 = fine),
        # and the assert fails only if the signature actually appears.
        - name: Scan the kernel log for a state-disk XFS shutdown / corruption signature
          ansible.builtin.shell:
            cmd: >-
              set -o pipefail;
              journalctl -k --since "-15min" --no-pager
              | grep -E 'XFS \(vd[b-z]\): .*(Shutting down|Corruption of in-memory data)'
              || true
          become: true
          register: hermes_xfs_shutdown_scan
          changed_when: false
          failed_when: false

        - name: Assert no state-disk XFS shutdown occurred during this run
          ansible.builtin.assert:
            that:
              - hermes_xfs_shutdown_scan.stdout | trim | length == 0
            fail_msg: >-
              Kernel log shows an XFS shutdown / in-memory corruption on the
              Hermes state disk (vdb) during this run. The state filesystem at
              {{ hermes_state_mount }} is compromised — the units may still read
              "active" but every state-disk access returns EIO. Investigate the
              vdb XFS filesystem (dmesg / xfs_repair) before trusting this host.
  handlers:
    - name: Restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted
      become: true

    # Pick up .env/unit changes in the running services. The `state: started`
    # tasks are idempotent and do NOT restart on their own, so a managed value
    # change otherwise sits on disk until something restarts the unit.
    - name: Restart the Hermes gateway user unit
      ansible.builtin.systemd:
        name: hermes-gateway.service
        state: restarted
        scope: user
      become: true
      become_user: "{{ hermes_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[hermes_user][1] }}"

    # Gated on the same auth username that gates the unit's start: no auth = no
    # running dashboard = nothing to restart.
    - name: Restart the Hermes dashboard user unit
      ansible.builtin.systemd:
        name: hermes-dashboard.service
        state: restarted
        scope: user
      become: true
      become_user: "{{ hermes_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[hermes_user][1] }}"
      when: (hermes_env_values.HERMES_DASHBOARD_BASIC_AUTH_USERNAME | default('')) | length > 0
