---
- name: Hermes guest convergence — configure phase (environment + nftables + unit)
  # Hermes guest convergence — CONFIGURE phase. Normally runs with egress LOCKED;
  # enable hermes_terminal_backend_image_pre_pull only when egress is available.
  # Updates managed keys in the environment file, renders the in-guest
  # nftables egress backstop, persistent journald, and two hardened systemd USER
  # units: the agent gateway (hermes-gateway.service) and the dashboard web UI
  # (hermes-dashboard.service), so both survive reboot/reprovision.
  # Run order: install (egress open) → lock egress → configure.
  # (Formerly the hermes_agent role's tasks/configure.yml, inlined here.)
  #
  # Target only the host AAP passes via ansible_limit (matches linux_baseline);
  # `hosts: all` would run the Hermes configure phase across the whole fleet.
  hosts: "{{ ansible_limit | default('hermes-hermes') }}"
  become: true
  vars:
    hermes_user: hermes
    hermes_home: /home/hermes
    hermes_state_mount: "{{ hermes_home }}/.hermes"
    hermes_terminal_backend_image: ghcr.io/igou-io/igou-devenv
    hermes_terminal_backend_image_ref: "{{ hermes_terminal_backend_image }}:{{ hermes_terminal_backend_image_tag }}"
    hermes_terminal_backend_image_prune_old_tags: true
    hermes_terminal_backend_container_user: igou
    hermes_terminal_backend_container_uid: 1000
    hermes_terminal_backend_container_gid: 1000
    hermes_terminal_backend_container_home: /home/igou
    hermes_terminal_backend_container_shell: /usr/bin/bash
    hermes_terminal_backend_container_bash_env: "{{ hermes_terminal_backend_container_home }}/.bashrc"
    # In-guest nftables coarse egress backstop CIDR (OVN EgressFirewall is the real
    # control); allowed on tcp/8080 for the in-cluster LLM service.
    hermes_cluster_service_cidr: "172.30.0.0/16"
    # Dashboard hardening: native BasicAuthProvider (scrypt password gate, no OAuth
    # IDP / Nous Portal) + file-browser confinement. Auth values are sourced from
    # `hermes_env_values` in group_vars/hermes.yml. Empty username = the auth
    # provider is a no-op (dashboard unit stays down, fail closed).
    hermes_dashboard_files_root: "{{ hermes_state_mount }}/dashboard-files"
    # The dashboard web UI runs as a managed systemd --user unit
    # (hermes-dashboard.service) so it survives reboot/reprovision and self-restarts
    # — replacing the prior out-of-band `nohup hermes dashboard`, which a rebuild
    # silently wiped. It binds non-loopback behind the BasicAuthProvider and is only
    # enabled when an auth username is set (fail closed — see the start task below).
    hermes_dashboard_host: "0.0.0.0"
    hermes_dashboard_port: 9119
    hermes_terminal_config:
      backend: docker
      docker_image: "{{ hermes_terminal_backend_image_ref }}"
      cwd: /workspace
      timeout: 300
      docker_mount_cwd_to_workspace: false
      docker_persist_across_processes: false
      docker_orphan_reaper: true
      lifetime_seconds: 1800
      container_cpu: 4
      container_memory: 8192
      container_persistent: true
      docker_run_as_host_user: false
      docker_env:
        HOME: "{{ hermes_terminal_backend_container_home }}"
        BASH_ENV: "{{ hermes_terminal_backend_container_bash_env }}"
        PYTHONUNBUFFERED: "1"
      docker_forward_env:
        - GITHUB_TOKEN
        - GH_TOKEN
        - OPENAI_API_KEY
        - ANTHROPIC_API_KEY
        - OPENCODE_GO_API_KEY
      docker_extra_args:
        - "--userns=keep-id:uid={{ hermes_terminal_backend_container_uid }},gid={{ hermes_terminal_backend_container_gid }}"
        - "--user={{ hermes_terminal_backend_container_uid }}:{{ hermes_terminal_backend_container_gid }}"
      docker_volumes:
        - "/home/hermes/agent-repos:/workspace:Z"
        - "/home/hermes/.hermes/cache/documents:/output:Z"
        - "/home/hermes/.gitconfig:{{ hermes_terminal_backend_container_home }}/.gitconfig:ro,Z"
        - "/home/hermes/.ssh:{{ hermes_terminal_backend_container_home }}/.ssh:ro,Z"
        - "/home/hermes/.kube:{{ hermes_terminal_backend_container_home }}/.kube:ro,Z"
        - "/home/hermes/.claude:{{ hermes_terminal_backend_container_home }}/.claude:Z"
        - "/home/hermes/.claude.json:{{ hermes_terminal_backend_container_home }}/.claude.json:Z"
        - "/home/hermes/.codex:{{ hermes_terminal_backend_container_home }}/.codex:Z"
        - "/home/hermes/.config/opencode:{{ hermes_terminal_backend_container_home }}/.config/opencode:Z"
        - "/home/hermes/.local/share/opencode:{{ hermes_terminal_backend_container_home }}/.local/share/opencode:Z"
        - "/home/hermes/.config/gh:{{ hermes_terminal_backend_container_home }}/.config/gh:Z"
        - "/home/hermes/.config/argocd:{{ hermes_terminal_backend_container_home }}/.config/argocd:Z"
        - "/home/hermes/.config/cursor:{{ hermes_terminal_backend_container_home }}/.config/cursor:ro,Z"
        - "/home/hermes/.cursor:{{ hermes_terminal_backend_container_home }}/.cursor:Z"
        - "/home/hermes/.terraform.d:{{ hermes_terminal_backend_container_home }}/.terraform.d:Z"
  tasks:
    - name: Update managed Hermes environment values
      ansible.builtin.lineinfile:
        dest: "{{ hermes_state_mount }}/.env"
        regexp: "^{{ item.key | regex_escape }}="
        line: "{{ item.key }}={{ item.value }}"
        create: true
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0600"
      become: true
      loop: "{{ hermes_env_values | dict2items | rejectattr('value', 'equalto', '') | list }}"
      no_log: true
      notify:
        - Restart the Hermes gateway user unit
        - Restart the Hermes dashboard user unit

    - name: Map legacy Hermes devenv image tag to terminal backend image tag
      ansible.builtin.set_fact:
        hermes_terminal_backend_image_tag: "{{ hermes_devenv_image_tag }}"
      when:
        - hermes_terminal_backend_image_tag is not defined
        - hermes_devenv_image_tag is defined

    - name: Require pinned Hermes terminal backend image tag
      ansible.builtin.assert:
        that:
          - hermes_terminal_backend_image is defined
          - hermes_terminal_backend_image | default('') | length > 0
          - hermes_terminal_backend_image_tag is defined
          - hermes_terminal_backend_image_tag | default('') | length > 0
          - hermes_terminal_backend_image_tag != "latest"
        fail_msg: >-
          hermes_terminal_backend_image and hermes_terminal_backend_image_tag must be
          set by inventory/group_vars before configure.yml writes the Hermes
          terminal runtime config.
          Do not use latest for the Hermes runtime image.

    - name: Resolve the hermes uid
      ansible.builtin.getent:
        database: passwd
        key: "{{ hermes_user }}"
      become: true

    - name: Set Hermes rootless Podman environment
      ansible.builtin.set_fact:
        hermes_uid: "{{ ansible_facts.getent_passwd[hermes_user][1] }}"
        hermes_podman_environment:
          XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[hermes_user][1] }}"

    # Rootless Podman needs the hermes user manager and /run/user/<uid> before
    # any pull/prewarm/prune task uses XDG_RUNTIME_DIR. loginctl enables linger
    # for future boots, and starting user@<uid>.service makes the runtime present
    # immediately on fresh VMs.
    - name: Ensure the hermes user has systemd linger enabled
      ansible.builtin.command:
        cmd: "loginctl enable-linger {{ hermes_user }}"
      args:
        creates: "/var/lib/systemd/linger/{{ hermes_user }}"
      become: true

    - name: Ensure the hermes user manager is running
      ansible.builtin.systemd:
        name: "user@{{ hermes_uid }}.service"
        state: started
      become: true

    - name: Manage Hermes terminal backend image lifecycle
      when: hermes_terminal_backend_image_pre_pull | default(false) | bool
      block:
        - name: Pre-pull Hermes terminal backend image
          containers.podman.podman_image:
            name: "{{ hermes_terminal_backend_image_ref }}"
            state: present
            pull: true
            executable: /usr/bin/podman
          become: true
          become_user: "{{ hermes_user }}"
          become_flags: "-i"
          environment: "{{ hermes_podman_environment }}"

        - name: Pre-warm Hermes terminal backend image with rootless Podman keep-id mapping
          ansible.builtin.command:
            cmd: >-
              timeout --kill-after=30s 10m
              podman run --rm
              --entrypoint {{ hermes_terminal_backend_container_shell }}
              --userns=keep-id:uid={{ hermes_terminal_backend_container_uid }},gid={{ hermes_terminal_backend_container_gid }}
              --user={{ hermes_terminal_backend_container_uid }}:{{ hermes_terminal_backend_container_gid }}
              -e HOME={{ hermes_terminal_backend_container_home }}
              -e BASH_ENV={{ hermes_terminal_backend_container_bash_env }}
              {{ hermes_terminal_backend_image_ref }}
              -lc 'whoami; id -u; id -g; pwd'
          become: true
          become_user: "{{ hermes_user }}"
          become_flags: "-i"
          environment: "{{ hermes_podman_environment }}"
          register: hermes_terminal_backend_image_prewarm
          changed_when: false
          failed_when: >-
            hermes_terminal_backend_image_prewarm.rc != 0
            or (hermes_terminal_backend_image_prewarm.stdout_lines | default([]) | length) < 3
            or hermes_terminal_backend_image_prewarm.stdout_lines[0] != hermes_terminal_backend_container_user
            or hermes_terminal_backend_image_prewarm.stdout_lines[1] != (hermes_terminal_backend_container_uid | string)
            or hermes_terminal_backend_image_prewarm.stdout_lines[2] != (hermes_terminal_backend_container_gid | string)

        - name: Manage old Hermes terminal backend image tags
          when: hermes_terminal_backend_image_prune_old_tags | default(true) | bool
          block:
            - name: Gather local Hermes terminal backend image tags
              containers.podman.podman_image_info:
                executable: /usr/bin/podman
              become: true
              become_user: "{{ hermes_user }}"
              become_flags: "-i"
              environment: "{{ hermes_podman_environment }}"
              register: hermes_terminal_backend_image_info

            - name: Initialize local Hermes terminal backend image reference list
              ansible.builtin.set_fact:
                hermes_terminal_backend_local_image_refs: []

            - name: Build local Hermes terminal backend image reference list
              ansible.builtin.set_fact:
                hermes_terminal_backend_local_image_refs: >-
                  {{
                    hermes_terminal_backend_local_image_refs
                    + (item.RepoTags | default([], true))
                    + (item.Names | default([], true))
                  }}
              loop: "{{ hermes_terminal_backend_image_info.images | default([]) }}"
              loop_control:
                label: "{{ item.Id | default('unknown') }}"

            - name: Require desired Hermes terminal backend image to be local before pruning
              ansible.builtin.assert:
                that:
                  - hermes_terminal_backend_image_ref in (hermes_terminal_backend_local_image_refs | unique | list)
                fail_msg: >-
                  Refusing to prune old Hermes terminal backend image tags because
                  {{ hermes_terminal_backend_image_ref }} is not present in the local
                  rootless Podman image store for {{ hermes_user }}.

            - name: Set old Hermes terminal backend image tag list
              ansible.builtin.set_fact:
                hermes_terminal_backend_old_image_refs: >-
                  {{
                    hermes_terminal_backend_local_image_refs
                    | select('match', '^' ~ (hermes_terminal_backend_image | regex_escape) ~ ':[^:]+$')
                    | reject('equalto', hermes_terminal_backend_image_ref)
                    | unique
                    | list
                  }}

            - name: Prune old Hermes terminal backend image tags
              containers.podman.podman_image:
                name: "{{ item }}"
                state: absent
                force: true
                executable: /usr/bin/podman
              become: true
              become_user: "{{ hermes_user }}"
              become_flags: "-i"
              environment: "{{ hermes_podman_environment }}"
              loop: "{{ hermes_terminal_backend_old_image_refs }}"
              loop_control:
                label: "{{ item }}"

    # Confined root for the dashboard file browser (HERMES_DASHBOARD_FILES_ROOT) —
    # locks /api/files to this dir instead of allowing arbitrary host file read.
    - name: Ensure the dashboard file-browser root exists
      ansible.builtin.file:
        path: "{{ hermes_dashboard_files_root }}"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0700"
      become: true

    - name: Check Hermes config.yaml
      ansible.builtin.stat:
        path: "{{ hermes_state_mount }}/config.yaml"
      register: hermes_config_yaml_stat
      become: true

    - name: Read Hermes config.yaml
      ansible.builtin.slurp:
        src: "{{ hermes_state_mount }}/config.yaml"
      register: hermes_config_yaml_slurp
      when: hermes_config_yaml_stat.stat.exists
      become: true

    - name: Normalize existing Hermes config content
      ansible.builtin.set_fact:
        hermes_config_yaml_content: >-
          {{
            (
              hermes_config_yaml_slurp.content | default('') | b64decode | trim
            )
            if hermes_config_yaml_stat.stat.exists else ''
          }}

    - name: Parse existing Hermes config
      ansible.builtin.set_fact:
        hermes_existing_config: >-
          {{
            (
              hermes_config_yaml_content | from_yaml
            )
            if (hermes_config_yaml_content | length > 0) else {}
          }}

    - name: Build managed Hermes config with terminal backend
      ansible.builtin.set_fact:
        hermes_merged_config: >-
          {{
            (hermes_existing_config | default({}, true))
            | combine({'terminal': hermes_terminal_config}, recursive=True)
          }}

    - name: Write merged Hermes config.yaml
      ansible.builtin.copy:
        dest: "{{ hermes_state_mount }}/config.yaml"
        content: "{{ hermes_merged_config | to_nice_yaml(indent=2, sort_keys=false) }}"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0600"
      become: true
      notify:
        - Restart the Hermes gateway user unit
        - Restart the Hermes dashboard user unit

    - name: Assert merged Hermes terminal backend config is present
      ansible.builtin.assert:
        that:
          - hermes_merged_config.terminal.backend == "docker"
          - hermes_merged_config.terminal.docker_image == hermes_terminal_backend_image_ref
          - hermes_merged_config.terminal.docker_env.HOME == hermes_terminal_backend_container_home
          - hermes_merged_config.terminal.docker_env.BASH_ENV == hermes_terminal_backend_container_bash_env
          - ("--userns=keep-id:uid=" ~ hermes_terminal_backend_container_uid ~ ",gid=" ~ hermes_terminal_backend_container_gid) in hermes_merged_config.terminal.docker_extra_args
          - ("--user=" ~ hermes_terminal_backend_container_uid ~ ":" ~ hermes_terminal_backend_container_gid) in hermes_merged_config.terminal.docker_extra_args
          - "'/home/hermes/agent-repos:/workspace:Z' in hermes_merged_config.terminal.docker_volumes"

    - name: Ensure the nftables drop-in directory exists
      ansible.builtin.file:
        path: /etc/nftables.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      become: true

    - name: Render the Hermes egress nftables ruleset
      ansible.builtin.template:
        src: hermes-egress.nft.j2
        dest: /etc/nftables.d/hermes-egress.nft
        owner: root
        group: root
        mode: "0644"
      become: true
      register: hermes_nft_ruleset

    - name: Ensure /etc/sysconfig/nftables.conf includes the drop-in
      ansible.builtin.lineinfile:
        path: /etc/sysconfig/nftables.conf
        line: 'include "/etc/nftables.d/hermes-egress.nft"'
        create: true
        owner: root
        group: root
        mode: "0644"
      become: true

    - name: Enable and start the nftables service for boot-time persistence
      ansible.builtin.systemd:
        name: nftables
        enabled: true
        state: started
      become: true

    - name: Validate the Hermes egress ruleset (dry-run) before loading
      ansible.builtin.command:
        cmd: nft -c -f /etc/nftables.d/hermes-egress.nft
      become: true
      changed_when: false

    # Deliberately a task (not a handler): the load is an explicit, in-order step
    # — render → dry-run validate → load — so the preceding `nft -c` catches an
    # invalid ruleset before this ever applies it. noqa silences the no-handler
    # idiom (the role formerly sat in .ansible-lint exclude_paths; inlined here it
    # is linted, and converting to a handler would defer the load to play-end).
    - name: Load the Hermes egress ruleset now  # noqa: no-handler
      ansible.builtin.command:
        cmd: nft -f /etc/nftables.d/hermes-egress.nft
      become: true
      when: hermes_nft_ruleset is changed
      changed_when: true

    # NOTE: ~/.hermes/skills is intentionally left to the installer. Do NOT chmod it
    # read-only — Hermes's autonomous skill creation is a core feature and a 0555
    # clamp would break it (and is not real immutability anyway). Proper immutable,
    # Git-gated skills are deferred §5.5 work.

    - name: Ensure the hermes user systemd unit directory exists
      ansible.builtin.file:
        path: "{{ hermes_home }}/.config/systemd/user"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0755"
      become: true

    - name: Remove the legacy Hermes gateway user unit name
      ansible.builtin.file:
        path: "{{ hermes_home }}/.config/systemd/user/hermes.service"
        state: absent
      become: true
      notify: Restart the Hermes gateway user unit

    - name: Ensure the Hermes gateway user unit drop-in directory exists
      ansible.builtin.file:
        path: "{{ hermes_home }}/.config/systemd/user/hermes-gateway.service.d"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0755"
      become: true

    - name: Remove the temporary dashboard Podman runtime test drop-in
      ansible.builtin.file:
        path: "{{ hermes_home }}/.config/systemd/user/hermes-dashboard.service.d/90-podman-runtime-test.conf"
        state: absent
      become: true
      notify: Restart the Hermes dashboard user unit

    - name: Render the Hermes gateway systemd user unit
      ansible.builtin.template:
        src: hermes-gateway.service.j2
        dest: "{{ hermes_home }}/.config/systemd/user/hermes-gateway.service"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0644"
      become: true
      notify: Restart the Hermes gateway user unit

    - name: Render the Hermes gateway Podman runtime drop-in
      ansible.builtin.template:
        src: hermes-gateway-podman-runtime.conf.j2
        dest: "{{ hermes_home }}/.config/systemd/user/hermes-gateway.service.d/10-podman-runtime.conf"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0644"
      become: true
      notify: Restart the Hermes gateway user unit

    - name: Render the hardened Hermes dashboard systemd user unit
      ansible.builtin.template:
        src: hermes-dashboard.service.j2
        dest: "{{ hermes_home }}/.config/systemd/user/hermes-dashboard.service"
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        mode: "0644"
      become: true
      notify: Restart the Hermes dashboard user unit

    # Reload the per-user systemd manager so the new units are visible.
    # XDG_RUNTIME_DIR is required or `systemctl --user` can't find the bus
    # ("Failed to connect to bus").
    - name: Reload the hermes user systemd manager
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user
      become: true
      become_user: "{{ hermes_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[hermes_user][1] }}"

    - name: Enable and restart the Hermes gateway user unit
      ansible.builtin.systemd:
        name: hermes-gateway.service
        enabled: true
        state: restarted
        scope: user
      become: true
      become_user: "{{ hermes_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[hermes_user][1] }}"

    # The dashboard unit is enabled + started as the managed replacement for the
    # old out-of-band nohup, so it must come up on its own after a reboot/reprovision.
    # Guard on the auth username: with --host 0.0.0.0 and no --insecure, Hermes
    # refuses to bind unless the BasicAuthProvider is registered, so starting it
    # without creds would crash-loop. No username = the dashboard stays down
    # (fail closed) — pass the auth extra-vars to activate.
    - name: Enable and restart the Hermes dashboard user unit
      ansible.builtin.systemd:
        name: hermes-dashboard.service
        enabled: true
        state: restarted
        scope: user
      become: true
      become_user: "{{ hermes_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[hermes_user][1] }}"
      when: (hermes_env_values.HERMES_DASHBOARD_BASIC_AUTH_USERNAME | default('')) | length > 0

    - name: Ensure the journald drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"
      become: true

    # CentOS Stream 10 ships no /etc/systemd/journald.conf (the vendor default lives
    # in /usr/lib/systemd); use a drop-in so persistent storage applies regardless.
    - name: Make journald storage persistent (drop-in)
      ansible.builtin.copy:
        dest: /etc/systemd/journald.conf.d/10-hermes-persistent.conf
        content: |
          [Journal]
          Storage=persistent
        owner: root
        group: root
        mode: "0644"
      become: true
      notify: Restart journald
  handlers:
    - name: Restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted
      become: true

    # Pick up .env/unit changes in the running services. The `state: started`
    # tasks are idempotent and do NOT restart on their own, so a managed value
    # change otherwise sits on disk until something restarts the unit.
    - name: Restart the Hermes gateway user unit
      ansible.builtin.systemd:
        name: hermes-gateway.service
        state: restarted
        scope: user
      become: true
      become_user: "{{ hermes_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[hermes_user][1] }}"

    # Gated on the same auth username that gates the unit's start: no auth = no
    # running dashboard = nothing to restart.
    - name: Restart the Hermes dashboard user unit
      ansible.builtin.systemd:
        name: hermes-dashboard.service
        state: restarted
        scope: user
      become: true
      become_user: "{{ hermes_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[hermes_user][1] }}"
      when: (hermes_env_values.HERMES_DASHBOARD_BASIC_AUTH_USERNAME | default('')) | length > 0
