---
- name: Hermes guest convergence - Hermes setup
  # Hermes guest convergence - HERMES SETUP phase. Runs during the egress install
  # window because the installer and tirith download need network access. Assumes
  # setup-os.yml has mounted and owned the persistent Hermes state directory and
  # prepared the service user's shell.
  #
  # Run order: setup-os (egress open) -> setup-hermes (egress open) -> lock egress
  # -> configure.
  #
  # Target only the host AAP passes via ansible_limit (e.g. hermes-hermes from the
  # kubevirt dynamic inventory). `hosts: all` would run the installer across the
  # whole fleet - match the linux_baseline convention instead.
  hosts: "{{ ansible_limit | default('hermes-hermes') }}"
  become: true
  # Facts are gathered in pre_tasks after the connection is proven, so a
  # freshly provisioned VM (whose sshd may not be up yet) doesn't fail at play
  # start. For the live hermes VM the wait returns immediately.
  gather_facts: false
  vars:
    hermes_user: hermes
    hermes_home: /home/hermes
    hermes_state_mount: "{{ hermes_home }}/.hermes"
    hermes_install_url: "https://hermes-agent.nousresearch.com/install.sh"
    # Non-sudo / service-user install: skip browser automation. A working browser
    # needs system Chromium libs from `sudo npx playwright install-deps chromium`
    # (a sudo/admin step that doesn't fit the non-sudo service-user model), so the
    # installer would otherwise leave a non-functional Chromium in ~/.cache. Flip
    # to false only after running that admin step out of band.
    hermes_install_skip_browser: true
    # Install the Hermes agent + tirith scanner. Set false to converge only the
    # base state mount and the gated ghapp broker — used by the hermes-test
    # broker validation, where the full agent stack is not needed.
    hermes_install_agent: true
    # Default broker minting policy (deny-not-clamp). Override with
    # hermes_ghapp_policy. Scratch repos only until go-live widens it.
    hermes_ghapp_policy_default:
      allowed_repos:
        - david-igou/hermes_github_app_plugin
        - igou-io/igou-infrastructure
      max_permissions:
        contents: write
        pull_requests: write
        issues: write
      default_permissions:
        contents: read
  pre_tasks:
    - name: Wait for the VM's SSH to come up
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Gather facts (after the connection is proven)
      ansible.builtin.setup:

  tasks:
    # When the full agent stack is skipped (broker-only test convergence), the
    # linux_baseline step that normally creates the hermes service user isn't
    # run, so ensure it here. For the live hermes flow (agent install on),
    # setup-os already created the user and this is skipped.
    - name: Ensure the hermes service user exists (broker-only convergence)
      ansible.builtin.user:
        name: "{{ hermes_user }}"
        home: "{{ hermes_home }}"
        shell: /bin/bash
        create_home: true
        state: present
      become: true
      when: not (hermes_install_agent | bool)

    - name: Enable lingering for the hermes user (broker-only convergence)
      ansible.builtin.command:
        cmd: "loginctl enable-linger {{ hermes_user }}"
      args:
        creates: "/var/lib/systemd/linger/{{ hermes_user }}"
      become: true
      when: not (hermes_install_agent | bool)

    - name: Own the Hermes state mount to the hermes user
      ansible.builtin.file:
        path: "{{ hermes_state_mount }}"
        state: directory
        owner: "{{ hermes_user }}"
        group: "{{ hermes_user }}"
        recurse: true
      become: true

    - name: Install Hermes Agent as the hermes user
      ansible.builtin.shell:
        # The installer prompts interactively (setup wizard + "install gateway as a
        # service?") and falls back to /dev/tty even with no TTY, hanging under Ansible.
        # --non-interactive --skip-setup runs it unattended; --skip-browser keeps it
        # non-sudo (hermes_install_skip_browser).
        cmd: >-
          set -o pipefail && curl -fsSL {{ hermes_install_url }}
          | bash -s -- --non-interactive --skip-setup{{ ' --skip-browser' if hermes_install_skip_browser else '' }}
        creates: "{{ hermes_home }}/.local/bin/hermes"
        executable: /bin/bash
      become: true
      become_user: "{{ hermes_user }}"
      # hermes is a service user that may have a nologin shell; -i forces a login
      # shell so the install script gets a sane $HOME/$PATH environment.
      become_flags: '-i'
      changed_when: true   # only runs when 'creates' target is absent
      when: hermes_install_agent | bool

    - name: Confirm the Hermes CLI and capture its version
      ansible.builtin.command:
        cmd: "{{ hermes_home }}/.local/bin/hermes --version"
      become: true
      become_user: "{{ hermes_user }}"
      become_flags: '-i'
      register: hermes_version
      changed_when: false
      when: hermes_install_agent | bool

    # tirith (pre-exec command scanner) is a GitHub-released binary that Hermes
    # normally auto-downloads on demand - but that needs the network, so it MUST be
    # fetched here in the egress window: at runtime (egress locked) the on-demand
    # fetch fails, and with security.tirith_fail_open:false that would block every
    # command. Pull the same release artifact Hermes uses, with standard modules
    # (no private Hermes API / venv coupling). Pin a tag instead of 'latest' for a
    # reproducible, supply-chain-stable binary if desired.
    - name: Check whether the tirith scanner is already installed
      ansible.builtin.stat:
        path: "{{ hermes_state_mount }}/bin/tirith"
      register: hermes_tirith_bin
      become: true
      when: hermes_install_agent | bool

    - name: Install the tirith pre-exec command scanner from its GitHub release
      when:
        - hermes_install_agent | bool
        - not (hermes_tirith_bin.stat.exists | default(false))
      become: true
      become_user: "{{ hermes_user }}"
      vars:
        # arch -> release triple (from tirith_security.py:_detect_target)
        _tirith_target: >-
          {{ {'x86_64': 'x86_64-unknown-linux-gnu',
              'aarch64': 'aarch64-unknown-linux-gnu'}[ansible_architecture] }}
        _tirith_base: "https://github.com/sheeki03/tirith/releases/latest/download"
      block:
        - name: Ensure the Hermes bin directory exists
          ansible.builtin.file:
            path: "{{ hermes_state_mount }}/bin"
            state: directory
            mode: "0755"

        - name: Download + SHA-256-verify the tirith release tarball
          ansible.builtin.get_url:
            url: "{{ _tirith_base }}/tirith-{{ _tirith_target }}.tar.gz"
            dest: "{{ hermes_state_mount }}/tirith-{{ _tirith_target }}.tar.gz"
            checksum: "sha256:{{ _tirith_base }}/checksums.txt"
            mode: "0644"

        - name: Extract the tirith binary into the Hermes bin directory
          ansible.builtin.unarchive:
            src: "{{ hermes_state_mount }}/tirith-{{ _tirith_target }}.tar.gz"
            dest: "{{ hermes_state_mount }}/bin"
            remote_src: true
            include:
              - tirith
            mode: "0755"

    # ghapp GitHub App token broker (gated OFF; flip with
    # -e hermes_ghapp_broker_enabled=true). Runs in this egress-open phase
    # because the role pip-installs from GitHub. The broker holds the App key
    # as a dedicated ghbroker user and serves single-repo, permission-clamped
    # tokens over /run/ghbroker/ghbroker.sock; configure.yml (same gate) wires
    # the terminal containers to it and drops the static GH_TOKEN forward.
    # Egress: the hermes namespace EgressFirewall (igou-openshift
    # applications/hermes-agent) already allows github.com/api.github.com (+
    # GitHub CIDRs) and the PyPI Fastly edges, so both the role's pip install
    # and the broker's mint calls work under the locked policy.
    # The App identity/key default from 1Password (vault awx, the same vault
    # and onepassword-connect-token credential the dashboard auth already uses),
    # so a launch only needs the flag; each is still overridable via extra-vars.
    # These lookups evaluate only when the gate is on (task-scoped vars on a
    # skipped task are never rendered), so the live hermes run is untouched.
    - name: Deploy the ghapp GitHub App token broker
      ansible.builtin.include_role:
        name: david_igou.devhost.ghapp
      vars:
        _hermes_ghapp_item: "{{ hermes_ghapp_op_item | default('igou-hermes-github-app') }}"
        _hermes_ghapp_vault: "{{ hermes_ghapp_op_vault | default('awx') }}"
        ghapp_broker_enabled: true
        ghapp_broker_socket_group: "{{ hermes_user }}"
        ghapp_broker_client_id: >-
          {{ hermes_ghapp_client_id | default(lookup('community.general.onepassword',
             _hermes_ghapp_item, field='client_id', vault=_hermes_ghapp_vault), true) }}
        ghapp_broker_app_slug: "{{ hermes_ghapp_app_slug | default('igou-hermes') }}"
        ghapp_broker_installations: "{{ hermes_ghapp_installations | default(dict([['david-igou', lookup('community.general.onepassword', _hermes_ghapp_item, field='installation_id_david-igou', vault=_hermes_ghapp_vault)], ['igou-io', lookup('community.general.onepassword', _hermes_ghapp_item, field='installation_id_igou-io', vault=_hermes_ghapp_vault)]]), true) }}"
        ghapp_broker_private_key_content: >-
          {{ hermes_ghapp_private_key | default(lookup('community.general.onepassword',
             _hermes_ghapp_item, field='private_key', vault=_hermes_ghapp_vault), true) }}
        ghapp_broker_policy: "{{ hermes_ghapp_policy | default(hermes_ghapp_policy_default, true) }}"
      when: hermes_ghapp_broker_enabled | default(false) | bool
