---
# Validate the ghapp token broker end to end through the REAL Hermes agent:
# a one-shot `hermes chat -q` quick command, driven by a real model (opencode
# go), instructs the agent to run a mint command in its terminal. The agent's
# terminal tool dispatches an igou-devenv container (configured by configure.yml
# with GHAPP_BROKER_SOCKET + the broker socket mount), and mints a token via the
# broker from inside it. This exercises the whole platform — model, agent loop,
# terminal dispatch, broker — not just the terminal backend internals.
#
# Requires OPENCODE_GO_API_KEY in ~/.hermes/.env (configure.yml writes it from
# hermes_env_values). Target with ansible_limit=hermes-test-devenv.
- name: Verify the ghapp broker via a Hermes agent quick command (dispatched container)
  hosts: "{{ ansible_limit | default('hermes-test-devenv') }}"
  gather_facts: false
  vars:
    hermes_user: hermes
    hermes_home: /home/hermes
    hermes_state_mount: "{{ hermes_home }}/.hermes"
    hermes_verify_repo: igou-io/igou-infrastructure
    # opencode-go model for the agent. Override with hermes_verify_model.
    hermes_verify_model: minimax-m2.7
    # The quick command sent to the agent. It prints the in-container uid (proof
    # the terminal tool dispatched a container — the container's igou user is
    # 1000, the host hermes user is not) and mints via the broker socket.
    hermes_verify_prompt: >-
      Use your terminal tool to run this exact shell command once and report its
      complete raw stdout verbatim, with no commentary: printf 'DISPATCH uid=%s\n'
      "$(id -u)"; curl -s --unix-socket "$GHAPP_BROKER_SOCKET" -X POST
      http://broker/token -H 'Content-Type: application/json' -d
      '{"repo":"{{ hermes_verify_repo }}","permissions":{"contents":"read"}}'
  tasks:
    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Resolve the hermes uid
      ansible.builtin.getent:
        database: passwd
        key: "{{ hermes_user }}"
      become: true

    - name: Set hermes runtime facts
      ansible.builtin.set_fact:
        _hermes_uid: "{{ ansible_facts.getent_passwd[hermes_user][1] }}"

    - name: Assert OPENCODE_GO_API_KEY is present in the Hermes env
      ansible.builtin.command:
        cmd: "grep -q '^OPENCODE_GO_API_KEY=' {{ hermes_state_mount }}/.env"
      become: true
      changed_when: false

    # Runs the Hermes agent as the hermes user (rootless podman), sourcing the
    # managed .env for OPENCODE_GO_API_KEY. The agent uses the opencode-go model
    # and dispatches a terminal container per the config.yaml terminal backend.
    - name: Run a Hermes agent quick command that mints via the broker
      ansible.builtin.shell:
        cmd: >-
          set -a; . {{ hermes_state_mount }}/.env; set +a;
          exec {{ hermes_state_mount }}/hermes-agent/venv/bin/hermes chat
          -q {{ hermes_verify_prompt | quote }}
          --provider opencode-go -m {{ hermes_verify_model | quote }} --yolo
        chdir: "{{ hermes_home }}"
      become: true
      become_user: "{{ hermes_user }}"
      environment:
        HERMES_HOME: "{{ hermes_state_mount }}"
        HERMES_DOCKER_BINARY: /usr/bin/podman
        XDG_RUNTIME_DIR: "/run/user/{{ _hermes_uid }}"
      register: _hermes_agent
      changed_when: false
      # noqa command-instead-of-shell -- sources .env then execs the agent

    # Hermes redacts secrets in agent output, so the minted token is shown
    # truncated (e.g. ghs_5r...4BIU) — do NOT require the full token string.
    # The broker's own response fields (app_slug igou-hermes, the installation
    # id, the single scoped repo) are not redacted and conclusively prove a real
    # mint; DISPATCH uid=1000 proves it ran inside the dispatched container (the
    # container's igou user is 1000, the host hermes user is not); the ghs_
    # prefix confirms an installation token.
    - name: Assert the agent minted a real token from inside a dispatched container
      ansible.builtin.assert:
        that:
          - _hermes_agent.stdout is search('DISPATCH uid=1000')
          - _hermes_agent.stdout is search('ghs_')
          - _hermes_agent.stdout is search('"app_slug":\\s*"igou-hermes"')
          - _hermes_agent.stdout is search('igou-io/igou-infrastructure')
        fail_msg: >-
          The Hermes agent did not mint a real igou-hermes token from inside a
          dispatched container (expected DISPATCH uid=1000, a ghs_ token,
          app_slug igou-hermes, and the scoped repo). Agent output:
          {{ _hermes_agent.stdout | default('') }}
        success_msg: >-
          The Hermes agent (opencode-go/{{ hermes_verify_model }}) dispatched a
          terminal container (uid=1000) and minted a real igou-hermes token via
          the broker under SELinux enforcing.

    - name: Show the agent verification result
      ansible.builtin.debug:
        msg: "{{ _hermes_agent.stdout_lines | select('search', 'DISPATCH uid=|token|ghs_|app_slug') | list }}"
