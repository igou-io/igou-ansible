---
# Installs and configures nginx on Arch Linux, Ubuntu, and RHEL targets.
# RHEL 8+ ships nginx in AppStream; older RHEL needs EPEL.
#
# Override any variable below via inventory group_vars/host_vars or --extra-vars.
# Server blocks are defined in nginx_server_blocks; custom config snippets in
# nginx_custom_snippets.
- name: Install and configure nginx
  hosts: all
  become: true
  gather_facts: true

  vars:
    nginx_package: nginx
    nginx_service: nginx

    # Tuning
    nginx_worker_processes: auto
    nginx_worker_connections: 1024
    nginx_keepalive_timeout: 65
    nginx_client_max_body_size: 1m

    # Logging
    nginx_access_log: /var/log/nginx/access.log
    nginx_error_log: /var/log/nginx/error.log
    nginx_log_format: combined

    # SSL defaults (applied to every SSL-enabled server block)
    nginx_ssl_protocols: "TLSv1.2 TLSv1.3"
    nginx_ssl_ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
    nginx_ssl_prefer_server_ciphers: true
    nginx_ssl_session_cache: "shared:SSL:10m"

    # Default proxy headers used when a location has proxy_pass but no
    # explicit proxy_set_headers list.
    nginx_default_proxy_headers:
      - "Host $host"
      - "X-Real-IP $remote_addr"
      - "X-Forwarded-For $proxy_add_x_forwarded_for"
      - "X-Forwarded-Proto $scheme"

    # Server blocks -- list of dicts rendered into /etc/nginx/conf.d/<name>.conf.
    # Example:
    #   nginx_server_blocks:
    #     - name: mysite
    #       listen: 80
    #       server_name: example.com www.example.com
    #       root: /var/www/example.com
    #       index: index.html
    #       locations:
    #         - path: /
    #           directives:
    #             - try_files $uri $uri/ =404
    #     - name: app-proxy
    #       server_name: app.example.com
    #       ssl:
    #         enabled: true
    #         certificate: /etc/ssl/certs/app.crt
    #         certificate_key: /etc/ssl/private/app.key
    #         redirect_http: true
    #       locations:
    #         - path: /
    #           proxy_pass: http://127.0.0.1:3000
    nginx_server_blocks: []

    # Custom config snippets dropped into conf.d/.
    # Each entry needs `name` and `content` keys.
    nginx_custom_snippets: []

    # Remove distro-default site configs so they don't conflict.
    nginx_remove_default_site: true

    # Distro-specific paths for default site files to remove.
    _nginx_default_site_files:
      Archlinux: []
      Ubuntu:
        - /etc/nginx/sites-enabled/default
      RedHat:
        - /etc/nginx/conf.d/default.conf

  tasks:
    - name: Validate target distribution
      ansible.builtin.assert:
        that:
          - ansible_distribution in ['Archlinux', 'Ubuntu', 'RedHat']
        fail_msg: >-
          Unsupported distribution "{{ ansible_distribution }}" on
          {{ inventory_hostname }}. This playbook targets Arch Linux,
          Ubuntu, and RHEL only.

    - name: Install nginx
      ansible.builtin.package:
        name: "{{ nginx_package }}"
        state: present

    - name: Ensure conf.d directory exists
      ansible.builtin.file:
        path: /etc/nginx/conf.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Remove distro default site configs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ _nginx_default_site_files[ansible_distribution] | default([]) }}"
      when: nginx_remove_default_site
      notify: Reload nginx

    - name: Deploy main nginx.conf
      ansible.builtin.template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: "0644"
      notify: Reload nginx

    - name: Deploy server block configs
      ansible.builtin.template:
        src: templates/server_block.conf.j2
        dest: "/etc/nginx/conf.d/{{ item.name }}.conf"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ nginx_server_blocks }}"
      loop_control:
        label: "{{ item.name }}"
      notify: Reload nginx

    - name: Deploy custom config snippets
      ansible.builtin.copy:
        content: "{{ item.content }}"
        dest: "/etc/nginx/conf.d/{{ item.name }}.conf"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ nginx_custom_snippets }}"
      loop_control:
        label: "{{ item.name }}"
      notify: Reload nginx

    - name: Enable and start nginx
      ansible.builtin.service:
        name: "{{ nginx_service }}"
        state: started
        enabled: true

  handlers:
    - name: Validate nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false
      listen: Reload nginx

    - name: Reload nginx
      ansible.builtin.service:
        name: "{{ nginx_service }}"
        state: reloaded
      listen: Reload nginx
