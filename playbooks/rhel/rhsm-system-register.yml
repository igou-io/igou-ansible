---
- hosts: "{{ host | default('rhel') }}"
  become: true
  gather_facts: false
  vars:
    rhc_state: present
    rhc_insights:
      autoupdate: false
      remediation: absent
      state: present
    # rhsm_username / rhsm_password are defined in igou-inventory
    # group_vars/rhel.yml (companion PR), not in this playbook.
    rhc_auth:
      login:
        username: "{{ rhsm_username }}"
        password: "{{ rhsm_password }}"
    rhc_repositories:
      - {name: "rhel-9-for-x86_64-baseos-rpms", state: enabled}
      - {name: "rhel-9-for-x86_64-appstream-rpms", state: enabled}
  roles:
    - redhat.rhel_system_roles.rhc
  pre_tasks:
    - name: Wait for system to become reachable over ssh
      ansible.builtin.wait_for_connection:
        timeout: 90

    - name: Gather facts for first time
      ansible.builtin.setup:
