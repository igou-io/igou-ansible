---
# Smoke test: prove 1Password lookups work inside an AAP job. Attach a
# credential of type "Onepassword Connect" (injects OP_CONNECT_HOST +
# OP_CONNECT_TOKEN) to the job template; the play performs a real
# community.general.onepassword lookup against the awx vault and asserts a
# value came back — without ever printing it.
#
# Defaults read the `aap` item's `host` field (a URL, not a secret). Override
# per run to probe another item:
#   -e op_smoke_item=rb5009-api -e op_smoke_field=username
#
# AAP template: onepassword_smoke_test (config as code, igou-inventory
# group_vars/aap/job_templates.yml). Local run (OP_CONNECT_* in env):
#   ansible-playbook playbooks/aap/smoketest-onepassword.yml
- name: 1Password Connect smoke test
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    op_smoke_item: aap
    op_smoke_field: host
    op_smoke_vault: awx

  tasks:
    - name: Confirm the Connect injection is present
      ansible.builtin.assert:
        that:
          - lookup('ansible.builtin.env', 'OP_CONNECT_HOST') | length > 0
          - lookup('ansible.builtin.env', 'OP_CONNECT_TOKEN') | length > 0
        fail_msg: >-
          OP_CONNECT_HOST/OP_CONNECT_TOKEN are not set. Attach a credential of
          type "Onepassword Connect" to this job template.
        success_msg: "Connect env injected (host: {{ lookup('ansible.builtin.env', 'OP_CONNECT_HOST') }})"

    - name: Resolve a field from 1Password (value never logged)
      ansible.builtin.set_fact:
        _op_smoke_value: "{{ lookup('community.general.onepassword', op_smoke_item, field=op_smoke_field, vault=op_smoke_vault) }}"
      no_log: true

    - name: Assert the lookup returned a value
      ansible.builtin.assert:
        that:
          - _op_smoke_value | length > 0
        fail_msg: "Lookup of {{ op_smoke_item }}/{{ op_smoke_field }} returned empty."
        success_msg: >-
          1Password Connect lookup OK:
          op://{{ op_smoke_vault }}/{{ op_smoke_item }}/{{ op_smoke_field }}
          resolved ({{ _op_smoke_value | length }} chars).
