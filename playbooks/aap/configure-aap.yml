---
- name: Playbook to configure ansible controller post installation
  hosts: aap
  gather_facts: false
  tasks:

    - name: Configure AAP
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
      vars:
        assign_galaxy_credentials_to_org: false
        assign_default_ee_to_org: false
        # Inventory-source updates (git clone + kubevirt dynamic plugin) can
        # legitimately run past the collection's default 50x1s async wait —
        # observed: the igou_inventory_github sync finished successfully on
        # the AAP side seconds after the wait gave up. Widen all async waits.
        aap_configuration_async_retries: 120
        aap_configuration_async_delay: 2
