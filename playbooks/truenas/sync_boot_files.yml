---
# Sync boot files (cloud-init and kickstart) from igou-node-bootstrap to TrueNAS.
#
# This playbook copies cloud-init and kickstart files from the igou-node-bootstrap
# repository to configured destination directories on TrueNAS. These files are
# typically served by a web server for automated OS installation and configuration.
#
# Variables (group_vars/truenas.yml):
#   truenas_boot_files_source_dir — source directory (default: /home/igou/igou-node-bootstrap)
#   truenas_boot_files_dest_base  — base destination directory (default: /mnt/ssd/boot-files)
#   truenas_boot_files_owner       — file owner (default: 950)
#   truenas_boot_files_group       — file group (default: 950)
#
# Tags: cloud-init, kickstart, sync

- name: Sync boot files to TrueNAS
  hosts: truenas
  gather_facts: false
  become: true
  vars:
    _source_base: "{{ truenas_boot_files_source_dir | default('/home/igou/igou-node-bootstrap') }}"
    _dest_base: "{{ truenas_boot_files_dest_base | default('/mnt/ssd/public/boot-files') }}"
    _owner: "{{ truenas_boot_files_owner | default('950') }}"
    _group: "{{ truenas_boot_files_group | default('950') }}"
  tasks:

    # --- Cloud-init files --------------------------------------------------------

    - name: Ensure cloud-init destination directory exists
      ansible.builtin.file:
        path: "{{ _dest_base }}/cloud-init"
        state: directory
        mode: "0755"
        owner: "{{ _owner }}"
        group: "{{ _group }}"
      tags: [cloud-init, sync]

    - name: Sync cloud-init files
      ansible.builtin.copy:
        src: "{{ _source_base }}/cloud-init/"
        dest: "{{ _dest_base }}/cloud-init/"
        mode: "0655"
        directory_mode: "0755"
        owner: "{{ _owner }}"
        group: "{{ _group }}"
      tags: [cloud-init, sync]

    # --- Kickstart files ----------------------------------------------------------

    - name: Ensure kickstart destination directory exists
      ansible.builtin.file:
        path: "{{ _dest_base }}/kickstart"
        state: directory
        mode: "0755"
        owner: "{{ _owner }}"
        group: "{{ _group }}"
      tags: [kickstart, sync]

    - name: Sync kickstart files
      ansible.builtin.copy:
        src: "{{ _source_base }}/kickstart/"
        dest: "{{ _dest_base }}/kickstart/"
        mode: "0655"
        directory_mode: "0755"
        owner: "{{ _owner }}"
        group: "{{ _group }}"
      tags: [kickstart, sync]

    # --- Summary ------------------------------------------------------------------

    - name: Display synced directories
      ansible.builtin.debug:
        msg: |
          Boot files synced to: {{ _dest_base }}
          - cloud-init: {{ _dest_base }}/cloud-init
          - kickstart: {{ _dest_base }}/kickstart
      tags: [sync]
