---
# Deploy custom netboot.xyz menu files.
#
# This playbook copies files from a source directory to a destination directory.
# Typically used to copy custom iPXE menu files to the netbootxyz container's
# config/menus directory.
#
# Variables:
#   netbootxyz_source_dir - Source directory (default: relative to playbook)
#   netbootxyz_dest_dir   - Destination directory (required)

- name: Deploy netboot.xyz custom menus
  hosts: truenas
  gather_facts: false
  become: true
  vars:
    _netbootxyz_source_dir: "{{ netbootxyz_source_dir | default('/home/igou/igou-node-bootstrap/netbootxyz-menus') }}"
    _netbootxyz_dest_base: "{{ netbootxyz_dest_dir | default('/mnt/ssd/containers/netbootxyz/config/menus') }}"
  tasks:

    - name: Copy files to config/menus
      ansible.builtin.copy:
        src: "{{ _netbootxyz_source_dir }}/"
        dest: "{{ _netbootxyz_dest_base }}/"
        mode: "0644"
        directory_mode: "0755"
        owner: "1000"
        group: "1000"
      become: true

    - name: Copy files to config/menus/local  # Workaround for netbootxyz bug
      ansible.builtin.copy:
        src: "{{ _netbootxyz_source_dir }}/"
        dest: "{{ _netbootxyz_dest_base }}/local/"
        mode: "0644"
        directory_mode: "0755"
        owner: "1000"
        group: "1000"
      become: true
