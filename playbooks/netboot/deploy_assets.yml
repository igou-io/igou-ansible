---
# Manage netboot menu, kickstart/cloud-init seeds, and per-host PXE
# pins. Post-2026-05-11: assets live on the public nginx container
# (https://public.igou.systems/boot-files/); per-host pins live on
# rb5009 flash. The TrueNAS netbootxyz container is retired.
#
# Stages (each tag-gated):
#   preflight  — schema validation + HTTPS reachability.
#   render     — Jinja-render menu.ipxe + entries/ + per_host/ to .cache/.
#   push       — sync rendered + static text to public nginx; upload
#                per-host pin files and /ip tftp rows to rb5009.
#   fetch      — idempotent download of upstream ISO URLs into
#                netboot_public_root/iso/.
#   local      — copy locally-built kernels/initrds into
#                netboot_public_root/local/.
#   verify     — HTTPS probes for menu.ipxe + entries; rb5009 /file +
#                /ip tftp checks for pins; HEAD probes for ISO URLs.
#
# Inventory schema:
#   igou-inventory/group_vars/all/netboot.yml (netboot_public_*,
#   netboot_host_pins, netboot_entries).
#   igou-inventory/group_vars/routeros.yml (netboot_pin_flash_subdir).
#
# Common invocations:
#   ansible-playbook playbooks/netboot/deploy_assets.yml \
#     -i 'localhost ansible_connection=local,' \
#     -i igou-inventory/inventory.yaml
#   # menu touch-up, skip slow stages:
#   ansible-playbook playbooks/netboot/deploy_assets.yml \
#     -i 'localhost ansible_connection=local,' \
#     -i igou-inventory/inventory.yaml \
#     --tags render,push,verify

- name: Deploy netboot menu and assets
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Preflight stage
      ansible.builtin.import_tasks: tasks/preflight.yml
      tags: [preflight, render, push, fetch, local, verify, always]
    - name: Render stage
      ansible.builtin.import_tasks: tasks/render_menu.yml
      tags: [render]
    - name: Push text stage
      ansible.builtin.import_tasks: tasks/push_text.yml
      tags: [push]
    - name: Push pins to rb5009
      ansible.builtin.import_tasks: tasks/push_pins_rb5009.yml
      tags: [push]
    - name: Fetch binaries stage
      ansible.builtin.import_tasks: tasks/fetch_binaries.yml
      tags: [fetch]
    - name: Push local artifacts stage
      ansible.builtin.import_tasks: tasks/push_local_artifacts.yml
      tags: [local]
    - name: Verify stage
      ansible.builtin.import_tasks: tasks/verify.yml
      tags: [verify]
