---
# Render menu.ipxe + entries/<id>.ipxe + per_host/{MAC,HOSTNAME}-*.ipxe
# into the local cache at .cache/netboot-menus/. Push stage handles the
# upload to public nginx (menu.ipxe + entries) and rb5009 (per-host pins).

- name: Render — define cache root
  ansible.builtin.set_fact:
    _netboot_cache_dir: "{{ playbook_dir }}/../../.cache/netboot-menus"
  delegate_to: localhost
  # become: false on all localhost-delegated tasks — the AAP EE has no
  # sudo; controller-side render work never needs privilege.
  become: false
  run_once: true

- name: Render — wipe cache to avoid stale outputs
  ansible.builtin.file:
    path: "{{ _netboot_cache_dir }}"
    state: absent
  delegate_to: localhost
  become: false
  run_once: true

- name: Render — recreate cache subdirs
  ansible.builtin.file:
    path: "{{ _netboot_cache_dir }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - ""
    - entries
    - per_host
  delegate_to: localhost
  become: false
  run_once: true

- name: Render — top-level menu.ipxe
  ansible.builtin.template:
    src: menu.ipxe.j2
    dest: "{{ _netboot_cache_dir }}/menu.ipxe"
    mode: "0644"
  delegate_to: localhost
  become: false
  run_once: true

- name: Render — entries (kernel/local)
  ansible.builtin.template:
    src: entry-kernel.ipxe.j2
    dest: "{{ _netboot_cache_dir }}/entries/{{ item.id }}.ipxe"
    mode: "0644"
  vars:
    entry: "{{ item }}"
  loop: "{{ netboot_entries | selectattr('kind', 'in', ['kernel', 'local']) | list }}"
  loop_control:
    label: "{{ item.id }}"
  delegate_to: localhost
  become: false
  run_once: true

- name: Render — entries (iso)
  ansible.builtin.template:
    src: entry-iso.ipxe.j2
    dest: "{{ _netboot_cache_dir }}/entries/{{ item.id }}.ipxe"
    mode: "0644"
  vars:
    entry: "{{ item }}"
  loop: "{{ netboot_entries | selectattr('kind', 'equalto', 'iso') | list }}"
  loop_control:
    label: "{{ item.id }}"
  delegate_to: localhost
  become: false
  run_once: true

- name: Render — entries (chainload)
  ansible.builtin.template:
    src: entry-chainload.ipxe.j2
    dest: "{{ _netboot_cache_dir }}/entries/{{ item.id }}.ipxe"
    mode: "0644"
  vars:
    entry: "{{ item }}"
  loop: "{{ netboot_entries | selectattr('kind', 'equalto', 'chainload') | list }}"
  loop_control:
    label: "{{ item.id }}"
  delegate_to: localhost
  become: false
  run_once: true

- name: Render — host pins (MAC file)
  ansible.builtin.template:
    src: host-mac.ipxe.j2
    dest: "{{ _netboot_cache_dir }}/per_host/MAC-{{ item.mac | lower | replace(':', '') }}.ipxe"
    mode: "0644"
  vars:
    pin: "{{ item }}"
  loop: "{{ netboot_host_pins }}"
  loop_control:
    label: "{{ item.mac }}"
  delegate_to: localhost
  become: false
  run_once: true

- name: Render — host pins (HOSTNAME alias chains to MAC file)
  # Same-server bare-name chain: HOSTNAME-*.ipxe and MAC-*.ipxe both
  # live as /ip tftp rows at rb5009 (mapped to flash files under
  # {{ netboot_pin_flash_subdir }}/). A bare filename chain inside the
  # HOSTNAME file resolves via TFTP from the same rb5009 server and
  # hits the MAC file's /ip tftp row.
  ansible.builtin.copy:
    dest: "{{ _netboot_cache_dir }}/per_host/HOSTNAME-{{ item.hostname }}.ipxe"
    content: |
      #!ipxe
      ### Managed by playbooks/netboot/deploy_assets.yml — do not edit manually.
      ### Host alias: hostname={{ item.hostname }} -> mac={{ item.mac }}
      chain MAC-{{ item.mac | lower | replace(':', '') }}.ipxe
    mode: "0644"
  loop: "{{ netboot_host_pins | selectattr('hostname', 'defined') | list }}"
  loop_control:
    label: "{{ item.hostname }}"
  delegate_to: localhost
  become: false
  run_once: true

- name: Render — summary
  ansible.builtin.find:
    paths: "{{ _netboot_cache_dir }}"
    file_type: file
    recurse: true
  register: _render_summary
  delegate_to: localhost
  become: false
  run_once: true

- name: Render — list rendered files
  ansible.builtin.debug:
    msg: "{{ _render_summary.files | map(attribute='path') | map('regex_replace', '^.*/.cache/netboot-menus/', '') | sort | list }}"
  delegate_to: localhost
  become: false
  run_once: true
