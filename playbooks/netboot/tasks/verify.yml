---
# Verify stage.
#   1. HTTPS-probe menu.ipxe + each entry on public.igou.systems.
#   2. Confirm each pin file exists on rb5009 with a matching /ip tftp row.
#   3. HEAD-probe each ISO entry URL is reachable (sanity check for the
#      fetch stage's idempotency).

- name: Verify — HTTPS probe menu.ipxe on public nginx
  ansible.builtin.uri:
    url: "{{ netboot_public_url }}/menu.ipxe"
    status_code: 200
    timeout: 10
    validate_certs: true
  delegate_to: localhost
  # become: false on all localhost-delegated tasks — the AAP EE has no
  # sudo; controller-side HTTPS probes never need privilege.
  become: false
  run_once: true
  changed_when: false

- name: Verify — HTTPS probe each entry
  ansible.builtin.uri:
    url: "{{ netboot_public_url }}/entries/{{ item.id }}.ipxe"
    status_code: 200
    timeout: 10
    validate_certs: true
  delegate_to: localhost
  become: false
  loop: "{{ netboot_entries | default([]) }}"
  loop_control:
    label: "{{ item.id }}"
  changed_when: false

- name: Verify — pin file present on rb5009 for each MAC
  community.routeros.command:
    commands:
      - >-
        /file print count-only where
        name="{{ netboot_pin_flash_subdir }}/MAC-{{ item.mac | lower | replace(':', '') }}.ipxe"
  register: _verify_pin_file_count
  changed_when: false
  delegate_to: rb5009.igou.systems
  loop: "{{ netboot_host_pins | default([]) }}"
  loop_control:
    label: "{{ item.mac }}"

- name: Verify — pin file MUST be present on rb5009
  ansible.builtin.assert:
    that:
      - (item.stdout[0] | trim | int) == 1
    fail_msg: >-
      Pin file MAC-{{ item.item.mac | lower | replace(':', '') }}.ipxe missing
      at {{ netboot_pin_flash_subdir }}/ on rb5009. Push stage may have failed.
  loop: "{{ _verify_pin_file_count.results }}"
  loop_control:
    label: "{{ item.item.mac }}"

- name: Verify — /ip tftp row present for each pin MAC
  community.routeros.command:
    commands:
      - >-
        /ip tftp print count-only where
        req-filename="MAC-{{ item.mac | lower | replace(':', '') }}.ipxe" and
        real-filename="{{ netboot_pin_flash_subdir }}/MAC-{{ item.mac | lower | replace(':', '') }}.ipxe"
  register: _verify_pin_tftp_count
  changed_when: false
  delegate_to: rb5009.igou.systems
  loop: "{{ netboot_host_pins | default([]) }}"
  loop_control:
    label: "{{ item.mac }}"

- name: Verify — /ip tftp row MUST be present for each pin MAC
  ansible.builtin.assert:
    that:
      - (item.stdout[0] | trim | int) == 1
    fail_msg: >-
      /ip tftp row for req-filename=MAC-{{ item.item.mac | lower | replace(':', '') }}.ipxe
      missing or wrong real-filename. Binary's :tftpmenu chain will not land.
  loop: "{{ _verify_pin_tftp_count.results }}"
  loop_control:
    label: "{{ item.item.mac }}"

- name: Verify — pin file present on rb5009 for each HOSTNAME (when set)
  community.routeros.command:
    commands:
      - >-
        /file print count-only where
        name="{{ netboot_pin_flash_subdir }}/HOSTNAME-{{ item.hostname }}.ipxe"
  register: _verify_pin_hostname_file_count
  changed_when: false
  delegate_to: rb5009.igou.systems
  loop: "{{ netboot_host_pins | default([]) | selectattr('hostname', 'defined') | list }}"
  loop_control:
    label: "{{ item.hostname }}"

- name: Verify — HOSTNAME pin file MUST be present on rb5009 (when set)
  ansible.builtin.assert:
    that:
      - (item.stdout[0] | trim | int) == 1
    fail_msg: >-
      Pin file HOSTNAME-{{ item.item.hostname }}.ipxe missing on rb5009.
  loop: "{{ _verify_pin_hostname_file_count.results }}"
  loop_control:
    label: "{{ item.item.hostname }}"

- name: Verify — each ISO entry URL is reachable
  ansible.builtin.uri:
    url: "{{ item.url }}"
    method: HEAD
    status_code: [200, 206, 302]
    timeout: 15
  delegate_to: localhost
  become: false
  loop: "{{ netboot_entries | default([]) | selectattr('kind', 'equalto', 'iso') | list }}"
  loop_control:
    label: "{{ item.id }}"
  changed_when: false

- name: Verify — summary
  ansible.builtin.debug:
    msg:
      - "menu.ipxe verified over HTTPS at {{ netboot_public_url }}/menu.ipxe"
      - "entries verified: {{ netboot_entries | length }}"
      - "host pins verified on rb5009: {{ netboot_host_pins | length }}"
      - "fragments: {{ _netboot_fragments | length }}"
