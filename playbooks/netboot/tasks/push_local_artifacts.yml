---
# Copy locally-built kernel/initrd artifacts into the public nginx tree.
# Source path comes from the entry's kernel_src/initrd_src; destination is
# {{ netboot_public_root }}/local/<id>/. Idempotent via copy's checksum comparison.

- name: Local — define filtered list
  ansible.builtin.set_fact:
    _netboot_local_entries: "{{ netboot_entries | selectattr('kind', 'equalto', 'local') | list }}"

- name: Local — ensure /assets/local/<id> exists
  ansible.builtin.file:
    path: "{{ netboot_public_root }}/local/{{ item.id }}"
    state: directory
    owner: "950"
    group: "950"
    mode: "0755"
  loop: "{{ _netboot_local_entries }}"
  loop_control:
    label: "{{ item.id }}"

- name: Local — copy vmlinuz
  ansible.builtin.copy:
    src: "{{ item.kernel_src }}"
    dest: "{{ netboot_public_root }}/local/{{ item.id }}/vmlinuz"
    owner: "950"
    group: "950"
    mode: "0644"
  loop: "{{ _netboot_local_entries }}"
  loop_control:
    label: "{{ item.id }} vmlinuz"

- name: Local — copy initrd
  ansible.builtin.copy:
    src: "{{ item.initrd_src }}"
    dest: "{{ netboot_public_root }}/local/{{ item.id }}/initrd"
    owner: "950"
    group: "950"
    mode: "0644"
  loop: "{{ _netboot_local_entries }}"
  loop_control:
    label: "{{ item.id }} initrd"
