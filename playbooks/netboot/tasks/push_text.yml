---
# Push rendered menu.ipxe + entries + static text content to the public
# nginx container's docroot at {{ netboot_public_root }}.
#
# Subdirs we own (scoped synchronize with delete=true on the inventoried
# ones):
#   menu.ipxe                         — rendered fallback menu
#   entries/                          — rendered netboot_entries
#   fragments/                        — hand-written .ipxe fragments
#   kickstart/                        — kickstart files
#   cloud-init/                       — cloud-init seeds
#
# Subdirs we DON'T touch (other playbooks own them):
#   ocp/                              — populated manually or via ocp build
#   ocp-add-node/                     — written by playbooks/openshift/add_node_iso.yml
#   images/                           — written by armbian build playbook
#   iso/                              — written by deploy_assets fetch stage
#   cache/                            — written by deploy_assets local stage
#
# Per-host pin files (MAC-*.ipxe, HOSTNAME-*.ipxe) are NOT pushed here --
# they go to rb5009 in tasks/push_pins_rb5009.yml.

- name: Push — define paths
  ansible.builtin.set_fact:
    _netboot_public_dst: "{{ netboot_public_root }}"
    _netboot_cache_dir: "{{ playbook_dir }}/../../.cache/netboot-menus"
    _netboot_fragments_src: "{{ playbook_dir }}/files/fragments"
    _netboot_kickstart_src: "{{ playbook_dir }}/files/kickstart"
    _netboot_cloudinit_src: "{{ playbook_dir }}/files/cloud-init"

- name: Push — verify render cache exists (run --tags render first if this fails)
  ansible.builtin.stat:
    path: "{{ _netboot_cache_dir }}/menu.ipxe"
  register: _netboot_cache_check
  delegate_to: localhost
  run_once: true

- name: Push — assert render cache is populated
  ansible.builtin.assert:
    that:
      - _netboot_cache_check.stat.exists
    fail_msg: |
      Render cache not found at {{ _netboot_cache_dir }}/menu.ipxe. Run
      with --tags render,push (or no tag filter) so render produces the
      cache before push reads it.
  delegate_to: localhost
  run_once: true

- name: Push — ensure destination subdirs exist on public host
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "950"
    group: "950"
    mode: "0755"
  loop:
    - "{{ _netboot_public_dst }}"
    - "{{ _netboot_public_dst }}/entries"
    - "{{ _netboot_public_dst }}/fragments"
    - "{{ _netboot_public_dst }}/kickstart"
    - "{{ _netboot_public_dst }}/cloud-init"
  loop_control:
    label: "{{ item | basename }}"

- name: Push — menu.ipxe
  ansible.builtin.copy:
    src: "{{ _netboot_cache_dir }}/menu.ipxe"
    dest: "{{ _netboot_public_dst }}/menu.ipxe"
    owner: "950"
    group: "950"
    mode: "0644"

- name: Push — entries/ (with delete-extras)
  ansible.posix.synchronize:
    src: "{{ _netboot_cache_dir }}/entries/"
    dest: "{{ _netboot_public_dst }}/entries/"
    delete: true
    recursive: true
    use_ssh_args: true
    rsync_opts:
      - "--chown=950:950"
      - "--chmod=F0644,D0755"

- name: Push — fragments/ (with delete-extras)
  ansible.posix.synchronize:
    src: "{{ _netboot_fragments_src }}/"
    dest: "{{ _netboot_public_dst }}/fragments/"
    delete: true
    recursive: true
    use_ssh_args: true
    rsync_opts:
      - "--chown=950:950"
      - "--chmod=F0644,D0755"
      - "--exclude=.gitkeep"

- name: Push — kickstart/ (with delete-extras)
  ansible.posix.synchronize:
    src: "{{ _netboot_kickstart_src }}/"
    dest: "{{ _netboot_public_dst }}/kickstart/"
    delete: true
    recursive: true
    use_ssh_args: true
    rsync_opts:
      - "--chown=950:950"
      - "--chmod=F0644,D0755"

- name: Push — cloud-init/ (with delete-extras)
  ansible.posix.synchronize:
    src: "{{ _netboot_cloudinit_src }}/"
    dest: "{{ _netboot_public_dst }}/cloud-init/"
    delete: true
    recursive: true
    use_ssh_args: true
    rsync_opts:
      - "--chown=950:950"
      - "--chmod=F0644,D0755"
