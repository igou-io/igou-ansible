---
# Add worker nodes to an existing OpenShift cluster by generating PXE
# boot artifacts via `oc adm node-image create --pxe` and copying them
# into the TrueNAS public nginx docroot (served at
# https://public.igou.systems/boot-files/). Post-2026-05-11: the
# netbootxyz container is retired; public nginx owns assets and rb5009
# flash owns per-host pins.
#
# Source procedure:
#   https://github.com/openshift/openshift-docs/blob/main/nodes/nodes/nodes-nodes-adding-node-iso.adoc
#
# What this playbook owns:
#   /mnt/ssd/public/boot-files/<cluster>-add-node/
#     node.<arch>-vmlinuz, node.<arch>-initrd.img, node.<arch>-rootfs.img
#
# What this playbook does NOT own (deploy_assets.yml owns it):
#   the per-host iPXE pin (MAC-<hex>.ipxe) on rb5009 flash
#
# The per-host iPXE script that points iPXE at the boot artifacts is
# rendered by playbooks/netboot/deploy_assets.yml from inventory's
# netboot_host_pins. The operator maintains the pin entry there;
# add_node_iso.yml only refreshes the boot artifacts (kernel/initrd/
# rootfs) when invoked. The artifacts behind the URL rotate (token
# embedded in initrd has limited lifetime); the pin file stays stable.
#
# Operator workflow (initial):
#   1. Add worker(s) to inventory under group `openshift_workers_<cluster>`
#      with at minimum `openshift_add_node_mac`. Add
#      `openshift_add_node_network_config` (nmstate) for static IPs.
#   2. Add a netboot_host_pins entry for the worker MAC in
#      igou-inventory/group_vars/all/netboot.yml. The pin's iPXE script
#      should reference {{ netboot_public_url }}/<cluster>-add-node/{vmlinuz,
#      initrd.img,rootfs.img} (e.g. as a menu option, or directly).
#   3. Set on the cluster host (e.g., host_vars/ocp.yml):
#        openshift_add_node_arch: x86_64
#        openshift_add_node_boot_artifacts_base_url: {{ netboot_public_url }}/<cluster>-add-node/
#   4. Deploy the pin once:
#        ansible-playbook playbooks/netboot/deploy_assets.yml \
#          -i igou-inventory/inventory.yaml --tags render,push,verify
#   5. export KUBECONFIG=<path-to-cluster-kubeconfig>
#   6. Generate / refresh the boot artifacts:
#        ansible-playbook playbooks/openshift/add_node_iso.yml \
#          -i igou-inventory/inventory.yaml -e target_cluster=<cluster>
#   7. PXE-boot the worker.
#   8. Optionally: re-run with `--tags monitor` to watch the join.
#   9. Approve any pending CSRs manually:
#        oc get csr
#        oc adm certificate approve <name>
#
# Operator workflow (subsequent runs, e.g. token refresh):
#   Steps 5-9 only. The pin file stays in place; just refresh the
#   artifacts behind the URL.

- name: Generate OpenShift add-node PXE assets
  # target_cluster selects the cluster + its worker group; it defaults to
  # ocp when not passed via -e. _cluster materializes that default as a
  # real variable so every reference below resolves (a bare
  # `target_cluster | default(...)` on the hosts line alone does NOT define
  # the variable for the rest of the play). The pre_tasks still fail fast
  # if the resulting worker group is empty or a worker is missing its MAC.
  hosts: "{{ target_cluster | default('ocp') }}"
  connection: local
  gather_facts: true
  vars:
    _cluster: "{{ target_cluster | default('ocp') }}"
    openshift_add_node_work_dir: "{{ ansible_env.HOME }}/openshift-add-node/{{ _cluster }}"
  pre_tasks:
    - name: Preflight — KUBECONFIG must be set in the environment
      ansible.builtin.assert:
        that:
          - lookup('env', 'KUBECONFIG') | length > 0
        fail_msg: >-
          KUBECONFIG environment variable is not set. Export it before
          running this playbook (e.g., `export KUBECONFIG=~/.kube/ocp-config`).

    - name: Preflight — worker group must exist and be non-empty
      vars:
        _workers_group: "openshift_workers_{{ _cluster }}"
        _workers: "{{ groups[_workers_group] | default([]) }}"
      ansible.builtin.assert:
        that:
          - _workers | length > 0
        fail_msg: >-
          Inventory group `{{ _workers_group }}` is missing or empty.
          Add at least one worker host to that group with
          `openshift_add_node_mac` set.

    - name: Preflight — every worker must have a valid MAC address
      ansible.builtin.assert:
        that:
          - hostvars[item].openshift_add_node_mac is defined
          - hostvars[item].openshift_add_node_mac | default('') is match('^([0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2}$')
        fail_msg: >-
          Worker `{{ item }}` is missing or has an invalid
          `openshift_add_node_mac`. Expected format aa:bb:cc:dd:ee:ff.
      loop: "{{ groups['openshift_workers_' + _cluster] }}"
      loop_control:
        label: "{{ item }}"

    - name: Preflight — discover nodes already joined to the cluster
      ansible.builtin.command:
        cmd: oc get nodes -o jsonpath={.items[*].metadata.name}
      register: _existing_nodes
      changed_when: false

    - name: Preflight — compute pending workers (in group, not yet joined)
      # oc adm node-image create rejects any host already present as a
      # cluster node ("hostname conflict"). Render only the workers that
      # haven't joined yet, matching on both FQDN and short name.
      vars:
        _joined: "{{ _existing_nodes.stdout.split() }}"
        _joined_short: "{{ _existing_nodes.stdout.split() | map('regex_replace', '[.].*$', '') | list }}"
      ansible.builtin.set_fact:
        _pending_workers: >-
          {{ groups['openshift_workers_' + _cluster]
             | reject('in', _joined + _joined_short)
             | list }}

    - name: Preflight — at least one worker must be pending
      ansible.builtin.assert:
        that:
          - _pending_workers | length > 0
        success_msg: "Pending worker(s) to add: {{ _pending_workers | join(', ') }}"
        fail_msg: >-
          Every host in openshift_workers_{{ _cluster }} is already a node in
          the cluster ({{ _existing_nodes.stdout.split() | join(', ') }}).
          Nothing to add — add a new worker to the group first.

  tasks:
    - name: Wipe stale work dir
      ansible.builtin.file:
        path: "{{ openshift_add_node_work_dir }}"
        state: absent

    - name: Create fresh work dir
      ansible.builtin.file:
        path: "{{ openshift_add_node_work_dir }}"
        state: directory
        mode: "0700"

    - name: Fetch cluster pull secret to work dir
      ansible.builtin.shell: |
        set -o pipefail
        oc -n openshift-config get secret pull-secret \
          -o jsonpath='{.data.\.dockerconfigjson}' \
          | base64 -d > "{{ openshift_add_node_work_dir }}/auth.json"
      args:
        executable: /bin/bash
      changed_when: true
      no_log: true

    - name: Lock down pull secret file mode
      ansible.builtin.file:
        path: "{{ openshift_add_node_work_dir }}/auth.json"
        mode: "0600"

    - name: Render nodes-config.yaml
      ansible.builtin.template:
        src: templates/nodes-config.yaml.j2
        dest: "{{ openshift_add_node_work_dir }}/nodes-config.yaml"
        mode: "0644"

    - name: Run `oc adm node-image create --pxe`
      # work_dir is wiped above, so this always runs and always produces fresh
      # assets; changed_when reflects that.
      ansible.builtin.command:
        cmd: >-
          oc adm node-image create --pxe
          --dir {{ openshift_add_node_work_dir }}
          --registry-config {{ openshift_add_node_work_dir }}/auth.json
      changed_when: true

    - name: List generated PXE assets
      ansible.builtin.find:
        paths: "{{ openshift_add_node_work_dir }}"
        file_type: file
        excludes:
          - auth.json
          - nodes-config.yaml
      register: _add_node_assets

    - name: Show generated PXE asset filenames
      ansible.builtin.debug:
        msg: "{{ _add_node_assets.files | map(attribute='path') | map('basename') | sort }}"

    - name: Verify expected PXE asset files exist
      ansible.builtin.stat:
        path: "{{ openshift_add_node_work_dir }}/{{ item }}"
      register: _asset_stat
      failed_when: not _asset_stat.stat.exists
      loop:
        - "node.{{ openshift_add_node_arch }}.ipxe"
        - "node.{{ openshift_add_node_arch }}-vmlinuz"
        - "node.{{ openshift_add_node_arch }}-initrd.img"
        - "node.{{ openshift_add_node_arch }}-rootfs.img"
      loop_control:
        label: "{{ item }}"

    - name: Set fact for Play 2 — generated asset paths
      ansible.builtin.set_fact:
        openshift_add_node_pxe_assets:
          ipxe: "{{ openshift_add_node_work_dir }}/node.{{ openshift_add_node_arch }}.ipxe"
          work_dir: "{{ openshift_add_node_work_dir }}"
          arch: "{{ openshift_add_node_arch }}"

    - name: Monitor add-node progress
      # `oc adm node-image monitor` skips CSR-readiness checks if reverse DNS
      # is not available for a node IP. CSR approval is always manual (see
      # operator workflow step 7) regardless of whether monitor completes.
      tags: [monitor, never]
      vars:
        _worker_ips: >-
          {{ groups['openshift_workers_' + _cluster]
             | map('extract', hostvars)
             | map(attribute='openshift_add_node_network_config', default={})
             | map(attribute='interfaces', default=[])
             | map(attribute='0', default={})
             | map(attribute='ipv4', default={})
             | map(attribute='address', default=[])
             | map(attribute='0', default={})
             | map(attribute='ip', default='')
             | list }}
      block:
        - name: Assert every worker has a static IP for monitoring
          ansible.builtin.assert:
            that:
              - _worker_ips | reject('equalto', '') | list | length == _worker_ips | length
            fail_msg: >-
              At least one worker has no static IP in
              `openshift_add_node_network_config`. Run
              `oc adm node-image monitor --ip-addresses <ips>` manually
              with addresses discovered from DHCP.

        - name: Run `oc adm node-image monitor`
          ansible.builtin.command:
            cmd: >-
              oc adm node-image monitor
              --ip-addresses {{ _worker_ips | join(',') }}
          changed_when: false

- name: Deliver PXE assets to TrueNAS public nginx
  hosts: truenas
  become: true
  gather_facts: false
  vars:
    _cluster: "{{ target_cluster | default('ocp') }}"
    cluster_host: "{{ _cluster }}"
    # Read via the fact set by Play 1's set_fact task; play-level vars are
    # not promoted into hostvars across plays, but set_fact values are.
    work_dir: "{{ hostvars[cluster_host]['openshift_add_node_pxe_assets']['work_dir'] }}"
    arch: "{{ hostvars[cluster_host]['openshift_add_node_pxe_assets']['arch'] }}"
    truenas_assets_root: /mnt/ssd/public/boot-files
    asset_subdir: "{{ cluster_host }}-add-node"
  tasks:
    - name: Ensure asset destination directory exists
      ansible.builtin.file:
        path: "{{ truenas_assets_root }}/{{ asset_subdir }}"
        state: directory
        mode: "0755"
        owner: "950"
        group: "950"

    - name: Sync boot artifacts to TrueNAS
      ansible.posix.synchronize:
        src: "{{ work_dir }}/"
        dest: "{{ truenas_assets_root }}/{{ asset_subdir }}/"
        delete: true
        rsync_opts:
          - "--exclude=*.ipxe"
          - "--exclude=auth.json"
          - "--exclude=nodes-config.yaml"
          - "--chown=950:950"
          # Force world-readable files + world-traversable dirs so the public
          # nginx worker can serve them regardless of its runtime UID. Mirrors
          # playbooks/netboot/tasks/push_text.yml; without this the synced tree
          # kept perms the nginx worker could not read -> HTTP 403 -> the iPXE
          # pin's initrd fetch failed and the boot menu silently exited.
          - "--chmod=F0644,D0755"
