---
- name: Render OpenShift agent-based install PXE assets
  hosts: "{{ target_cluster | default('all') }}"
  connection: local
  gather_facts: true
  vars:
    openshift_agent_install_work_dir: "{{ ansible_env.HOME }}/openshift-agent-install/{{ target_cluster }}"
  pre_tasks:
    - name: Remove stale work dir so assets are regenerated fresh
      ansible.builtin.file:
        path: "{{ openshift_agent_install_work_dir }}"
        state: absent
  roles:
    - role: david-igou.openshift_agent_install
  tasks:
    - name: Copy auth files to /tmp/auth
      ansible.builtin.copy:
        src: "{{ hostvars[target_cluster]['openshift_agent_install_work_dir_resolved'] }}/cluster-manifests/auth/"
        dest: "/tmp/{{ target_cluster }}-auth/"
        mode: "0644"

    - name: Save auth directory contents to 1password
      vars:
        _auth_dir: "{{ openshift_agent_install_work_dir_resolved }}/cluster-manifests/auth"
      tags: op-save
      block:
        - name: Validate OP_SERVICE_ACCOUNT_TOKEN is set
          ansible.builtin.assert:
            that:
              - lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') | length > 0
            fail_msg: "OP_SERVICE_ACCOUNT_TOKEN environment variable is not set"

        - name: Create a backup of kubeconfig as kubeconfig_self_signed
          ansible.builtin.copy:
            src: "{{ _auth_dir }}/kubeconfig"
            dest: "{{ _auth_dir }}/kubeconfig_self_signed"
            mode: "0600"

        - name: Remove CA from kubeconfig
          ansible.builtin.lineinfile:
            path: "{{ _auth_dir }}/kubeconfig"
            regexp: '^.*certificate-authority-data:.*$'
            state: absent

        - name: Create kubeconfig facts
          ansible.builtin.set_fact:
            kubeconfig_contents: "{{ lookup('ansible.builtin.file', _auth_dir + '/kubeconfig') }}"
            kubeconfig_self_signed_contents: "{{ lookup('ansible.builtin.file', _auth_dir + '/kubeconfig_self_signed') }}"
            kubeconfig_dict: "{{ lookup('ansible.builtin.file', _auth_dir + '/kubeconfig') | from_yaml }}"

        - name: Set facts for 1password item
          ansible.builtin.set_fact:
            op_item_name: "{{ target_cluster }}-kubeconfig-{{ now(utc=true, fmt='%Y%m%d%H%M') }}"
            client_certificate_data: "{{ kubeconfig_dict.users[0].user['client-certificate-data'] }}"
            client_key_data: "{{ kubeconfig_dict.users[0].user['client-key-data'] }}"
            api_url: "{{ kubeconfig_dict.clusters[0].cluster.server }}"

        - name: Save auth info to 1password
          ansible.builtin.shell:
            cmd: op item create --category=login --title {{ op_item_name }} --vault=ansible-push kubeconfig[password]={{ kubeconfig_contents | b64encode }} kubeconfig_self_signed[password]={{ kubeconfig_self_signed_contents | b64encode }} client_certificate_data[password]={{ client_certificate_data }} client_key_data[password]={{ client_key_data }} api_url[password]={{ api_url }}</dev/null
          no_log: true
          changed_when: true


- name: Publish boot artifacts to the public nginx host
  # Post-2026-05-11 netboot migration: agent-install artifacts are served
  # from https://public.igou.systems/boot-files/<cluster>/ (see
  # docs/netboot-operations.md). The retired netbootxyz container paths
  # (/mnt/ssd/containers/netbootxyz/...) must not be referenced. The iPXE
  # script is NOT published: the boot flow is the rb5009 per-host pin,
  # which carries its own kernel/initrd/rootfs URLs.
  hosts: truenas
  become: true
  gather_facts: false
  vars:
    cluster_host: "{{ target_cluster }}"
    boot_artifacts_src: "{{ hostvars[cluster_host]['openshift_agent_install_work_dir_resolved'] }}/cluster-manifests/boot-artifacts"
    netboot_public_files_dest: "/mnt/ssd/public/boot-files/{{ cluster_host }}"
  tasks:
    - name: Ensure boot files destination directory exists (nginx needs 0755)
      ansible.builtin.file:
        path: "{{ netboot_public_files_dest }}"
        state: directory
        mode: "0755"

    - name: Copy boot files to the public nginx share (excluding iPXE script)
      ansible.posix.synchronize:
        src: "{{ boot_artifacts_src }}/"
        dest: "{{ netboot_public_files_dest }}/"
        delete: true
        rsync_opts:
          - "--exclude=*.ipxe"
          - "--chmod=D0755,F0644"

    - name: Verify artifacts are served over HTTPS
      ansible.builtin.uri:
        url: "https://public.igou.systems/boot-files/{{ cluster_host }}/{{ item }}"
        method: HEAD
        status_code: 200
      loop:
        - agent.x86_64-vmlinuz
        - agent.x86_64-initrd.img
        - agent.x86_64-rootfs.img
      delegate_to: localhost
      become: false
