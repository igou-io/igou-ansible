---
# ansible-navigator run bootstrap_gitops.yaml
- name: Bootstrap Openshift Gitops and external-secrets operator, add an ansible serviceaccount and save the token to 1password
  hosts: "{{ target_cluster | default('all') }}"
  gather_facts: false
  environment:
    K8S_AUTH_KUBECONFIG: "{{ kubeconfig | default(omit) }}"
  vars:
    gitops_repo: "https://github.com/igou-io/igou-openshift.git"
  tasks:
    - name: Create 1P Connect secrets, deploy and cluster-config application
      tags: create-objects
      block:
        # The Connect-seed lookups below authenticate to the ocp-connect-bootstrap
        # vault via the ocp-bootstrap service account, read from the
        # OP_SERVICE_ACCOUNT_TOKEN env var (community.general onepassword* env
        # fallback). ansible-navigator.yml passes this var into the EE; AAP
        # injects it via a credential. vars_prompt is NOT used: it silently
        # returns empty under ansible-navigator/AAP (no interactive TTY wired to
        # the lookup), which makes the lookup fall through to an interactive
        # sign-in and fail with "Missing required parameters".
        - name: Assert the bootstrap service-account token is present
          ansible.builtin.assert:
            that:
              - lookup('ansible.builtin.env', 'OP_SERVICE_ACCOUNT_TOKEN') | length > 0
            fail_msg: >-
              OP_SERVICE_ACCOUNT_TOKEN is not set. Export the ocp-bootstrap
              service-account token (ops_...) before running, e.g.
              `export OP_SERVICE_ACCOUNT_TOKEN=ops_...`.
          run_once: true

        - name: Create Gitops namespace
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: openshift-gitops-operator
                labels:
                  openshift.io/cluster-monitoring: 'true'

        - name: Create Gitops OperatorGroup
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: operators.coreos.com/v1
              kind: OperatorGroup
              metadata:
                name: openshift-gitops-operator
                namespace: openshift-gitops-operator
              spec:
                upgradeStrategy: Default

        - name: Create Gitops Subscription
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: operators.coreos.com/v1alpha1
              kind: Subscription
              metadata:
                name: openshift-gitops-operator
                namespace: openshift-gitops-operator
              spec:
                channel: latest
                installPlanApproval: Automatic
                name: openshift-gitops-operator
                source: redhat-operators
                sourceNamespace: openshift-marketplace

        - name: Create external secrets namespace
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: external-secrets-operator

        # Connect bootstrap seed (chicken-egg): read the Connect server's own
        # credentials + access token from the dedicated ocp-connect-bootstrap
        # vault, authenticating as the read-only ocp-bootstrap SA via the
        # prompted token. Seeds the two Secrets that Connect + ESO need to start.
        - name: Create onepassword-connect namespace
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: onepassword-connect

        - name: Seed the Connect server credentials Secret
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: op-credentials
                namespace: onepassword-connect
                annotations:
                  managed-by: ansible
              type: Opaque
              # data + b64encode (not stringData): onepassword_doc returns bytes,
              # which ansible-core >= 2.19 refuses to serialize to module args.
              data:
                1password-credentials.json: "{{ lookup('community.general.onepassword_doc', 'ocp-connect-credentials', vault='ocp-connect-bootstrap') | b64encode }}"
          no_log: true

        - name: Seed the Connect access token Secret (for ESO)
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: onepassword-connect-token
                namespace: external-secrets-operator
                annotations:
                  managed-by: ansible
              type: Opaque
              stringData:
                # The Connect JWT lives in the item's `credential` field (the `token`
                # field holds an unrelated 83-char stub; verified 2026-07-03 during the
                # cluster rebuild — the JWT has aud=com.1password.connect).
                token: "{{ lookup('community.general.onepassword', 'ocp-connect-token', field='credential', vault='ocp-connect-bootstrap') }}"
          no_log: true

        - name: Create Gitops ClusterRoleBinding
          kubernetes.core.k8s:
            state: present
            definition:
              kind: ClusterRoleBinding
              apiVersion: rbac.authorization.k8s.io/v1
              metadata:
                name: gitops-cluster-admin
              subjects:
                - kind: ServiceAccount
                  name: openshift-gitops-argocd-application-controller
                  namespace: openshift-gitops
              roleRef:
                apiGroup: rbac.authorization.k8s.io
                kind: ClusterRole
                name: cluster-admin

        - name: Sleep 60 seconds
          ansible.builtin.pause:
            seconds: 60

        - name: Create ArgoCD Object
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: argoproj.io/v1beta1
              kind: ArgoCD
              metadata:
                name: openshift-gitops
                namespace: openshift-gitops
              spec:
                resourceTrackingMethod: annotation
                kustomizeBuildOptions: --enable-alpha-plugins --load-restrictor LoadRestrictionsNone
                extraConfig:
                  resource.compareoptions: |
                    ignoreAggregatedRoles: true
                server:
                  autoscale:
                    enabled: false
                  grpc:
                    ingress:
                      enabled: false
                  resources:
                    limits:
                      cpu: 500m
                      memory: 256Mi
                    requests:
                      cpu: 125m
                      memory: 128Mi
                  insecure: true
                  route:
                    enabled: true
                    tls:
                      termination: edge
                      insecureEdgeTerminationPolicy: Redirect
                  service:
                    type: ""
                resourceIgnoreDifferences:
                  # Suppress diff noise on Secret /data only when the Secret
                  # is owned by external-secrets-operator (ESO labels Secrets
                  # it manages with reconcile.external-secrets.io/managed=true).
                  # Without this scope, ArgoCD ignores /data on EVERY Secret —
                  # which silently breaks drift detection for kustomize-authored
                  # Secrets like alertmanager-main.
                  resourceIdentifiers:
                    - customization:
                        jqPathExpressions:
                          - 'select(.metadata.labels."reconcile.external-secrets.io/managed" == "true") | .data'
                      kind: Secret
                resourceCustomizations: |
                  argoproj.io/Application:
                    health.lua: |
                resourceHealthChecks:
                  - group: argoproj.io
                    kind: Application
                    check: |
                      hs = {}
                      hs.status = "Progressing"
                      hs.message = ""
                      if obj.status ~= nil then
                        if obj.status.health ~= nil then
                          hs.status = obj.status.health.status
                          hs.message = obj.status.health.message
                        end
                      end
                      return hs
                  # WORKAROUND: 1Password SDK rate limiting causes ClusterSecretStores to
                  # report unhealthy, which cascades to ExternalSecrets and breaks the
                  # app-of-apps reconciliation loop. These overrides prevent transient
                  # provider errors from blocking GitOps sync.
                  # Remove once the upstream ESO rate-limit fix is merged and deployed.
                  # PR: https://github.com/external-secrets/external-secrets/pull/5894
                  - group: external-secrets.io
                    kind: ClusterSecretStore
                    check: |
                      hs = {}
                      hs.status = "Healthy"
                      hs.message = "ClusterSecretStore is present"
                      if obj.status ~= nil then
                        if obj.status.conditions ~= nil then
                          for i, condition in ipairs(obj.status.conditions) do
                            if condition.type == "Ready" then
                              hs.message = condition.message
                            end
                          end
                        end
                      end
                      return hs
                  - group: external-secrets.io
                    kind: ExternalSecret
                    check: |
                      hs = {}
                      if obj.status ~= nil then
                        if obj.status.conditions ~= nil then
                          for i, condition in ipairs(obj.status.conditions) do
                            if condition.type == "Ready" and condition.status == "True" then
                              hs.status = "Healthy"
                              hs.message = condition.message
                              return hs
                            end
                          end
                        end
                        if obj.status.syncedResourceVersion ~= nil then
                          hs.status = "Healthy"
                          hs.message = "Secret was previously synced successfully"
                          return hs
                        end
                      end
                      hs.status = "Progressing"
                      hs.message = "Waiting for secret to be created"
                      return hs
                  # END WORKAROUND: ESO rate-limit health overrides
                  - group: cert-manager.io
                    kind: Certificate
                    check: |
                      hs = {}
                      if obj.status ~= nil then
                        if obj.status.conditions ~= nil then
                          for i, condition in ipairs(obj.status.conditions) do
                            if condition.type == "Issuing" and condition.status == "True" then
                              hs.status = "Progressing"
                              hs.message = condition.message
                              return hs
                            end
                            if condition.type == "Ready" and condition.status == "False" then
                              hs.status = "Degraded"
                              hs.message = condition.message
                              return hs
                            end
                            if condition.type == "Ready" and condition.status == "True" then
                              hs.status = "Healthy"
                              hs.message = condition.message
                              return hs
                            end
                          end
                        end
                      end

                      hs.status = "Progressing"
                      hs.message = "Waiting for certificate"
                      return hs
                  - group: cert-manager.io
                    kind: ClusterIssuer
                    check: |
                      hs = {}
                      if obj.status ~= nil then
                        if obj.status.conditions ~= nil then
                          for i, condition in ipairs(obj.status.conditions) do
                            if condition.type == "Ready" and condition.status == "False" then
                              hs.status = "Degraded"
                              hs.message = condition.message
                              return hs
                            end
                            if condition.type == "Ready" and condition.status == "True" then
                              hs.status = "Healthy"
                              hs.message = condition.message
                              return hs
                            end
                          end
                        end
                      end

                      hs.status = "Progressing"
                      hs.message = "Initializing issuer"
                      return hs
                  - group: route.openshift.io
                    kind: Route
                    check: |
                      local health_status = {}
                      if obj.status ~= nil then
                        if obj.status.ingress ~= nil then
                          local numIngressRules = 0
                          local numTrue = 0
                          local numFalse = 0
                          for _, ingressRules in pairs(obj.status.ingress) do
                              numIngressRules = numIngressRules + 1
                              if obj.status.ingress ~= nil then
                                for _, condition in pairs(ingressRules.conditions) do
                                    if condition.type == "Admitted" and condition.status == "True" then
                                        numTrue = numTrue + 1
                                    elseif condition.type == "Admitted" and condition.status == "False" then
                                        numFalse = numFalse + 1
                                    end
                                end
                              end
                              health_status.status = 'Test'
                          end
                          if numTrue == numIngressRules then
                            health_status.status = "Healthy"
                            health_status.message = "Route is healthy"
                            return health_status
                          elseif numFalse > 0 then
                            health_status.status = "Degraded"
                            health_status.message = "Route is degraded"
                            return health_status
                          else
                            health_status.status = "Progressing"
                            health_status.message = "Route is still getting admitted"
                            return health_status
                          end
                        end
                      end
                      health_status.status = "Progressing"
                      health_status.message = "Route is still getting admitted"
                      return health_status
                  - group: operators.coreos.com
                    kind: Subscription
                    check: |
                      health_status = {}
                      if obj.status ~= nil then
                        if obj.status.conditions ~= nil then
                          numDegraded = 0
                          numPending = 0
                          msg = ""
                          for i, condition in pairs(obj.status.conditions) do
                            msg = msg .. i .. ": " .. condition.type .. " | " .. condition.status .. "\n"
                            if condition.type == "InstallPlanPending" and condition.status == "True" and condition.reason ~= "RequiresApproval" then
                              numPending = numPending + 1
                            elseif (condition.type == "InstallPlanMissing" and condition.reason ~= "ReferencedInstallPlanNotFound") then
                              numDegraded = numDegraded + 1
                            elseif (condition.type == "CatalogSourcesUnhealthy" or condition.type == "InstallPlanFailed" or condition.type == "ResolutionFailed") and condition.status == "True" then
                              numDegraded = numDegraded + 1
                            end
                          end
                          if numDegraded == 0 and numPending == 0 then
                            health_status.status = "Healthy"
                            health_status.message = msg
                            return health_status
                          elseif numPending > 0 and numDegraded == 0 then
                            health_status.status = "Progressing"
                            health_status.message = "An install plan for a subscription is pending installation"
                            return health_status
                          else
                            health_status.status = "Degraded"
                            health_status.message = msg
                            return health_status
                          end
                        end
                      end
                      health_status.status = "Progressing"
                      health_status.message = "An install plan for a subscription is pending installation"
                      return health_status
                  - group: operators.coreos.com
                    kind: InstallPlan
                    check: |
                      hs = {}
                      if obj.status ~= nil then
                        if obj.status.phase ~= nil then
                          if obj.status.phase == "Complete" then
                            hs.status = "Healthy"
                            hs.message = obj.status.phase
                            return hs
                          end
                        end
                      end
                      hs.status = "Progressing"
                      hs.message = "Waiting for InstallPlan to complete"
                      return hs
                grafana:
                  enabled: false
                  ingress:
                    enabled: false
                  resources:
                    limits:
                      cpu: 500m
                      memory: 256Mi
                    requests:
                      cpu: 250m
                      memory: 128Mi
                  route:
                    enabled: false
                prometheus:
                  enabled: false
                  ingress:
                    enabled: false
                  route:
                    enabled: false
                initialSSHKnownHosts: {}
                applicationSet:
                  # extraCommandArgs:
                  #   - --enable-progressive-syncs
                  resources:
                    limits:
                      cpu: "2"
                      memory: 1Gi
                    requests:
                      cpu: 250m
                      memory: 512Mi
                rbac:
                  defaultPolicy: 'role:none'
                  policy: |
                    p, role:none, *, *, */*, deny
                    g, system:cluster-admins, role:admin
                    g, cluster-admins, role:admin
                    g, admin, role:admin
                  scopes: "[groups]"
                repo:
                  sidecarContainers:
                    - name: setenv-plugin
                      command: [/var/run/argocd/argocd-cmp-server]
                      envFrom:
                        - configMapRef:
                            name: environment-variables
                      image: quay.io/raffaelespazzoli/raffa-envsub:1.1
                      imagePullPolicy: Always
                      securityContext:
                        runAsNonRoot: true
                      volumeMounts:
                        - mountPath: /var/run/argocd
                          name: var-files
                        - mountPath: /home/argocd/cmp-server/plugins
                          name: plugins
                        - mountPath: /tmp
                          name: tmp
                        - mountPath: /home/argocd/cmp-server/config/plugin.yaml
                          subPath: plugin.yaml
                          name: setenv-cmp-plugin
                  volumes:
                    - configMap:
                        name: setenv-cmp-plugin
                      name: setenv-cmp-plugin
                  env:
                    - name: KUSTOMIZE_PLUGIN_HOME
                      value: /etc/kustomize/plugin
                  resources:
                    limits:
                      cpu: "1"
                      memory: 1Gi
                    requests:
                      cpu: 250m
                      memory: 256Mi
                resourceExclusions: |
                  - apiGroups:
                    - internal.open-cluster-management.io
                    kinds:
                    - ManagedClusterInfo
                    clusters:
                    - "*"
                  - apiGroups:
                    - tekton.dev
                    clusters:
                    - '*'
                    kinds:
                    - TaskRun
                    - PipelineRun
                  - apiGroups:
                    - "*"
                    kinds:
                    - ProviderConfigUsage
                sso:
                  dex:
                    resources:
                      limits:
                        cpu: 500m
                        memory: 256Mi
                      requests:
                        cpu: 250m
                        memory: 128Mi
                    openShiftOAuth: true
                  provider: dex
                ha:
                  enabled: false
                  resources:
                    limits:
                      cpu: 500m
                      memory: 256Mi
                    requests:
                      cpu: 250m
                      memory: 128Mi
                tls:
                  ca: {}
                redis:
                  resources:
                    limits:
                      cpu: 500m
                      memory: 256Mi
                    requests:
                      cpu: 250m
                      memory: 128Mi
                controller:
                  processors: {}
                  resources:
                    limits:
                      cpu: "2"
                      memory: 2Gi
                    requests:
                      cpu: 250m
                      memory: 1Gi
                  sharding: {}

        - name: Create setenv-cmp-plugin configmap
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: setenv-cmp-plugin
                namespace: openshift-gitops
              data:
                plugin.yaml: |
                  apiVersion: argoproj.io/v1alpha1
                  kind: ConfigManagementPlugin
                  metadata:
                    name: setenv-cmp-plugin
                  spec:
                    version: v1.0
                    init:
                      command: [sh, -c, 'echo "Initializing setenv-plugin-cmp..."']
                    generate:
                      command:
                        - sh
                        - "-c"
                        - "set -o pipefail && kustomize build --load-restrictor LoadRestrictionsNone --enable-helm --enable-alpha-plugins . | envsub"
                    discover:
                      find:
                        command: [sh, -c, 'find . -maxdepth 1 -name kustomization.yaml']

        - name: Get cluster base domain
          kubernetes.core.k8s_info:
            api_version: config.openshift.io/v1
            kind: Ingress
            name: cluster
          register: ingress_config

        - name: Set cluster domain facts
          ansible.builtin.set_fact:
            cluster_base_domain: "{{ ingress_config.resources[0].spec.domain | regex_replace('^apps\\.', '') }}"
            platform_base_domain: "{{ ingress_config.resources[0].spec.domain | regex_replace('^apps\\.[^.]+\\.', '') }}"

        - name: Create environment-variables configmap
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: environment-variables
                namespace: openshift-gitops
              data:
                KUSTOMIZE_PLUGIN_HOME: /etc/kustomize/plugin
                CLUSTER_NAME: '{{ target_cluster }}'
                CLUSTER_BASE_DOMAIN: '{{ cluster_base_domain }}'
                PLATFORM_BASE_DOMAIN: '{{ platform_base_domain }}'
                INFRA_GITOPS_REPO: '{{ gitops_repo }}'

        - name: Create root-applications Application
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: root-applications
                namespace: openshift-gitops
                finalizers:
                  - resources-finalizer.argocd.argoproj.io
                labels:
                  app-source: root
                  repo: cluster-config
              spec:
                project: default
                source:
                  repoURL: "{{ gitops_repo }}"
                  targetRevision: HEAD
                  path: "clusters/{{ target_cluster }}"
                destination:
                  server: https://kubernetes.default.svc
                  namespace: openshift-gitops
                syncPolicy:
                  automated:
                    prune: true
                    selfHeal: true
                    allowEmpty: false
                  syncOptions:
                    - Validate=false
                    - CreateNamespace=true
                    - PrunePropagationPolicy=foreground
                    - PruneLast=true
                    - RespectIgnoreDifferences=true
                  retry:
                    limit: 5
                    backoff:
                      duration: 5s
                      factor: 2
                      maxDuration: 3m
          retries: 50
          delay: 15
