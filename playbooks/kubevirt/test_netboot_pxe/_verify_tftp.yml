---
# Per-case TFTP verification for the netboot.xyz smoke test.
#
# The iPXE binary's :tftpmenu autoexec chains tftp://${tftp-server}/
# MAC-${mac:hexraw}.ipxe where ${tftp-server} = DHCP next-server = rb5009.
# So whether a pin was hit is a question for rb5009's /ip tftp hit
# counter, not for any HTTP/dnsmasq log on the public nginx side.
#
# Inputs (task vars expected on caller):
#   vm_name              VM name, used in messages.
#   vm_mac               lowercase MAC (with colons).
#   expected_outcome     'sent'     -- pinned MAC: row exists, hits++.
#                        'not_found' -- random MAC: no row exists.
#   tftp_hits_pre        pre-boot hit count from caller's snapshot.

- name: "Compute expected pin filename for {{ vm_name }}"
  ansible.builtin.set_fact:
    _pxe_expected_pin: "MAC-{{ vm_mac | regex_replace(':', '') | lower }}.ipxe"

- name: "Count post-boot /ip tftp rows matching pin for {{ vm_name }}"
  # count-only avoids RouterOS's header-only output when there are no matches
  # ('Flags: X - disabled' is non-empty even on zero rows). With count-only,
  # stdout is exactly the number of matching rows.
  community.routeros.command:
    commands:
      - >-
        /ip tftp print count-only where
        req-filename="{{ _pxe_expected_pin }}"
  register: _pxe_tftp_post_count
  changed_when: false
  delegate_to: "{{ pxe_test_router }}"

- name: "Read /ip tftp row hit counter (when row exists) for {{ vm_name }}"
  community.routeros.command:
    commands:
      - >-
        /ip tftp print detail without-paging where
        req-filename="{{ _pxe_expected_pin }}"
  register: _pxe_tftp_post
  changed_when: false
  delegate_to: "{{ pxe_test_router }}"
  when: (_pxe_tftp_post_count.stdout[0] | trim | int) > 0

- name: "Parse post-boot hit count for {{ vm_name }}"
  ansible.builtin.set_fact:
    _pxe_hits_post_pin: >-
      {{ (_pxe_tftp_post.stdout[0] | default('')) | regex_search('hits=\d+')
         | default('hits=0') | regex_replace('^hits=', '') | int }}

- name: "Assert outcome matches expected for {{ vm_name }}"
  ansible.builtin.assert:
    that:
      - (expected_outcome == 'sent'
          and (_pxe_tftp_post_count.stdout[0] | trim | int) > 0
          and (_pxe_hits_post_pin | int) > (tftp_hits_pre | int))
        or
        (expected_outcome == 'not_found'
          and (_pxe_tftp_post_count.stdout[0] | trim | int) == 0)
    fail_msg: >-
      VM {{ vm_name }} (MAC {{ vm_mac }}): expected '{{ expected_outcome }}'
      but rows={{ _pxe_tftp_post_count.stdout[0] | trim }},
      hits pre={{ tftp_hits_pre }} post={{ _pxe_hits_post_pin }}.
