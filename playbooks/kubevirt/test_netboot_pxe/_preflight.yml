---
# Preflight for the netboot.xyz smoke test. Runs once at the top of
# test_netboot_pxe.yml, before any VM is applied.
#
# Stages (each gated on the previous):
#   1. HTTPS-probe public.igou.systems/boot-files/ -- fails fast if
#      the public nginx is down.
#   2. Build set of pinned MACs from netboot_host_pins; collect the
#      subset referenced by pxe_test_arches.
#   3. Read each smoke pin file back from rb5009 via routeros
#      /file get contents and assert the expected substring.
#
# The pin files themselves are NOT written here -- they are written
# by playbooks/netboot/deploy_assets.yml's push stage. preflight is
# verify-only on smoke pin substrings, so a stale or drifted pin
# body fails fast before a VM is even applied.

- name: Preflight -- public asset host is reachable
  ansible.builtin.uri:
    url: "{{ netboot_public_url }}/"
    status_code: 200
    timeout: 10
    validate_certs: true
  delegate_to: localhost
  changed_when: false

- name: Preflight -- build set of pinned MACs (lowercase) from inventory
  ansible.builtin.set_fact:
    _pxe_pinned_macs: >-
      {{ netboot_host_pins
         | default([])
         | selectattr('mac', 'defined')
         | map(attribute='mac')
         | map('lower')
         | list }}

- name: Preflight -- collect pinned MACs referenced by pxe_test_arches
  ansible.builtin.set_fact:
    _pxe_preflight_pin_macs: >-
      {{ pxe_test_arches
         | selectattr('mac', 'defined')
         | map(attribute='mac')
         | map('lower')
         | unique
         | select('in', _pxe_pinned_macs)
         | list }}

- name: Preflight -- read each smoke pin file from rb5009
  community.routeros.command:
    commands:
      - >-
        :put [/file get
          [find where name="{{ netboot_pin_flash_subdir }}/MAC-{{ item | regex_replace(':', '') }}.ipxe"]
          contents]
  register: _pxe_preflight_pin_readback
  changed_when: false
  delegate_to: rb5009.igou.systems
  loop: "{{ _pxe_preflight_pin_macs }}"
  loop_control:
    label: "MAC-{{ item | regex_replace(':', '') }}.ipxe"

- name: Preflight -- assert each smoke pin contains its expected substring
  ansible.builtin.assert:
    that:
      - _expected_substring == '' or _expected_substring in (item.stdout[0] | default(''))
    fail_msg: >-
      Pin file MAC-{{ item.item | regex_replace(':', '') }}.ipxe on rb5009
      does not contain '{{ _expected_substring }}'. Inventory pin body
      or pxe_test_substring_defaults is out of sync, or deploy_assets
      push has not run since the inventory change.
      First 200 chars: {{ (item.stdout[0] | default(''))[:200] }}
  vars:
    _expected_substring: "{{ pxe_test_substring_defaults[item.item] | default('') }}"
  loop: "{{ _pxe_preflight_pin_readback.results }}"
  loop_control:
    label: "{{ item.item | regex_replace(':', '') }}.ipxe"
