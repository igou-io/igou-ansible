---
# Ensure each RouterOS device carries its management TLS certificate
# (ssl-web-management) declaratively, via
# david_igou.routeros_configuration.certificate. The www-ssl and api-ssl
# services in the routeros_config baseline reference this cert by name;
# certificates cannot round-trip through export_vars (no key material over
# the API), so this playbook closes the TLS-bootstrap gap for device
# rebuilds.
#
# The cert spec lives in igou-inventory/group_vars/routeros.yml
# (routeros_certificates). The role is idempotent: it matches by name and
# only creates+signs certs that are missing/unsigned — existing certs are
# never touched, so CN drift (rb5009's live cert predates the fqdn
# convention) does not trigger recreation.
#
# Normal run (api-ssl, self-signed cert, validation off):
#   ansible-playbook playbooks/routeros/manage_certificates.yaml \
#     -i igou-inventory/inventory.yaml [-e host=<group-or-host>]
#
# Fresh-device bootstrap (no cert yet, so api-ssl cannot come up): enable
# the plain api service (8728) on the device, then run with
#   -e routeros_api_tls=false -e routeros_api_port=8728
# and re-disable plain api afterwards (the declarative /ip/service baseline
# enforces disabled=true on the next configure run).
- name: Manage RouterOS management TLS certificates
  hosts: "{{ host | default('routeros') }}"
  gather_facts: false

  vars:
    routeros_api_tls: true
    routeros_api_validate_certs: false
    routeros_api_port: 8729

  pre_tasks:
    - name: Resolve api-ssl credentials once
      ansible.builtin.set_fact:
        routeros_api_username: "{{ lookup('community.general.onepassword', _routeros_api_op_item, field='username', vault='lab_routeros') }}"
        routeros_api_password: "{{ lookup('community.general.onepassword', _routeros_api_op_item, field='password', vault='lab_routeros') }}"
      vars:
        _routeros_api_op_item: "{{ inventory_hostname | split('.') | first }}-api"
      no_log: true

    - name: Assert routeros_certificates is defined for this host
      ansible.builtin.assert:
        that:
          - routeros_certificates is defined
          - routeros_certificates | length > 0
        fail_msg: >-
          No routeros_certificates defined for {{ inventory_hostname }}.
          Add it to igou-inventory group_vars/host_vars before running.

  roles:
    - role: david_igou.routeros_configuration.certificate
