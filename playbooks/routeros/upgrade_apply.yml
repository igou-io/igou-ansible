---
# Phase B — install a RouterOS package update (reboots the device), then
# upgrade RouterBOARD firmware if it lags the new RouterOS (second reboot).
# Run upgrade_download.yml first to stage the package, then this one during
# a maintenance window.
#
# Imports backup.yml first so a fresh backup pair (.rsc + binary) always
# exists before any reboot, then proceeds serially (one device at a time).
#
# All the mechanics — install gating on "New version is available", the
# reboot waits, the firmware-version comparison and its gated second reboot —
# live in david_igou.routeros_configuration.upgrade.
- name: Take pre-upgrade backups
  import_playbook: backup.yml

- name: Apply RouterOS package + firmware upgrade
  hosts: "{{ host | default('routeros') }}"
  gather_facts: false
  serial: 1

  vars:
    routeros_api_tls: true
    routeros_api_validate_certs: false
    routeros_api_port: 8729
    routeros_update_channel: "{{ routeros_upgrade_channel }}"
    routeros_upgrade_install: true
    routeros_routerboard_upgrade: true
    routeros_upgrade_reboot_timeout: 300

  pre_tasks:
    - name: Resolve api-ssl credentials once
      ansible.builtin.set_fact:
        routeros_api_username: "{{ lookup('community.general.onepassword', _routeros_api_op_item, field='username', vault='awx') }}"
        routeros_api_password: "{{ lookup('community.general.onepassword', _routeros_api_op_item, field='password', vault='awx') }}"
      vars:
        _routeros_api_op_item: "{{ inventory_hostname | split('.') | first }}-api"
      no_log: true

    - name: Capture pre-upgrade version
      community.routeros.api:  # noqa: args[module]
        hostname: "{{ inventory_hostname }}"
        username: "{{ routeros_api_username }}"
        password: "{{ routeros_api_password }}"
        tls: true
        validate_certs: false
        port: 8729
        path: system package update
      register: _pkg_pre
      delegate_to: localhost
      connection: local
      changed_when: false

  roles:
    - role: david_igou.routeros_configuration.upgrade

  post_tasks:
    - name: Read post-upgrade version
      community.routeros.api:  # noqa: args[module]
        hostname: "{{ inventory_hostname }}"
        username: "{{ routeros_api_username }}"
        password: "{{ routeros_api_password }}"
        tls: true
        validate_certs: false
        port: 8729
        path: system package update
      register: _pkg_post
      delegate_to: localhost
      connection: local
      changed_when: false

    - name: Report version transition
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }}:
          {{ (_pkg_pre.msg | first)['installed-version'] | default('?') }}
          -> {{ (_pkg_post.msg | first)['installed-version'] | default('?') }}
          (channel {{ routeros_update_channel }})
