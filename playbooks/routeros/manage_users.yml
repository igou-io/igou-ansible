---
# Keep SSH authorized keys for managed RouterOS users in sync.
#
# Why this is not declarative (configure role + host_vars): RouterOS treats
# SSH key material as write-only — api_info returns neither `key` nor
# `key-owner` for /user/ssh-keys (only `user`, `.id`, and `comment`), so the
# configure role's reconcile can never match a captured key against the
# device and would re-add on every run. The only stable dedup signal is the
# key-owner / comment string, which `print detail` exposes on the console.
#
# Mechanics:
#   - dedup READ over the console (network_cli): /user ssh-keys print detail
#     surfaces key-owner=… (set by RouterOS from the public key's comment) and
#     comment=… (set by us on add).
#   - ADD over the binary API: /user/ssh-keys add key="<full pubkey line>"
#     (RouterOS >= 7.15) — no temp-file SCP + /user ssh-keys import dance.
#     RouterOS derives key-owner from the pubkey's comment on add, which is
#     what the next run's dedup reads. (An explicit comment= on the API add
#     is silently ignored by RouterOS — don't bother.)
#
# Migration note: keys imported manually (WinBox/console) without a comment
# carry key-owner="" and are invisible to the dedup — the playbook will add a
# labeled duplicate. Clean such devices once, SCOPED TO THE MANAGED USER
# (other users' unlabeled keys — admin, ansible-netboot — must survive):
#   /user ssh-keys remove [find where key-owner="" and user="igou"]
# only after confirming the labeled replacements exist (same fingerprints).
# Migrated: crs310 + crs317 + crs328 + rb5009 on 2026-06-09.
#
# Each public key in routeros_users[].ssh_keys MUST include a comment (the
# third whitespace-separated field — e.g. "user@host"); it is the dedup key.
#
# Prune (routeros_prune_ssh_keys=true): removes keys on MANAGED users whose
# key-owner is not declared in routeros_users[].ssh_keys. Strictly scoped to
# the managed user names — unmanaged users' keys are never touched.
#
# Idempotent: second run reports changed=0.
- name: Manage RouterOS user SSH keys
  hosts: "{{ host | default('routeros') }}"
  gather_facts: false

  pre_tasks:
    - name: Resolve api-ssl credentials once
      ansible.builtin.set_fact:
        routeros_api_username: "{{ lookup('community.general.onepassword', _routeros_api_op_item, field='username', vault='awx') }}"
        routeros_api_password: "{{ lookup('community.general.onepassword', _routeros_api_op_item, field='password', vault='awx') }}"
      vars:
        _routeros_api_op_item: "{{ inventory_hostname | split('.') | first }}-api"
      no_log: true

  tasks:
    - name: Read user list
      community.routeros.command:
        commands:
          - "/user print detail without-paging"
      register: user_print
      changed_when: false

    - name: Read existing SSH keys
      community.routeros.command:
        commands:
          - "/user ssh-keys print detail without-paging"
      register: sshkey_print
      changed_when: false

    - name: Confirm each managed user exists on device
      ansible.builtin.assert:
        that:
          - ('name=\"' ~ item.name ~ '\"') in user_print.stdout[0]
        fail_msg: "User '{{ item.name }}' not present on {{ inventory_hostname }}"
      loop: "{{ routeros_users }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Fail loudly for any keys missing a comment field
      ansible.builtin.assert:
        that:
          - (item.1.split(' ') | length) >= 3
        fail_msg: "Key for {{ item.0.name }} has no comment field; manage_users.yml requires `ssh-<type> <blob> <comment>` format."
      loop: "{{ routeros_users | subelements('ssh_keys') }}"
      loop_control:
        label: "{{ item.0.name }}"

    - name: Add any missing SSH keys over the API
      community.routeros.api:  # noqa: args[module]
        hostname: "{{ inventory_hostname }}"
        username: "{{ routeros_api_username }}"
        password: "{{ routeros_api_password }}"
        tls: true
        validate_certs: false
        port: 8729
        path: user ssh-keys
        add: 'user={{ item.0.name }} key="{{ item.1 }}"'
      delegate_to: localhost
      connection: local
      changed_when: true
      loop: "{{ routeros_users | subelements('ssh_keys') }}"
      loop_control:
        label: "{{ item.0.name }}: {{ item.1.split(' ')[2] }}"
      vars:
        key_comment: "{{ item.1.split(' ')[2] }}"
      when:
        # key-owner is the only signal RouterOS exposes (set from the pubkey
        # comment on both console import and API add).
        - ('key-owner=' ~ '\"' ~ key_comment ~ '\"') not in sshkey_print.stdout[0]
        - ('key-owner=' ~ key_comment) not in sshkey_print.stdout[0]

    # Prune: for each MANAGED user, remove on-device keys whose key-owner is
    # not in that user's declared ssh_keys comments. Scoped strictly to
    # routeros_users[].name — other users' keys (ansible-netboot, owned by the
    # armbian_netboot collection) are never touched. Find first (read-only)
    # so the remove only runs — and only reports changed — when candidates
    # actually exist.
    - name: Find prune candidates (managed users' keys not in routeros_users)
      community.routeros.command:
        commands:
          - >-
            :put [/user/ssh-keys/find where user="{{ item.name }}"
            and !({{ _keep_expr }})]
      register: _prune_candidates
      changed_when: false
      loop: "{{ routeros_users }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        _keep_expr: >-
          {%- for k in item.ssh_keys -%}
          key-owner="{{ k.split(' ')[2] }}"{{ " or " if not loop.last }}
          {%- endfor -%}
      when: routeros_prune_ssh_keys | default(false) | bool

    - name: Prune unmanaged SSH keys from managed users
      community.routeros.command:
        commands:
          - >-
            /user/ssh-keys/remove [find where user="{{ item.item.name }}"
            and !({{ _keep_expr }})]
      changed_when: true
      loop: "{{ _prune_candidates.results }}"
      loop_control:
        label: "{{ item.item.name }}: {{ item.stdout[0] | default('') | trim }}"
      vars:
        _keep_expr: >-
          {%- for k in item.item.ssh_keys -%}
          key-owner="{{ k.split(' ')[2] }}"{{ " or " if not loop.last }}
          {%- endfor -%}
      when:
        - routeros_prune_ssh_keys | default(false) | bool
        - item.stdout[0] | default('') | trim | length > 0
