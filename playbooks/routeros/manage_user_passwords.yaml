---
# Reconcile RouterOS user passwords from 1Password, via
# david_igou.routeros_configuration.user_password. Passwords are write-only
# in RouterOS (api_info never returns them), so this cannot detect drift —
# every run SETS each managed user's password to the current 1Password
# value. Treat it as enforcement/rotation, not audit.
#
# Which users (and which 1P item backs each) is policy and lives in
# igou-inventory group_vars/routeros.yml (routeros_password_specs).
#
# Rotation caveat for the `ansible` user: this playbook authenticates AS
# ansible using the same <short-host>-api item it enforces. To rotate it,
# update the 1P item and run with the OLD password supplied for login:
#   -e routeros_api_password='<old password>'
# (every other managed user rotates with a plain run after the item edit).
#
#   ansible-playbook playbooks/routeros/manage_user_passwords.yaml \
#     -i igou-inventory/inventory.yaml [-e host=<group-or-host>]
- name: Reconcile RouterOS user passwords from 1Password
  hosts: "{{ host | default('routeros') }}"
  gather_facts: false

  vars:
    routeros_api_tls: true
    routeros_api_validate_certs: false
    routeros_api_port: 8729

  pre_tasks:
    # The ansible-user rotation override (-e routeros_api_password=<old>)
    # still works: extra vars outrank these facts at use time.
    - name: Resolve api-ssl credentials once
      ansible.builtin.set_fact:
        routeros_api_username: "{{ lookup('community.general.onepassword', _routeros_api_op_item, field='username', vault='awx') }}"
        routeros_api_password: "{{ lookup('community.general.onepassword', _routeros_api_op_item, field='password', vault='awx') }}"
      vars:
        _routeros_api_op_item: "{{ inventory_hostname | split('.') | first }}-api"
      no_log: true

    - name: Assert routeros_password_specs is defined for this host
      ansible.builtin.assert:
        that:
          - routeros_password_specs is defined
          - routeros_password_specs | length > 0
        fail_msg: >-
          No routeros_password_specs defined for {{ inventory_hostname }}.
          Add it to igou-inventory group_vars/routeros.yml before running.

    # Resolve every spec's 1P lookup exactly once into the role's input
    # shape, in a single expression (a self-referential accumulator loop
    # does not survive ansible-core 2.19's lazy templating). Specs whose
    # user doesn't exist on this device make the role fail loudly (by
    # design); scope a spec with its optional `hosts` allowlist.
    - name: Resolve managed passwords from 1Password (once per spec)
      ansible.builtin.set_fact:
        routeros_user_passwords: >-
          {%- set out = [] -%}
          {%- for s in routeros_password_specs -%}
          {%-   if (s.hosts is not defined) or (inventory_hostname in s.hosts) -%}
          {%-     set _ = out.append({
                    'name': s.user,
                    'password': lookup('community.general.onepassword', s.op_item,
                                       field=s.op_field | default('password'),
                                       vault=s.op_vault | default('awx'))}) -%}
          {%-   endif -%}
          {%- endfor -%}
          {{ out }}
      no_log: true

  roles:
    - role: david_igou.routeros_configuration.user_password
