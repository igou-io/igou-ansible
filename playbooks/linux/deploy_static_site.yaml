---
# Build-and-publish for a static site served by a quadlet-managed nginx (the
# igou.io website): clone/refresh the site repo on the host as the rootless run
# user, build it with a one-shot Hugo container, and write the output into the
# directory the site's nginx container bind-mounts read-only. nginx serves
# files live from that directory, so the rebuild IS the deploy - no unit
# restart needed. The build only runs when the checkout picked up new commits
# (override with site_force_build=true).
#
# Variables:
#   Inventory inputs (per-host, see host_vars/igou.io.yml):
#     linux_static_site_repo          - git URL of the site source (public https)
#     linux_static_site_version       - branch/tag to deploy
#     linux_static_site_src           - checkout dir on the host
#     linux_static_site_dest          - built-output dir (bind-mounted by the
#                                       site quadlet, e.g. igou-io)
#     linux_static_site_builder_image - Hugo image for the one-shot build
#     linux_podman_run_as_user        - rootless user that owns it all
#   Optional launch-time inputs:
#     site_force_build - rebuild even when the checkout is unchanged
- name: Deploy a static website (git pull + Hugo container build)
  hosts: "{{ ansible_limit | default('vps') }}"
  become: true
  gather_facts: false

  vars:
    _run_user: "{{ linux_podman_run_as_user | default('igou') }}"
    _src: "{{ linux_static_site_src }}"
    _dest: "{{ linux_static_site_dest }}"
    _builder: "{{ linux_static_site_builder_image | default('docker.io/hugomods/hugo:latest') }}"
    _rootless_env:
      XDG_RUNTIME_DIR: "/run/user/{{ getent_passwd[_run_user][1] }}"
      HOME: "/home/{{ _run_user }}"

  tasks:
    - name: Resolve the run user's uid (for the rootless podman runtime dir)
      ansible.builtin.getent:
        database: passwd
        key: "{{ _run_user }}"

    - name: Ensure the source and output directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ _run_user }}"
        group: "{{ _run_user }}"
        mode: "0755"
      loop:
        - "{{ _src }}"
        - "{{ _dest }}"

    # force discards any local drift in the checkout - it is build input only,
    # never edited on the host.
    - name: Clone or update the site source
      ansible.builtin.git:
        repo: "{{ linux_static_site_repo }}"
        dest: "{{ _src }}"
        version: "{{ linux_static_site_version | default('master') }}"
        force: true
      become: true
      become_user: "{{ _run_user }}"
      environment: "{{ _rootless_env }}"
      register: _checkout

    # One gate shared by the wipe + build tasks below.
    - name: Decide whether this run rebuilds the site
      ansible.builtin.set_fact:
        _rebuild: "{{ _checkout is changed or (site_force_build | default(false) | bool) }}"

    # Start every render from an empty directory: --cleanDestinationDir only
    # prunes paths absent from the NEW build, so files Hugo no longer emits
    # under the same name (stale hashed assets, leftovers from older layouts,
    # or files a previous partial build wrote with modes it can't replace)
    # can survive across deploys. Wipe the CONTENTS only, never the directory
    # itself: it is bind-mounted into the running igou-io nginx container, and
    # removing/recreating it would detach the mount - nginx would keep the old
    # (deleted) inode until a unit restart. Tradeoff: the site is empty for
    # the few seconds the build takes, and stays empty if the build fails; a
    # failed run is loud in AAP, and serving provably-fresh output is worth it.
    - name: Enumerate current contents of the served directory
      ansible.builtin.find:
        paths: "{{ _dest }}"
        file_type: any
        hidden: true
      register: _dest_contents
      when: _rebuild

    - name: Wipe the served directory contents before rendering
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ _dest_contents.files | default([]) }}"
      loop_control:
        label: "{{ item.path }}"
      become: true
      become_user: "{{ _run_user }}"
      when: _rebuild

    # Same one-shot build deploy/build.sh in the site repo performs by hand.
    # The source mounts read-write: Hugo's image processing writes its
    # resources/_gen cache into the project tree (so it persists between runs),
    # and the git task's force:true keeps tracked files canonical anyway. Hugo
    # writes the minified site over the served dir (--cleanDestinationDir
    # prunes files deleted from the source).
    #
    # SELinux label flags matter here: the output dir is ALSO bind-mounted by
    # the nginx quadlet, so it is shared between two containers and MUST use the
    # shared label ":z" (lowercase). ":Z" would stamp it with an MCS category
    # private to this one-shot builder, which the (different) nginx container
    # then cannot read - the site loads but every generated asset 404/403s.
    # The source is builder-only, so its private ":Z" is correct.
    - name: Build the site with a one-shot Hugo container
      ansible.builtin.command:
        argv:
          - podman
          - run
          - --rm
          - --volume
          - "{{ _src }}:/src:Z"
          - --volume
          - "{{ _dest }}:/out:z"
          - "{{ _builder }}"
          - hugo
          - --minify
          - --source
          - /src
          - --destination
          - /out
          - --cleanDestinationDir
      become: true
      become_user: "{{ _run_user }}"
      environment: "{{ _rootless_env }}"
      when: _rebuild
      changed_when: true
      notify: Make the built site world-readable

  handlers:
    # The site nginx container and this build run as separate rootless
    # containers, so "root" in the Hugo builder (host uid of _run_user) is a
    # different subuid than nginx's worker. nginx can therefore only read the
    # output if it is world-readable. Hugo emits page HTML 0644, but pipeline
    # assets (css/style.css, processed images) can land 0600, which nginx then
    # 403s - the site loads unstyled. a+rX adds read to every file and traverse
    # (+x) to directories only, matching `chmod -R a+rX` idempotently. Runs as
    # a handler: only fires when the build task above reported a change.
    - name: Make the built site world-readable
      ansible.builtin.file:
        path: "{{ _dest }}"
        recurse: true
        mode: a+rX
      become: true
      become_user: "{{ _run_user }}"
      environment: "{{ _rootless_env }}"
