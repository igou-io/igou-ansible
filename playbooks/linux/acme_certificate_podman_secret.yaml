---
# Issue a Let's Encrypt cert (Cloudflare DNS-01) and deliver it to a host as
# rootless podman secrets. Stateless on the control node and EE/container
# friendly: the renewal decision is read from the certificate already stored in
# the host's podman secret, so there is no controller-side cert store and no
# dependency on the service being reachable on :443.
#
#   secret absent             -> issue (bootstrap; no special-casing)
#   secret present & expiring -> renew (< renewal_on_remaining_days)
#   secret present & healthy  -> nothing to do
#   -e letsencrypt_force_issue=true forces issuance.
#
# Issuance runs on the control node (connection: local) so the ACME account and
# Cloudflare token never reach the host; keys_path is a throwaway scratch dir
# removed afterwards, so no private key persists on the controller.
#
# Variables:
#   Inventory inputs (per-host, see host_vars):
#     letsencrypt_cert_domains          - SANs; [0] is the cert basename
#     letsencrypt_reload_units          - user units to restart on rotation
#     acme_certificate_cloudflare_token - Cloudflare DNS token (role's own var)
#     linux_tls_fullchain_secret        - podman secret name for the fullchain
#     linux_tls_key_secret              - podman secret name for the private key
#     linux_podman_run_as_user          - rootless user that owns the secrets
#   Optional inputs (CLI/inventory): letsencrypt_force_issue,
#     acme_keys_path, acme_certificate_renewal_on_remaining_days
#   letsencrypt_*  - the renewal decision (needs_issue, remaining_days)
#   _*             - playbook-internal plumbing (paths, names, env, registers)

- name: Decide renewal from the certificate deployed on the host
  hosts: "{{ cert_hosts | default('letsencrypt') }}"
  gather_facts: false
  become: true

  vars:
    _run_user: "{{ linux_podman_run_as_user | default('igou') }}"
    _fullchain_secret: "{{ linux_tls_fullchain_secret | default('tls-fullchain') }}"
    _renew_days: "{{ acme_certificate_renewal_on_remaining_days | default(15) }}"
    _rootless_env:
      XDG_RUNTIME_DIR: "/run/user/{{ getent_passwd[_run_user][1] }}"
      HOME: "/home/{{ _run_user }}"

  tasks:
    - name: Resolve the run user's uid (for the rootless podman runtime dir)
      ansible.builtin.getent:
        database: passwd
        key: "{{ _run_user }}"

    - name: List the run user's podman secrets
      containers.podman.podman_secret_info:
      become: true
      become_user: "{{ _run_user }}"
      environment: "{{ _rootless_env }}"
      register: _secrets
      changed_when: false

    - name: Read the deployed certificate (when the secret exists)
      containers.podman.podman_secret_info:
        name: "{{ _fullchain_secret }}"
        showsecret: true
      become: true
      become_user: "{{ _run_user }}"
      environment: "{{ _rootless_env }}"
      register: _deployed
      changed_when: false
      when: _fullchain_secret in (_secrets.secrets | map(attribute='Spec.Name') | list)

    - name: Read the deployed certificate's expiry
      community.crypto.x509_certificate_info:
        content: "{{ _deployed.secrets[0].SecretData }}"
      delegate_to: localhost
      # The play's become:true must not follow the delegation - parsing a cert
      # needs no privilege and the EE has no sudo.
      become: false
      vars:
        # The inventory's localhost host has no ansible_connection set (it
        # defaults to ssh, intentionally - armbian builds SSH back into it), so
        # a bare delegate_to: localhost tries to ssh into the EE, which has no
        # sshd. Force local here; never pin it on the inventory host itself.
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
      register: _cert
      when: _deployed is not skipped

    - name: Compute days remaining on the deployed certificate
      ansible.builtin.set_fact:
        letsencrypt_remaining_days: >-
          {{ ((_cert.not_after | ansible.builtin.to_datetime('%Y%m%d%H%M%SZ')) - now(utc=true)).days
             if (_deployed is not skipped) else -1 }}

    - name: Decide whether to issue a new certificate
      ansible.builtin.set_fact:
        letsencrypt_needs_issue: >-
          {{ (letsencrypt_force_issue | default(false) | bool)
             or (_deployed is skipped)
             or ((letsencrypt_remaining_days | int) < (_renew_days | int)) }}

    - name: Report the decision
      ansible.builtin.debug:
        msg: >-
          {{ 'No certificate deployed; bootstrapping.' if (_deployed is skipped)
             else (letsencrypt_remaining_days ~ ' day(s) remaining; '
                   ~ ('renewing.' if (letsencrypt_needs_issue | bool) else 'within threshold, skipping.')) }}

# We drive the ACME order with the community.crypto split-order modules instead
# of the felixfontein.acme role, because a wildcard + apex cert needs TWO TXT
# values at the single name _acme-challenge.<domain>, and the role's Cloudflare
# provider writes only value[0] with solo:true (deleting the other). Here the
# "Publish" task loops over EVERY challenge value, using solo only on the first
# per record (clears stale, then appends) - the multi-value handling Cloudflare
# needs. TXT records are torn down in always:, even if validation fails.
- name: Issue the certificate on the control node (Cloudflare DNS-01)
  hosts: "{{ cert_hosts | default('letsencrypt') }}"
  gather_facts: false
  connection: local
  become: false

  vars:
    # This play runs locally but targets the remote host, whose discovered
    # interpreter would otherwise be used; pin to the controller's interpreter.
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    _keys_path: "{{ acme_keys_path | default('/tmp/acme-' ~ inventory_hostname) }}"
    _cert_basename: "{{ letsencrypt_cert_domains[0] | replace('*', '_') }}"
    _acme_directory: "{{ letsencrypt_acme_directory | default('https://acme-v02.api.letsencrypt.org/directory') }}"

  tasks:
    - name: Nothing to issue when no renewal is needed
      ansible.builtin.meta: end_host
      when: not (letsencrypt_needs_issue | default(false) | bool)

    # Resolve each 1Password secret exactly ONCE. As play vars these lookups are
    # lazy and re-run on every reference (and every loop item), bursting the 1P
    # service-account rate limit; materialize them up front and reuse the facts.
    # The shared ACME account is read on the control node only (never reaches
    # the host).
    - name: Resolve issuance secrets from 1Password (once)
      ansible.builtin.set_fact:
        _account_content: "{{ lookup('community.general.onepassword', 'acme-key', field='key.b64', vault='lab_external_api_keys') | b64decode }}"
        _account_email: "{{ lookup('community.general.onepassword', 'acme-key', field='email', vault='lab_external_api_keys') }}"
        _cf_token: "{{ acme_certificate_cloudflare_token }}"
      no_log: true

    - name: Ensure the scratch keys directory exists on the control node
      ansible.builtin.file:
        path: "{{ _keys_path }}"
        state: directory
        mode: "0700"

    # Fresh keypair each issuance - keys_path is a throwaway scratch dir, so no
    # private key persists on the controller (the delivery play removes it).
    - name: Generate the certificate private key
      community.crypto.openssl_privatekey:
        path: "{{ _keys_path }}/{{ _cert_basename }}.key"
        type: RSA
        size: 4096
        mode: "0600"
        force: true

    - name: Generate the CSR with all SANs (wildcard + apex)
      community.crypto.openssl_csr:
        path: "{{ _keys_path }}/{{ _cert_basename }}.csr"
        privatekey_path: "{{ _keys_path }}/{{ _cert_basename }}.key"
        subject_alt_name: "{{ letsencrypt_cert_domains | map('regex_replace', '^(.*)$', 'DNS:\\1') | list }}"
        use_common_name_for_san: false

    - name: Ensure the shared ACME account exists (terms agreed)
      community.crypto.acme_account:
        account_key_content: "{{ _account_content }}"
        contact: ["mailto:{{ _account_email }}"]
        terms_agreed: true
        allow_creation: true
        state: present
        acme_directory: "{{ _acme_directory }}"
        acme_version: 2

    - name: Create the ACME order and read the DNS-01 challenges
      community.crypto.acme_certificate_order_create:
        account_key_content: "{{ _account_content }}"
        csr: "{{ _keys_path }}/{{ _cert_basename }}.csr"
        acme_directory: "{{ _acme_directory }}"
        acme_version: 2
      register: _order

    # challenge_data_dns is {record_name: [values...]}; apex + wildcard collapse
    # to one _acme-challenge.<domain> key whose list holds BOTH tokens.
    - name: Publish, validate, then always tear down the challenge records
      block:
        - name: Publish every challenge TXT value to Cloudflare
          community.general.cloudflare_dns:
            api_token: "{{ _cf_token }}"
            zone: "{{ item.0.key | community.dns.get_registrable_domain }}"
            record: "{{ item.0.key | community.dns.remove_registrable_domain }}"
            type: TXT
            value: "{{ item.1 }}"
            # solo wipes other TXT at this name: do it once per record (first
            # value) to clear stale tokens, then append the rest.
            solo: "{{ item.0.value.index(item.1) == 0 }}"
            state: present
            ttl: 60
          loop: "{{ _order.challenge_data_dns | dict2items | subelements('value') }}"
          loop_control:
            label: "{{ item.0.key }} = {{ item.1 }}"

        - name: Wait for the challenge TXT records to propagate
          community.dns.wait_for_txt:
            records: "{{ _order.challenge_data_dns | dict2items(key_name='name', value_name='values') | list }}"
            server: 8.8.8.8
            timeout: "{{ letsencrypt_dns_propagation_timeout | default(120) }}"

        - name: Validate the challenges
          community.crypto.acme_certificate_order_validate:
            account_key_content: "{{ _account_content }}"
            order_uri: "{{ _order.order_uri }}"
            challenge: dns-01
            acme_directory: "{{ _acme_directory }}"
            acme_version: 2

        - name: Finalize the order and write the cert + fullchain
          community.crypto.acme_certificate_order_finalize:
            account_key_content: "{{ _account_content }}"
            order_uri: "{{ _order.order_uri }}"
            csr: "{{ _keys_path }}/{{ _cert_basename }}.csr"
            cert_dest: "{{ _keys_path }}/{{ _cert_basename }}.pem"
            fullchain_dest: "{{ _keys_path }}/{{ _cert_basename }}-fullchain.pem"
            chain_dest: "{{ _keys_path }}/{{ _cert_basename }}-chain.pem"
            acme_directory: "{{ _acme_directory }}"
            acme_version: 2
      always:
        - name: Remove the challenge TXT records
          community.general.cloudflare_dns:
            api_token: "{{ _cf_token }}"
            zone: "{{ item.0.key | community.dns.get_registrable_domain }}"
            record: "{{ item.0.key | community.dns.remove_registrable_domain }}"
            type: TXT
            value: "{{ item.1 }}"
            state: absent
          loop: "{{ _order.challenge_data_dns | dict2items | subelements('value') }}"
          loop_control:
            label: "{{ item.0.key }} = {{ item.1 }}"

- name: Deliver the renewed certificate as podman secrets
  hosts: "{{ cert_hosts | default('letsencrypt') }}"
  gather_facts: true
  become: true

  vars:
    _run_user: "{{ linux_podman_run_as_user | default('igou') }}"
    _fullchain_secret: "{{ linux_tls_fullchain_secret | default('tls-fullchain') }}"
    _key_secret: "{{ linux_tls_key_secret | default('tls-key') }}"
    _keys_path: "{{ acme_keys_path | default('/tmp/acme-' ~ inventory_hostname) }}"
    _cert_basename: "{{ letsencrypt_cert_domains[0] | replace('*', '_') }}"
    _rootless_env:
      XDG_RUNTIME_DIR: "/run/user/{{ getent_passwd[_run_user][1] }}"
      HOME: "/home/{{ _run_user }}"

  tasks:
    - name: Nothing to deliver when no renewal happened
      ansible.builtin.meta: end_host
      when: not (letsencrypt_needs_issue | default(false) | bool)

    - name: Create or replace the TLS podman secrets
      ansible.builtin.include_role:
        name: linux-system-roles.podman
      vars:
        podman_run_as_user: "{{ _run_user }}"
        podman_secrets:
          - name: "{{ _fullchain_secret }}"
            state: present
            force: true
            data: "{{ lookup('file', _keys_path ~ '/' ~ _cert_basename ~ '-fullchain.pem') }}"
          - name: "{{ _key_secret }}"
            state: present
            force: true
            data: "{{ lookup('file', _keys_path ~ '/' ~ _cert_basename ~ '.key') }}"

    - name: Resolve the run user's uid (for the rootless podman runtime dir)
      ansible.builtin.getent:
        database: passwd
        key: "{{ _run_user }}"

    # Secrets mount at container start, so consuming units must restart to pick
    # up the new cert. Tolerate absence on first bootstrap (units may not exist
    # until podman_quadlets.yaml has run).
    - name: Restart units that consume the certificate
      ansible.builtin.systemd:
        name: "{{ item }}"
        scope: user
        state: restarted
      become: true
      become_user: "{{ _run_user }}"
      environment: "{{ _rootless_env }}"
      loop: "{{ letsencrypt_reload_units | default([]) }}"
      failed_when: false

    - name: Remove the scratch keys from the control node
      ansible.builtin.file:
        path: "{{ _keys_path }}"
        state: absent
      delegate_to: localhost
      # Same as the expiry read above: no become on the EE side (no sudo there).
      become: false
      vars:
        # See the cert-expiry task above: the inventory localhost defaults to
        # ssh, so force a local connection for this control-node cleanup rather
        # than pinning ansible_connection on the inventory host.
        ansible_connection: local
