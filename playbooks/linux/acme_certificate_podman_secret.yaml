---
# Issue a Let's Encrypt cert (Cloudflare DNS-01) and deliver it to a host as
# rootless podman secrets. Stateless on the control node and EE/container
# friendly: the renewal decision is read from the certificate already stored in
# the host's podman secret, so there is no controller-side cert store and no
# dependency on the service being reachable on :443.
#
#   secret absent             -> issue (bootstrap; no special-casing)
#   secret present & expiring -> renew (< renewal_on_remaining_days)
#   secret present & healthy  -> nothing to do
#   -e letsencrypt_force_issue=true forces issuance.
#
# Issuance runs on the control node (connection: local) so the ACME account and
# Cloudflare token never reach the host; keys_path is a throwaway scratch dir
# removed afterwards, so no private key persists on the controller.
#
# Variables:
#   Inventory inputs (per-host, see host_vars):
#     letsencrypt_cert_domains          - SANs; [0] is the cert basename
#     letsencrypt_reload_units          - user units to restart on rotation
#     acme_certificate_cloudflare_token - Cloudflare DNS token (role's own var)
#     linux_tls_fullchain_secret        - podman secret name for the fullchain
#     linux_tls_key_secret              - podman secret name for the private key
#     linux_podman_run_as_user          - rootless user that owns the secrets
#   Optional inputs (CLI/inventory): letsencrypt_force_issue,
#     acme_keys_path, acme_certificate_renewal_on_remaining_days
#   letsencrypt_*  - the renewal decision (needs_issue, remaining_days)
#   _*             - playbook-internal plumbing (paths, names, env, registers)

- name: Decide renewal from the certificate deployed on the host
  hosts: "{{ cert_hosts | default('letsencrypt') }}"
  gather_facts: false
  become: true

  vars:
    _run_user: "{{ linux_podman_run_as_user | default('igou') }}"
    _fullchain_secret: "{{ linux_tls_fullchain_secret | default('tls-fullchain') }}"
    _renew_days: "{{ acme_certificate_renewal_on_remaining_days | default(15) }}"
    _rootless_env:
      XDG_RUNTIME_DIR: "/run/user/{{ getent_passwd[_run_user][1] }}"
      HOME: "/home/{{ _run_user }}"

  tasks:
    - name: Resolve the run user's uid (for the rootless podman runtime dir)
      ansible.builtin.getent:
        database: passwd
        key: "{{ _run_user }}"

    - name: List the run user's podman secrets
      containers.podman.podman_secret_info:
      become: true
      become_user: "{{ _run_user }}"
      environment: "{{ _rootless_env }}"
      register: _secrets
      changed_when: false

    - name: Read the deployed certificate (when the secret exists)
      containers.podman.podman_secret_info:
        name: "{{ _fullchain_secret }}"
        showsecret: true
      become: true
      become_user: "{{ _run_user }}"
      environment: "{{ _rootless_env }}"
      register: _deployed
      changed_when: false
      when: _fullchain_secret in (_secrets.secrets | map(attribute='Spec.Name') | list)

    - name: Read the deployed certificate's expiry
      community.crypto.x509_certificate_info:
        content: "{{ _deployed.secrets[0].SecretData }}"
      delegate_to: localhost
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
      register: _cert
      when: _deployed is not skipped

    - name: Compute days remaining on the deployed certificate
      ansible.builtin.set_fact:
        letsencrypt_remaining_days: >-
          {{ ((_cert.not_after | ansible.builtin.to_datetime('%Y%m%d%H%M%SZ')) - now(utc=true)).days
             if (_deployed is not skipped) else -1 }}

    - name: Decide whether to issue a new certificate
      ansible.builtin.set_fact:
        letsencrypt_needs_issue: >-
          {{ (letsencrypt_force_issue | default(false) | bool)
             or (_deployed is skipped)
             or ((letsencrypt_remaining_days | int) < (_renew_days | int)) }}

    - name: Report the decision
      ansible.builtin.debug:
        msg: >-
          {{ 'No certificate deployed; bootstrapping.' if (_deployed is skipped)
             else (letsencrypt_remaining_days ~ ' day(s) remaining; '
                   ~ ('renewing.' if (letsencrypt_needs_issue | bool) else 'within threshold, skipping.')) }}

- name: Issue the certificate on the control node (Cloudflare DNS-01)
  hosts: "{{ cert_hosts | default('letsencrypt') }}"
  gather_facts: false
  connection: local
  become: false

  vars:
    # This play runs locally but targets the remote host, whose discovered
    # interpreter would otherwise be used; pin to the controller's interpreter.
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    _keys_path: "{{ acme_keys_path | default('/tmp/acme-' ~ inventory_hostname) }}"

  tasks:
    # The acme role writes into keys_path but does not create it.
    - name: Ensure the scratch keys directory exists on the control node
      ansible.builtin.file:
        path: "{{ _keys_path }}"
        state: directory
        mode: "0700"
      when: letsencrypt_needs_issue | default(false) | bool

    # Not passing renewal_on_remaining_days makes the role always obtain, so the
    # empty scratch keys_path just receives a fresh keypair+cert. Our host check
    # already owns the renewal decision.
    - name: Issue the certificate (only when a renewal is needed)
      when: letsencrypt_needs_issue | default(false) | bool
      ansible.builtin.include_role:
        name: felixfontein.acme.acme_certificate
      vars:
        acme_certificate_keys_path: "{{ _keys_path }}"
        acme_certificate_domains: "{{ letsencrypt_cert_domains }}"
        acme_certificate_challenge: dns-01
        acme_certificate_dns_provider: cloudflare
        acme_certificate_dns_servers: 8.8.8.8
        acme_certificate_terms_agreed: true
        acme_certificate_modify_account: true
        acme_certificate_acme_email: "{{ lookup('community.general.onepassword', 'acme-key', field='email', vault='awx') }}"
        acme_certificate_acme_account_content: "{{ lookup('community.general.onepassword', 'acme-key', field='key.b64', vault='awx') | b64decode }}"
        # acme_certificate_cloudflare_token comes from inventory (per-host 1P item).

- name: Deliver the renewed certificate as podman secrets
  hosts: "{{ cert_hosts | default('letsencrypt') }}"
  gather_facts: true
  become: true

  vars:
    _run_user: "{{ linux_podman_run_as_user | default('igou') }}"
    _fullchain_secret: "{{ linux_tls_fullchain_secret | default('tls-fullchain') }}"
    _key_secret: "{{ linux_tls_key_secret | default('tls-key') }}"
    _keys_path: "{{ acme_keys_path | default('/tmp/acme-' ~ inventory_hostname) }}"
    _cert_basename: "{{ letsencrypt_cert_domains[0] | replace('*', '_') }}"
    _rootless_env:
      XDG_RUNTIME_DIR: "/run/user/{{ getent_passwd[_run_user][1] }}"
      HOME: "/home/{{ _run_user }}"

  tasks:
    - name: Nothing to deliver when no renewal happened
      ansible.builtin.meta: end_host
      when: not (letsencrypt_needs_issue | default(false) | bool)

    - name: Create or replace the TLS podman secrets
      ansible.builtin.include_role:
        name: linux-system-roles.podman
      vars:
        podman_run_as_user: "{{ _run_user }}"
        podman_secrets:
          - name: "{{ _fullchain_secret }}"
            state: present
            force: true
            data: "{{ lookup('file', _keys_path ~ '/' ~ _cert_basename ~ '-fullchain.pem') }}"
          - name: "{{ _key_secret }}"
            state: present
            force: true
            data: "{{ lookup('file', _keys_path ~ '/' ~ _cert_basename ~ '.key') }}"

    - name: Resolve the run user's uid (for the rootless podman runtime dir)
      ansible.builtin.getent:
        database: passwd
        key: "{{ _run_user }}"

    # Secrets mount at container start, so consuming units must restart to pick
    # up the new cert. Tolerate absence on first bootstrap (units may not exist
    # until podman_quadlets.yaml has run).
    - name: Restart units that consume the certificate
      ansible.builtin.systemd:
        name: "{{ item }}"
        scope: user
        state: restarted
      become: true
      become_user: "{{ _run_user }}"
      environment: "{{ _rootless_env }}"
      loop: "{{ letsencrypt_reload_units | default([]) }}"
      failed_when: false

    - name: Remove the scratch keys from the control node
      ansible.builtin.file:
        path: "{{ _keys_path }}"
        state: absent
      delegate_to: localhost
