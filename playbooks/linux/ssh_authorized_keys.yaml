---
# Manage SSH authorized_keys for a user (add or remove).
#
# Targeting: pass ansible_limit=<host-or-group> (AAP template:
# ssh_authorized_keys). Defaults to 'none' — never 'all'.
#
# Variables:
#   user         - account whose authorized_keys are managed (default igou)
#   github_users - GitHub usernames whose public keys are fetched and applied
#                  (default [david-igou]; set [] to skip)
#   keys         - literal public keys to apply (default: current ed25519 pair)
#   key_state    - present|absent (default present). absent removes the listed
#                  keys — this replaces the old ssh_authorized_keys_remove.yaml.
#   exclusive    - with key_state=present, remove every key NOT listed in this
#                  run (default false). Ignored for absent.
#
# Runs without become: assumes user == ansible_user (set become=true to manage
# another account).
- name: Manage SSH authorized keys
  hosts: "{{ ansible_limit | default('none') }}"
  gather_facts: false
  become: "{{ become | default(false) }}"
  vars:
    user: igou
    key_state: present
    exclusive: false
    github_users:
      - david-igou
    keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOWgNfV1zdod84sj28d+z7YBLkaD5ZImElWt8zHw+u7/
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINHO7UsiIgAepf5+s2z+1CbPQf2eqJo8aNK/vT9Oaf4B
  tasks:

    - name: Fetch public keys from GitHub
      ansible.builtin.set_fact:
        github_keys: >-
          {{ (github_keys | default([]))
             + query('url', 'https://github.com/' ~ item ~ '.keys') }}
      loop: "{{ github_users | default([]) }}"

    # A single authorized_key call with all keys joined: required for
    # exclusive=true to work (looping with exclusive would keep only the
    # last key).
    - name: "Ensure authorized keys are {{ key_state }}"
      ansible.posix.authorized_key:
        user: "{{ user }}"
        state: "{{ key_state }}"
        exclusive: "{{ (key_state == 'present') and (exclusive | bool) }}"
        key: "{{ ((keys | default([])) + (github_keys | default([]))) | join('\n') }}"
