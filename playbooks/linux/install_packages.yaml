---
- name: Install Linux packages
  hosts: "{{ ansible_limit | default('all') }}"
  become: true
  gather_facts: true
  tasks:
    # linux_install_packages is supplied via inventory (host/group vars) or
    # at launch, e.g. -e '{"linux_install_packages": ["podman"]}'. Defaulted
    # here rather than in play vars so inventory values are not shadowed.
    - name: Ensure requested packages are present
      ansible.builtin.package:
        name: "{{ linux_install_packages }}"
        state: present
      when: linux_install_packages | default([]) | length > 0
