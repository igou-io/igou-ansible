---
- name: Baseline configure and harden a Linux host
  hosts: "{{ ansible_limit | default('all') }}"
  become: true
  gather_facts: true

  # baseline_* variables are defined in igou-inventory group_vars/all/main.yml

  # pre_tasks run before roles, so the admin user + key + sudo exist before
  # ssh_hardening disables root login and password auth (prevents lockout).
  pre_tasks:
    - name: Ensure sudo is installed
      ansible.builtin.package:
        name: sudo
        state: present

    - name: Create admin user
      ansible.builtin.user:
        name: "{{ baseline_user }}"
        groups: "{{ baseline_user_groups }}"
        append: true
        shell: "{{ baseline_user_shell }}"
        create_home: true
        password_lock: true  # no password login; key + sudo only
        state: present

    - name: Install authorized SSH keys
      ansible.posix.authorized_key:
        user: "{{ baseline_user }}"
        key: "{{ item }}"
        state: present
      loop: "{{ baseline_authorized_keys }}"

    - name: Grant passwordless sudo
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/90-{{ baseline_user }}"
        content: "{{ baseline_user }} ALL=(ALL) NOPASSWD: ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"
      when: baseline_passwordless_sudo | bool

    # Unprivileged service accounts that own workloads (e.g. the rootless
    # podman run user). Deliberately NOT in wheel/sudo and login-locked with a
    # nologin shell, so a compromised container cannot reach root. Ansible still
    # drives them via become_user from the admin user's session, so they need no
    # SSH access of their own. Created as regular (non-system) users so useradd
    # allocates the /etc/subuid + /etc/subgid ranges rootless podman requires;
    # linger is enabled later by linux-system-roles.podman, not here.
    - name: Create unprivileged service users
      ansible.builtin.user:
        name: "{{ item.name }}"
        shell: "{{ item.shell | default('/usr/sbin/nologin') }}"
        create_home: true
        password_lock: true
        system: false
        state: present
      loop: "{{ baseline_service_users | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    # Enable linger now so each service user's systemd instance + /run/user/<uid>
    # exist at boot, before any session. linux-system-roles.podman also enables
    # linger, but a nologin service user has no login session to create the
    # runtime dir, and plays that query its rootless podman (e.g. the cert
    # renewal decision) run BEFORE that role does - so seed it here.
    - name: Enable linger for service users
      ansible.builtin.command: "loginctl enable-linger {{ item.name }}"
      args:
        creates: "/var/lib/systemd/linger/{{ item.name }}"
      loop: "{{ baseline_service_users | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    # ssh_hardening's crypto_hostkeys task assumes rsa+ecdsa+ed25519 host keys
    # all exist (it derives the list from the OpenSSH version, not from disk)
    # and errors on any missing one. Generate any that are absent first.
    - name: Check which SSH host keys exist
      ansible.builtin.stat:
        path: "/etc/ssh/{{ item }}"
      loop:
        - ssh_host_rsa_key
        - ssh_host_ecdsa_key
        - ssh_host_ed25519_key
      register: baseline_ssh_host_keys

    - name: Generate missing SSH host keys
      ansible.builtin.command: ssh-keygen -A
      when: baseline_ssh_host_keys.results | rejectattr('stat.exists') | list | length > 0
      changed_when: true

  roles:
    - role: devsec.hardening.os_hardening
      vars:
        # Base sysctls applied to every baselined host, merged with an
        # optional per-host/group baseline_sysctl_overwrite from inventory.
        # combine() lets inventory ADD keys (or override a base key by
        # repeating it) without clobbering the base. We merge here rather
        # than letting a host set sysctl_overwrite directly: this role param
        # outranks inventory host_vars, so a bare host_vars value would be
        # silently ignored.
        #
        # kernel.unprivileged_userns_clone re-enables unprivileged user
        # namespaces for rootless podman; devsec sets it to 0 on Ubuntu
        # (CVE-2021-33909).
        sysctl_overwrite: "{{ {'kernel.unprivileged_userns_clone': 1} | combine(baseline_sysctl_overwrite | default({})) }}"

    - role: devsec.hardening.ssh_hardening
      vars:
        ssh_permit_root_login: "no"
        ssh_server_password_login: false
