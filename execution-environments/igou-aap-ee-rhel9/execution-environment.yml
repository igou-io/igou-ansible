---
version: 3
build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: '--pre'
images:
  base_image:
    name: image-registry.openshift-image-registry.svc:5000/ci-igou-ansible/ee-minimal-rhel9
options:
  package_manager_path: /usr/bin/microdnf
dependencies:
  exclude:
    system:
      - openshift-clients
  python_interpreter:
    package_system: python3.14
    python_path: /usr/bin/python3.14
  ansible_core:
    package_pip: ansible-core
  ansible_runner:
    package_pip: ansible-runner
  system:
    - python3-jinja2 [platform:rpm]
    - which [platform:rpm]
    - git-core [platform:rpm]
    - git [platform:rpm]
    - libcurl-devel [platform:rpm]
    - systemd-devel [platform:rpm]
    - gcc [platform:rpm]
    - python3.12-devel [platform:rpm]
    - openssl-devel [platform:rpm]
    - libxml2-devel [platform:rpm]
    - libxslt-devel [platform:rpm]
    - 1password-cli [platform:rpm]
    - terraform [platform:rpm]
    - pkg-config [platform:rpm]
    - systemd-devel [platform:rpm]
    - gcc [platform:rpm]
    - python3.11-devel [platform:rpm]
  python: requirements.txt
  galaxy:
    collections:
      - name: ansible.windows
      - name: community.windows
      - name: ansible.posix
      - name: ansible.netcommon
      - name: ansible.utils
      - name: community.routeros
      - name: community.crypto
      - name: community.general
      - name: redhat.satellite
      - name: redhat.insights
      - name: containers.podman
      - name: community.postgresql
      - name: infra.ah_configuration
      - name: redhat.rhel_system_roles
      - name: ansible.platform
      - name: ansible.hub
      - name: ansible.eda
      - name: ansible.controller
      - name: infra.aap_configuration
      - name: infra.aap_utilities
additional_build_steps:
  prepend_base: |
    RUN microdnf install -y git-core
  prepend_builder:
    - ENV PKGMGR_OPTS "--nodocs --setopt install_weak_deps=0 --enablerepo=rhocp-4.17-for-rhel-9-x86_64-rpms"
  prepend_final:
    - ENV PKGMGR_OPTS "--nodocs --setopt install_weak_deps=0 --enablerepo=rhocp-4.17-for-rhel-9-x86_64-rpms"
  append_base: |
    RUN $PYCMD -m pip install -U pip

    # Configure Terraform Repo
    RUN curl -o /etc/yum.repos.d/hashicorp.repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo

    RUN rpm --import https://downloads.1password.com/linux/keys/1password.asc && \
    sh -c 'echo -e "[1password]\nname=1Password Stable Channel\nbaseurl=https://downloads.1password.com/linux/rpm/stable/\$basearch\nenabled=1\ngpgcheck=1\nrepo_gpgcheck=1\ngpgkey=https://downloads.1password.com/linux/keys/1password.asc" > /etc/yum.repos.d/1password.repo'

  prepend_galaxy:
    - ARG ANSIBLE_GALAXY_SERVER_LIST
    - ARG ANSIBLE_GALAXY_SERVER_PUBLISHED_URL
    - ARG ANSIBLE_GALAXY_SERVER_PUBLISHED_TOKEN
    - ARG ANSIBLE_GALAXY_SERVER_VALIDATED_URL
    - ARG ANSIBLE_GALAXY_SERVER_VALIDATED_TOKEN
    - ARG ANSIBLE_GALAXY_SERVER_CERTIFIED_URL
    - ARG ANSIBLE_GALAXY_SERVER_CERTIFIED_TOKEN
    - ARG ANSIBLE_GALAXY_SERVER_COMMUNITY_URL
    - ARG ANSIBLE_GALAXY_SERVER_COMMUNITY_TOKEN
  append_final: |
    RUN rm -f /etc/ansible/ansible.cfg
    RUN ansible-galaxy collection list
