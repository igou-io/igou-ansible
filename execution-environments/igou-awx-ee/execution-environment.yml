---
version: 3
images:
  base_image:
    # renovate: datasource=docker depName=quay.io/centos/centos
    name: quay.io/centos/centos:stream10-minimal@sha256:96ec023a5306c35c44797f918d9ba369d174a4ed9d4025f9d3902752b17cf8bf
options:
  package_manager_path: /usr/bin/microdnf
dependencies:
  python_interpreter:
    package_system: python3.12
    python_path: /usr/bin/python3.12
  ansible_core:
    # renovate: datasource=pypi depName=ansible-core
    package_pip: ansible-core==2.21.0
  ansible_runner:
    # renovate: datasource=pypi depName=ansible-runner
    package_pip: ansible-runner==2.4.3
  galaxy: ../../requirements.yml
  system: |
    python3.12-devel [platform:rpm compile]
    libcurl-devel [platform:rpm compile]
    krb5-devel [platform:rpm compile]
    krb5-workstation [platform:rpm]
    subversion [platform:rpm]
    subversion [platform:dpkg]
    git-lfs [platform:rpm]
    sshpass [platform:rpm]
    rsync [platform:rpm]
    epel-release [platform:rpm]
    unzip [platform:rpm]
    podman-remote [platform:rpm]
    cmake [platform:rpm compile]
    gcc [platform:rpm compile]
    gcc-c++ [platform:rpm compile]
    make [platform:rpm compile]
    openssl-devel [platform:rpm compile]
    openssl [platform:rpm]
    nmstate
    1password-cli
    terraform
    coreos-installer
    tar
  python: requirements.txt
additional_build_steps:
  prepend_base: |
    RUN microdnf install -y git-core
  append_base: |
    RUN $PYCMD -m pip install -U pip

    # Configure Terraform Repo
    RUN curl -o /etc/yum.repos.d/hashicorp.repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo

    RUN rpm --import https://downloads.1password.com/linux/keys/1password.asc && \
    sh -c 'echo -e "[1password]\nname=1Password Stable Channel\nbaseurl=https://downloads.1password.com/linux/rpm/stable/\$basearch\nenabled=1\ngpgcheck=1\nrepo_gpgcheck=1\ngpgkey=https://downloads.1password.com/linux/keys/1password.asc" > /etc/yum.repos.d/1password.repo'

  append_final: |
    # renovate: datasource=github-releases depName=ansible/receptor
    ARG RECEPTOR_VERSION="v1.6.5"
    RUN curl -L -o /tmp/receptor.tar.gz "https://github.com/ansible/receptor/releases/download/${RECEPTOR_VERSION}/receptor_${RECEPTOR_VERSION#v}_linux_amd64.tar.gz" && \
        tar xzf /tmp/receptor.tar.gz -C /usr/bin/ receptor && \
        chmod +x /usr/bin/receptor && \
        rm -f /tmp/receptor.tar.gz
    RUN mkdir -p /var/run/receptor && \
        git lfs install --system && \
        alternatives --install /usr/bin/python python /usr/bin/python3.12 312
    # renovate: datasource=github-releases depName=kubernetes-sigs/kustomize extractVersion=^kustomize/(?<version>.*)$
    ARG KUSTOMIZE_VERSION="v5.8.1"
    # renovate: datasource=github-releases depName=helm/helm
    ARG HELM_VERSION="v4.2.2"
    RUN curl -L -o /tmp/kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" && \
        tar xzf /tmp/kustomize.tar.gz -C /usr/local/bin/ && \
        chmod +x /usr/local/bin/kustomize && \
        curl -L -o /tmp/oc.tar.gz https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/latest/openshift-client-linux.tar.gz && \
        tar xzf /tmp/oc.tar.gz -C /usr/local/bin/ && \
        chmod +x /usr/local/bin/oc && \
        curl -L -o /tmp/helm.tar.gz "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz" && \
        tar xzf /tmp/helm.tar.gz --strip-components=1 -C /usr/local/bin linux-amd64/helm && \
        rm -f /tmp/kustomize.tar.gz /tmp/oc.tar.gz /tmp/helm.tar.gz
    RUN oc version && python -V && ansible --version && ansible-galaxy collection list
