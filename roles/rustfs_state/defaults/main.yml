---
# rc CLI pin — bump version and checksum together (Renovate-review item:
# the admin API is pre-stable, so bump rc and the server image in step and
# run the drift job after every server upgrade).
rustfs_state_rc_version: "0.1.25"
# sha256 of rustfs-cli-linux-amd64-v{version}.tar.gz (the release publishes
# a .sha256 asset next to the tarball).
rustfs_state_rc_checksum: "sha256:a2d359f9c1c934886e236eb264318bbab326cb67cfae718e3a5186c8cfae82fe"
rustfs_state_rc_url: "https://github.com/rustfs/cli/releases/download/v{{ rustfs_state_rc_version }}/rustfs-cli-linux-amd64-v{{ rustfs_state_rc_version }}.tar.gz"
# Path to a pre-installed rc binary (e.g. baked into the EE image). Empty
# string -> download the pinned tarball into the run's tempdir and verify
# the checksum.
rustfs_state_rc_binary: ""

# The RustFS admin API (/rustfs/admin/v3/*) intermittently refuses requests
# in bursts on 1.0.0-beta.8 while the S3 data path stays healthy, so every
# rc call is retried.
rustfs_state_retries: 8
rustfs_state_retry_delay: 3

# Policies shipped with the server — never reported as unmanaged.
rustfs_state_builtin_policies:
  - readonly
  - readwrite
  - writeonly
  - diagnostics
  - consoleAdmin

# Fail the play when drift is detected. Defaults to check-mode only: the
# nightly drift job runs with --check and must go red on drift, while a
# converge run fixes drift instead of failing on it.
rustfs_state_fail_on_drift: "{{ ansible_check_mode }}"

# rustfs_state_instances — REQUIRED, deliberately no default: a run without
# a spec must fail loudly, not pass green. A list of instances with
# RESOLVED credential values; the role performs no secret lookups itself
# (function-style interface — op:// lookup expressions belong in the
# caller's data, e.g. igou-inventory group_vars/rustfs.yml). Schema:
# meta/argument_specs.yml + README.
# rustfs_state_instances:
