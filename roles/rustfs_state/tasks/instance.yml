---
# Reconcile one instance (loop_var: rustfs_instance).
#
# Admin credentials come from an inline override (admin_access_key /
# admin_secret_key — molecule) or a 1Password item (admin_credential_item +
# admin_credential_vault; field names default to username/password to match
# the existing rustfs consumer items).

- name: "{{ rustfs_instance.name }} | Resolve admin credentials"
  ansible.builtin.set_fact:
    _rustfs_admin_ak: >-
      {{ rustfs_instance.admin_access_key
         if rustfs_instance.admin_access_key is defined
         else lookup('community.general.onepassword',
                     rustfs_instance.admin_credential_item,
                     field=rustfs_instance.admin_access_key_field | default('username'),
                     vault=rustfs_instance.admin_credential_vault) }}
    _rustfs_admin_sk: >-
      {{ rustfs_instance.admin_secret_key
         if rustfs_instance.admin_secret_key is defined
         else lookup('community.general.onepassword',
                     rustfs_instance.admin_credential_item,
                     field=rustfs_instance.admin_secret_key_field | default('password'),
                     vault=rustfs_instance.admin_credential_vault) }}
  no_log: true
  check_mode: false

- name: "{{ rustfs_instance.name }} | Register rc alias"
  ansible.builtin.command:
    argv:
      - "{{ rustfs_state_rc }}"
      - alias
      - set
      - "{{ rustfs_instance.name }}"
      - "{{ rustfs_instance.endpoint }}"
      - "{{ _rustfs_admin_ak }}"
      - "{{ _rustfs_admin_sk }}"
  environment: "{{ rustfs_state_env }}"
  register: _rustfs_alias
  retries: "{{ rustfs_state_retries }}"
  delay: "{{ rustfs_state_retry_delay }}"
  until: _rustfs_alias.rc == 0
  no_log: true
  check_mode: false
  changed_when: false

- name: "{{ rustfs_instance.name }} | Read buckets"
  ansible.builtin.command: "{{ rustfs_state_rc }} ls {{ rustfs_instance.name }} --json"
  environment: "{{ rustfs_state_env }}"
  register: _rustfs_ls
  retries: "{{ rustfs_state_retries }}"
  delay: "{{ rustfs_state_retry_delay }}"
  until: _rustfs_ls.rc == 0
  check_mode: false
  changed_when: false

- name: "{{ rustfs_instance.name }} | Read policies"
  ansible.builtin.command: "{{ rustfs_state_rc }} admin policy ls {{ rustfs_instance.name }} --json"
  environment: "{{ rustfs_state_env }}"
  register: _rustfs_policy_ls
  retries: "{{ rustfs_state_retries }}"
  delay: "{{ rustfs_state_retry_delay }}"
  until: _rustfs_policy_ls.rc == 0
  check_mode: false
  changed_when: false

- name: "{{ rustfs_instance.name }} | Read users"
  ansible.builtin.command: "{{ rustfs_state_rc }} admin user ls {{ rustfs_instance.name }} --json"
  environment: "{{ rustfs_state_env }}"
  register: _rustfs_user_ls
  retries: "{{ rustfs_state_retries }}"
  delay: "{{ rustfs_state_retry_delay }}"
  until: _rustfs_user_ls.rc == 0
  check_mode: false
  changed_when: false

- name: "{{ rustfs_instance.name }} | Parse current state"
  ansible.builtin.set_fact:
    _rustfs_current_buckets: "{{ (_rustfs_ls.stdout | from_json)['items'] | default([]) | map(attribute='key') | list }}"
    _rustfs_current_policies: "{{ (_rustfs_policy_ls.stdout | from_json).policies | default([]) }}"
    _rustfs_current_users: "{{ (_rustfs_user_ls.stdout | from_json).users | default([]) }}"

- name: "{{ rustfs_instance.name }} | Reconcile policies"
  ansible.builtin.include_tasks: policy.yml
  loop: "{{ rustfs_instance.policies | default([]) }}"
  loop_control:
    loop_var: rustfs_policy
    label: "{{ rustfs_instance.name }}:{{ rustfs_policy.name }}"

- name: "{{ rustfs_instance.name }} | Reconcile buckets"
  ansible.builtin.include_tasks: bucket.yml
  loop: "{{ rustfs_instance.buckets | default([]) }}"
  loop_control:
    loop_var: rustfs_bucket
    label: "{{ rustfs_instance.name }}:{{ rustfs_bucket.name }}"

- name: "{{ rustfs_instance.name }} | Reconcile users"
  ansible.builtin.include_tasks: user.yml
  loop: "{{ rustfs_instance.users | default([]) }}"
  loop_control:
    loop_var: rustfs_user
    label: "{{ rustfs_instance.name }}:{{ rustfs_user.name }}"

- name: "{{ rustfs_instance.name }} | Verify credential liveness"
  ansible.builtin.include_tasks: liveness.yml
  loop: "{{ rustfs_instance.users | default([]) }}"
  loop_control:
    loop_var: rustfs_user
    label: "{{ rustfs_instance.name }}:{{ rustfs_user.name }}"
  when: rustfs_user.liveness_bucket is defined

# Deletion safety: resources on the server but absent from the spec are
# REPORTED, never deleted.
- name: "{{ rustfs_instance.name }} | Record unmanaged server-side resources"
  ansible.builtin.set_fact:
    rustfs_state_unmanaged: >-
      {{ rustfs_state_unmanaged
         + (_rustfs_current_buckets
            | difference(rustfs_instance.buckets | default([]) | map(attribute='name') | list)
            | map('regex_replace', '^(.*)$', rustfs_instance.name ~ ':bucket:\1') | list)
         + (_rustfs_current_users | map(attribute='accessKey') | list
            | difference(rustfs_instance.users | default([]) | map(attribute='name') | list)
            | map('regex_replace', '^(.*)$', rustfs_instance.name ~ ':user:\1') | list)
         + (_rustfs_current_policies
            | difference(rustfs_state_builtin_policies)
            | difference(rustfs_instance.policies | default([]) | map(attribute='name') | list)
            | map('regex_replace', '^(.*)$', rustfs_instance.name ~ ':policy:\1') | list) }}
