---
# Reconcile one instance (loop_var: rustfs_state_instance). Credentials
# arrive RESOLVED in the instance data — the role performs no secret
# lookups (function-style interface, see meta/argument_specs.yml).

- name: "Register rc alias for instance {{ rustfs_state_instance.name }}"
  ansible.builtin.command:
    argv:
      - "{{ rustfs_state_rc }}"
      - alias
      - set
      - "{{ rustfs_state_instance.name }}"
      - "{{ rustfs_state_instance.endpoint }}"
      - "{{ rustfs_state_instance.admin_access_key }}"
      - "{{ rustfs_state_instance.admin_secret_key }}"
  environment: "{{ rustfs_state_env }}"
  register: _rustfs_state_alias
  retries: "{{ rustfs_state_retries }}"
  delay: "{{ rustfs_state_retry_delay }}"
  until: _rustfs_state_alias.rc == 0
  no_log: true
  check_mode: false
  changed_when: false

- name: "Read buckets on {{ rustfs_state_instance.name }}"
  ansible.builtin.command: "{{ rustfs_state_rc }} ls {{ rustfs_state_instance.name }} --json"
  environment: "{{ rustfs_state_env }}"
  register: _rustfs_state_ls
  retries: "{{ rustfs_state_retries }}"
  delay: "{{ rustfs_state_retry_delay }}"
  until: _rustfs_state_ls.rc == 0
  check_mode: false
  changed_when: false

- name: "Read policies on {{ rustfs_state_instance.name }}"
  ansible.builtin.command: "{{ rustfs_state_rc }} admin policy ls {{ rustfs_state_instance.name }} --json"
  environment: "{{ rustfs_state_env }}"
  register: _rustfs_state_policy_ls
  retries: "{{ rustfs_state_retries }}"
  delay: "{{ rustfs_state_retry_delay }}"
  until: _rustfs_state_policy_ls.rc == 0
  check_mode: false
  changed_when: false

- name: "Read users on {{ rustfs_state_instance.name }}"
  ansible.builtin.command: "{{ rustfs_state_rc }} admin user ls {{ rustfs_state_instance.name }} --json"
  environment: "{{ rustfs_state_env }}"
  register: _rustfs_state_user_ls
  retries: "{{ rustfs_state_retries }}"
  delay: "{{ rustfs_state_retry_delay }}"
  until: _rustfs_state_user_ls.rc == 0
  check_mode: false
  changed_when: false

- name: "Parse current state of {{ rustfs_state_instance.name }}"
  ansible.builtin.set_fact:
    _rustfs_state_current_buckets: "{{ (_rustfs_state_ls.stdout | from_json)['items'] | default([]) | map(attribute='key') | list }}"
    _rustfs_state_current_policies: "{{ (_rustfs_state_policy_ls.stdout | from_json).policies | default([]) }}"
    _rustfs_state_current_users: "{{ (_rustfs_state_user_ls.stdout | from_json).users | default([]) }}"

- name: "Reconcile policies on {{ rustfs_state_instance.name }}"
  ansible.builtin.include_tasks: policy.yml
  loop: "{{ rustfs_state_instance.policies | default([]) }}"
  loop_control:
    loop_var: rustfs_state_policy
    label: "{{ rustfs_state_instance.name }}:{{ rustfs_state_policy.name }}"

- name: "Reconcile buckets on {{ rustfs_state_instance.name }}"
  ansible.builtin.include_tasks: bucket.yml
  loop: "{{ rustfs_state_instance.buckets | default([]) }}"
  loop_control:
    loop_var: rustfs_state_bucket
    label: "{{ rustfs_state_instance.name }}:{{ rustfs_state_bucket.name }}"

- name: "Reconcile users on {{ rustfs_state_instance.name }}"
  ansible.builtin.include_tasks: user.yml
  loop: "{{ rustfs_state_instance.users | default([]) }}"
  loop_control:
    loop_var: rustfs_state_user
    label: "{{ rustfs_state_instance.name }}:{{ rustfs_state_user.name }}"

# A user that is missing from the server in check mode is pending creation
# (already reported as drift) — probing its credentials would misreport a
# dead credential, so liveness skips it there. In a real converge the user
# was just created, so the probe is valid.
- name: "Verify credential liveness on {{ rustfs_state_instance.name }}"
  ansible.builtin.include_tasks: liveness.yml
  loop: "{{ rustfs_state_instance.users | default([]) }}"
  loop_control:
    loop_var: rustfs_state_user
    label: "{{ rustfs_state_instance.name }}:{{ rustfs_state_user.name }}"
  when:
    - rustfs_state_user.liveness_bucket is defined
    - rustfs_state_user.secret_key is defined
    - >-
      rustfs_state_user.name in (_rustfs_state_current_users | map(attribute='accessKey') | list)
      or not ansible_check_mode

# Deletion safety: resources on the server but absent from the spec are
# REPORTED, never deleted.
- name: "Record unmanaged server-side resources on {{ rustfs_state_instance.name }}"
  ansible.builtin.set_fact:
    rustfs_state_unmanaged: >-
      {{ rustfs_state_unmanaged
         + (_rustfs_state_current_buckets
            | difference(rustfs_state_instance.buckets | default([]) | map(attribute='name') | list)
            | map('regex_replace', '^(.*)$', rustfs_state_instance.name ~ ':bucket:\1') | list)
         + (_rustfs_state_current_users | map(attribute='accessKey') | list
            | difference(rustfs_state_instance.users | default([]) | map(attribute='name') | list)
            | map('regex_replace', '^(.*)$', rustfs_state_instance.name ~ ':user:\1') | list)
         + (_rustfs_state_current_policies
            | difference(rustfs_state_builtin_policies)
            | difference(rustfs_state_instance.policies | default([]) | map(attribute='name') | list)
            | map('regex_replace', '^(.*)$', rustfs_state_instance.name ~ ':policy:\1') | list) }}
