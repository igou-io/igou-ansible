---
# Verify one user's provided credentials actually authenticate
# (loop_var: rustfs_state_user; included only when liveness_bucket and
# secret_key are set — see the gate in instance.yml).
#
# The pair is used exactly as provided by the caller (access_key defaults
# to the user's name; in production the caller resolves both from
# 1Password) — divergence between the credential store and the server is
# exactly what this catches (wedged server, stale item, out-of-band
# rotation). Failures are collected and the play fails after the full
# report.
#
# `rc alias set` validates the pair against the endpoint (exit 4 on bad
# credentials), so a dead key is usually caught right here; the bucket
# listing then proves the pair can actually reach its data.

- name: "Register liveness alias for user {{ rustfs_state_instance.name ~ ':' ~ rustfs_state_user.name }}"
  ansible.builtin.command:
    argv:
      - "{{ rustfs_state_rc }}"
      - alias
      - set
      - "live-{{ rustfs_state_instance.name }}-{{ rustfs_state_user.name }}"
      - "{{ rustfs_state_instance.endpoint }}"
      - "{{ rustfs_state_user.access_key | default(rustfs_state_user.name) }}"
      - "{{ rustfs_state_user.secret_key }}"
  environment: "{{ rustfs_state_env }}"
  register: _rustfs_state_live_alias
  retries: "{{ rustfs_state_retries }}"
  delay: "{{ rustfs_state_retry_delay }}"
  until: >-
    _rustfs_state_live_alias.rc == 0
    or 'network_error' not in (_rustfs_state_live_alias.stdout ~ _rustfs_state_live_alias.stderr)
  failed_when: false
  no_log: true
  check_mode: false
  changed_when: false

- name: "List liveness bucket as user {{ rustfs_state_instance.name ~ ':' ~ rustfs_state_user.name }}"
  ansible.builtin.command: >-
    {{ rustfs_state_rc }} ls
    live-{{ rustfs_state_instance.name }}-{{ rustfs_state_user.name }}/{{ rustfs_state_user.liveness_bucket }}
  environment: "{{ rustfs_state_env }}"
  register: _rustfs_state_live_ls
  retries: "{{ rustfs_state_retries }}"
  delay: "{{ rustfs_state_retry_delay }}"
  until: >-
    _rustfs_state_live_ls.rc == 0
    or 'network_error' not in (_rustfs_state_live_ls.stdout ~ _rustfs_state_live_ls.stderr)
  failed_when: false
  check_mode: false
  changed_when: false
  when: _rustfs_state_live_alias.rc == 0

- name: "Record liveness failure for user {{ rustfs_state_instance.name ~ ':' ~ rustfs_state_user.name }}"
  when: _rustfs_state_live_alias.rc != 0 or (_rustfs_state_live_ls.rc | default(1)) != 0
  ansible.builtin.set_fact:
    rustfs_state_liveness_failures: >-
      {{ rustfs_state_liveness_failures
         + [rustfs_state_instance.name ~ ':' ~ rustfs_state_user.name] }}
