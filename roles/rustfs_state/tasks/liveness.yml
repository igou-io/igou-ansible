---
# Verify one user's stored credentials actually authenticate
# (loop_var: rustfs_user; only included when liveness_bucket is set).
#
# Uses the key pair as stored in 1Password (or the inline pair), NOT the
# server's view — divergence between the two is exactly what this catches
# (wedged server, stale item, out-of-band rotation). Failures are collected
# and the play fails after the full report.
#
# `rc alias set` validates the pair against the endpoint (exit 4 on bad
# credentials), so a dead key is usually caught right here; the bucket
# listing then proves the pair can actually reach its data.

- name: "{{ rustfs_instance.name }} | liveness {{ rustfs_user.name }} | Register throwaway alias"
  ansible.builtin.command:
    argv:
      - "{{ rustfs_state_rc }}"
      - alias
      - set
      - "live-{{ rustfs_instance.name }}-{{ rustfs_user.name }}"
      - "{{ rustfs_instance.endpoint }}"
      - >-
        {{ rustfs_user.name
           if rustfs_user.secret_key is defined
           else lookup('community.general.onepassword',
                       rustfs_user.credential_item,
                       field=rustfs_user.credential_access_key_field | default('username'),
                       vault=rustfs_user.credential_vault) }}
      - >-
        {{ rustfs_user.secret_key
           if rustfs_user.secret_key is defined
           else lookup('community.general.onepassword',
                       rustfs_user.credential_item,
                       field=rustfs_user.credential_secret_key_field | default('password'),
                       vault=rustfs_user.credential_vault) }}
  environment: "{{ rustfs_state_env }}"
  register: _rustfs_live_alias
  retries: "{{ rustfs_state_retries }}"
  delay: "{{ rustfs_state_retry_delay }}"
  until: _rustfs_live_alias.rc == 0 or 'network_error' not in (_rustfs_live_alias.stdout ~ _rustfs_live_alias.stderr)
  failed_when: false
  no_log: true
  check_mode: false
  changed_when: false

- name: "{{ rustfs_instance.name }} | liveness {{ rustfs_user.name }} | List bucket with stored credentials"
  ansible.builtin.command: >-
    {{ rustfs_state_rc }} ls
    live-{{ rustfs_instance.name }}-{{ rustfs_user.name }}/{{ rustfs_user.liveness_bucket }}
  environment: "{{ rustfs_state_env }}"
  register: _rustfs_live_ls
  retries: "{{ rustfs_state_retries }}"
  delay: "{{ rustfs_state_retry_delay }}"
  until: _rustfs_live_ls.rc == 0 or 'network_error' not in (_rustfs_live_ls.stdout ~ _rustfs_live_ls.stderr)
  failed_when: false
  check_mode: false
  changed_when: false
  when: _rustfs_live_alias.rc == 0

- name: "{{ rustfs_instance.name }} | liveness {{ rustfs_user.name }} | Record failure"
  when: _rustfs_live_alias.rc != 0 or (_rustfs_live_ls.rc | default(1)) != 0
  ansible.builtin.set_fact:
    rustfs_state_liveness_failures: >-
      {{ rustfs_state_liveness_failures
         + [rustfs_instance.name ~ ':' ~ rustfs_user.name
            ~ ((' (op://' ~ rustfs_user.credential_vault ~ '/' ~ rustfs_user.credential_item ~ ')')
               if rustfs_user.credential_item is defined else ' (inline)')] }}
