---
# Reconcile one IAM user (loop_var: rustfs_state_user): existence and
# policy attachments. The user's name IS its access key.
#
# Secret handling (function-style — the role never resolves secrets):
# - creation uses the RESOLVED `secret_key` provided in the spec; if it is
#   absent when the user needs creating, the run fails with instructions.
#   The role never generates credentials.
# - an EXISTING user's secret is never touched (rc `admin user add` on an
#   existing access key would reset it) — rotation is a deliberate manual
#   act, not a converge side effect.

- name: "Compute state for user {{ rustfs_state_instance.name ~ ':' ~ rustfs_state_user.name }}"
  ansible.builtin.set_fact:
    _rustfs_state_user_exists: "{{ rustfs_state_user.name in (_rustfs_state_current_users | map(attribute='accessKey') | list) }}"
    _rustfs_state_user_current_policies: >-
      {{ (_rustfs_state_current_users
          | selectattr('accessKey', 'equalto', rustfs_state_user.name)
          | map(attribute='policies') | first) | default([]) }}

- name: "Create user {{ rustfs_state_instance.name ~ ':' ~ rustfs_state_user.name }}"
  when: not (_rustfs_state_user_exists | bool)
  block:
    - name: "Require a resolved secret for user {{ rustfs_state_instance.name ~ ':' ~ rustfs_state_user.name }}"
      ansible.builtin.assert:
        that: rustfs_state_user.secret_key is defined
        fail_msg: >-
          User {{ rustfs_state_user.name }} needs to be created on
          {{ rustfs_state_instance.name }} but no secret_key was provided.
          The role takes resolved credentials only — add the value (e.g. a
          1Password lookup) to the instance data in the caller.

    - name: "Record change for user {{ rustfs_state_instance.name ~ ':' ~ rustfs_state_user.name }}"
      ansible.builtin.set_fact:
        rustfs_state_changes: "{{ rustfs_state_changes + [rustfs_state_instance.name ~ ':user:' ~ rustfs_state_user.name ~ ':create'] }}"

    - name: "Add user {{ rustfs_state_instance.name ~ ':' ~ rustfs_state_user.name }}"
      ansible.builtin.command:
        argv:
          - "{{ rustfs_state_rc }}"
          - admin
          - user
          - add
          - "{{ rustfs_state_instance.name }}"
          - "{{ rustfs_state_user.name }}"
          - "{{ rustfs_state_user.secret_key }}"
      environment: "{{ rustfs_state_env }}"
      register: _rustfs_state_user_add
      retries: "{{ rustfs_state_retries }}"
      delay: "{{ rustfs_state_retry_delay }}"
      until: _rustfs_state_user_add.rc == 0
      no_log: true
      changed_when: true

- name: "Attach missing policies to user {{ rustfs_state_instance.name ~ ':' ~ rustfs_state_user.name }}"
  vars:
    _rustfs_state_user_missing_policies: >-
      {{ (rustfs_state_user.policies | default([]))
         | difference(_rustfs_state_user_exists | bool | ternary(_rustfs_state_user_current_policies, [])) }}
  when: _rustfs_state_user_missing_policies | length > 0
  block:
    - name: "Record attachment change for user {{ rustfs_state_instance.name ~ ':' ~ rustfs_state_user.name }}"
      ansible.builtin.set_fact:
        rustfs_state_changes: >-
          {{ rustfs_state_changes
             + [rustfs_state_instance.name ~ ':user:' ~ rustfs_state_user.name ~ ':attach:'
                ~ (_rustfs_state_user_missing_policies | join('+'))] }}

    - name: "Attach policies to user {{ rustfs_state_instance.name ~ ':' ~ rustfs_state_user.name }}"
      ansible.builtin.command: >-
        {{ rustfs_state_rc }} admin policy attach {{ rustfs_state_instance.name }}
        {{ _rustfs_state_user_missing_policies | join(',') }}
        --user {{ rustfs_state_user.name }}
      environment: "{{ rustfs_state_env }}"
      register: _rustfs_state_user_attach
      retries: "{{ rustfs_state_retries }}"
      delay: "{{ rustfs_state_retry_delay }}"
      until: _rustfs_state_user_attach.rc == 0
      changed_when: true

# Policies attached on the server but absent from the spec are reported,
# never detached (rc 0.1.x has no detach subcommand anyway).
- name: "Record extra attachments for user {{ rustfs_state_instance.name ~ ':' ~ rustfs_state_user.name }}"
  vars:
    _rustfs_state_user_extra_policies: >-
      {{ (_rustfs_state_user_exists | bool | ternary(_rustfs_state_user_current_policies, []))
         | difference(rustfs_state_user.policies | default([])) }}
  when: _rustfs_state_user_extra_policies | length > 0
  ansible.builtin.set_fact:
    rustfs_state_unmanaged: >-
      {{ rustfs_state_unmanaged
         + [rustfs_state_instance.name ~ ':user:' ~ rustfs_state_user.name ~ ':extra-attachment:'
            ~ (_rustfs_state_user_extra_policies | join('+'))] }}
