---
# Reconcile one bucket (loop_var: rustfs_state_bucket): existence,
# versioning (only when the `versioning` key is present), lifecycle rules
# (only when `lifecycle.rules` is present). Quotas are intentionally out of
# scope for v1 — nothing live uses them.

- name: "Create bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
  when: rustfs_state_bucket.name not in _rustfs_state_current_buckets
  block:
    - name: "Record change for bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
      ansible.builtin.set_fact:
        rustfs_state_changes: "{{ rustfs_state_changes + [rustfs_state_instance.name ~ ':bucket:' ~ rustfs_state_bucket.name ~ ':create'] }}"

    - name: "Make bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
      ansible.builtin.command: "{{ rustfs_state_rc }} bucket create {{ rustfs_state_instance.name }}/{{ rustfs_state_bucket.name }}"
      environment: "{{ rustfs_state_env }}"
      register: _rustfs_state_bucket_create
      retries: "{{ rustfs_state_retries }}"
      delay: "{{ rustfs_state_retry_delay }}"
      until: _rustfs_state_bucket_create.rc == 0
      changed_when: true

- name: "Manage versioning for bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
  when: rustfs_state_bucket.versioning is defined
  block:
    - name: "Read versioning of bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
      ansible.builtin.command: >-
        {{ rustfs_state_rc }} bucket version info
        {{ rustfs_state_instance.name }}/{{ rustfs_state_bucket.name }} --json
      environment: "{{ rustfs_state_env }}"
      register: _rustfs_state_versioning
      retries: "{{ rustfs_state_retries }}"
      delay: "{{ rustfs_state_retry_delay }}"
      until: >-
        _rustfs_state_versioning.rc == 0
        or 'network_error' not in (_rustfs_state_versioning.stdout ~ _rustfs_state_versioning.stderr)
      failed_when: false
      check_mode: false
      changed_when: false

    # A bucket missing in check mode reads as unversioned.
    - name: "Compute versioning drift for bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
      ansible.builtin.set_fact:
        _rustfs_state_versioning_current: >-
          {{ _rustfs_state_versioning.rc == 0
             and ((_rustfs_state_versioning.stdout | from_json).enabled | bool) }}

    - name: "Converge versioning for bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
      when: (_rustfs_state_versioning_current | bool) != (rustfs_state_bucket.versioning | bool)
      block:
        - name: "Record versioning change for bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
          ansible.builtin.set_fact:
            rustfs_state_changes: >-
              {{ rustfs_state_changes
                 + [rustfs_state_instance.name ~ ':bucket:' ~ rustfs_state_bucket.name ~ ':versioning:'
                    ~ (rustfs_state_bucket.versioning | bool | ternary('enable', 'suspend'))] }}

        - name: "Set versioning on bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
          ansible.builtin.command: >-
            {{ rustfs_state_rc }} bucket version
            {{ rustfs_state_bucket.versioning | bool | ternary('enable', 'suspend') }}
            {{ rustfs_state_instance.name }}/{{ rustfs_state_bucket.name }}
          environment: "{{ rustfs_state_env }}"
          register: _rustfs_state_versioning_set
          retries: "{{ rustfs_state_retries }}"
          delay: "{{ rustfs_state_retry_delay }}"
          until: _rustfs_state_versioning_set.rc == 0
          changed_when: true

- name: "Manage lifecycle for bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
  when: rustfs_state_bucket.lifecycle.rules is defined
  block:
    - name: "Export lifecycle rules of bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
      ansible.builtin.command: >-
        {{ rustfs_state_rc }} ilm rule export
        {{ rustfs_state_instance.name }}/{{ rustfs_state_bucket.name }}
      environment: "{{ rustfs_state_env }}"
      register: _rustfs_state_ilm
      retries: "{{ rustfs_state_retries }}"
      delay: "{{ rustfs_state_retry_delay }}"
      until: >-
        _rustfs_state_ilm.rc == 0
        or 'network_error' not in (_rustfs_state_ilm.stdout ~ _rustfs_state_ilm.stderr)
      failed_when: false
      check_mode: false
      changed_when: false

    # A bucket with no lifecycle configuration (or missing in check mode)
    # reads as an empty rule list. Comparison strips server-generated rule
    # ids on both sides.
    - name: "Compute lifecycle drift for bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
      ansible.builtin.set_fact:
        _rustfs_state_ilm_matches: >-
          {{ (((_rustfs_state_ilm.stdout | from_json).rules | default([])) | rustfs_canonical_ilm)
             == (rustfs_state_bucket.lifecycle.rules | rustfs_canonical_ilm)
             if _rustfs_state_ilm.rc == 0
             else (rustfs_state_bucket.lifecycle.rules | length == 0) }}

    - name: "Converge lifecycle for bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
      when: not (_rustfs_state_ilm_matches | bool)
      block:
        - name: "Record lifecycle change for bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
          ansible.builtin.set_fact:
            rustfs_state_changes: "{{ rustfs_state_changes + [rustfs_state_instance.name ~ ':bucket:' ~ rustfs_state_bucket.name ~ ':lifecycle:import'] }}"

        - name: "Render lifecycle rules for bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
          ansible.builtin.copy:
            content: "{{ {'rules': rustfs_state_bucket.lifecycle.rules} | to_nice_json }}"
            dest: "{{ rustfs_state_workdir }}/ilm-{{ rustfs_state_instance.name }}-{{ rustfs_state_bucket.name }}.json"
            mode: "0600"
          changed_when: false

        - name: "Import lifecycle rules to bucket {{ rustfs_state_instance.name ~ '/' ~ rustfs_state_bucket.name }}"
          ansible.builtin.command: >-
            {{ rustfs_state_rc }} ilm rule import
            {{ rustfs_state_instance.name }}/{{ rustfs_state_bucket.name }}
            {{ rustfs_state_workdir }}/ilm-{{ rustfs_state_instance.name }}-{{ rustfs_state_bucket.name }}.json
          environment: "{{ rustfs_state_env }}"
          register: _rustfs_state_ilm_import
          retries: "{{ rustfs_state_retries }}"
          delay: "{{ rustfs_state_retry_delay }}"
          until: _rustfs_state_ilm_import.rc == 0
          changed_when: true
