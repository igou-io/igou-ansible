---
argument_specs:
  main:
    short_description: "Disable idle standby and hibernation on a Windows guest."
    description:
      - >-
        Zeroes the AC idle standby-timeout and turns hibernation off via
        powercfg. A Win11 client SKU sleeps on idle by default, and a sleeping
        KubeVirt guest drops RDP, WinRM, and the qemu guest agent while the VMI
        still reports Ready. Idempotent: no-op when the AC standby-idle index is
        already 0x00000000 and HibernateEnabled is already 0.
    options:
      windows_power_disable_sleep:
        type: bool
        default: true
        description: >-
          Gate the task. When true, zero the AC idle standby-timeout and turn
          hibernation off. When false, the role does nothing.
