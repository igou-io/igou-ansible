---
# routeros_firewall — audit-or-enforce entrypoint. Default tasks_from for
# this role.
#
# Validates inputs, then (in enforce mode) takes a pre-write backup
# snapshot, then calls community.routeros.api_modify against each managed
# sub-path with the desired-state list from routeros_firewall_rules[<path>].
# Audit and enforce share this entrypoint; routeros_firewall_enforce (default
# false) flips check_mode and gates the backup task.
#
# The play MUST be invoked with `--diff` (or `diff: true` on the tasks) for
# the per-field before/after to appear. Without --diff the module still
# reports changed=true|false but no actionable detail.

- name: Validate inputs (credentials + desired state)
  ansible.builtin.import_tasks: _assert_inputs.yml
  vars:
    _assert_check_desired: true

- name: Take pre-enforce backup snapshot
  ansible.builtin.import_tasks: _backup_before_enforce.yml
  when: routeros_firewall_enforce | bool

- name: Audit or enforce IPv4 firewall sub-paths
  community.routeros.api_modify:
    hostname: "{{ routeros_firewall_api_host }}"
    port: "{{ routeros_firewall_api_port }}"
    username: "{{ routeros_firewall_api_username }}"
    password: "{{ routeros_firewall_api_password }}"
    tls: "{{ routeros_firewall_api_tls }}"
    validate_certs: "{{ routeros_firewall_api_validate_certs }}"
    path: "ip firewall {{ _routeros_firewall_path }}"
    data: "{{ routeros_firewall_rules[_routeros_firewall_path] | default([], true) }}"
    handle_absent_entries: remove
    # community.routeros forbids handle_absent_entries=remove combined with
    # the default handle_entries_content=ignore on filter/nat/mangle/raw.
    # remove_as_much_as_possible resets only fields with a known default,
    # matching the upstream example.
    handle_entries_content: remove_as_much_as_possible
    ensure_order: "{{ routeros_firewall_ordered[_routeros_firewall_path] | default(true) }}"
  register: _routeros_firewall_audit_results_v4
  check_mode: "{{ not (routeros_firewall_enforce | bool) }}"
  diff: true
  loop: "{{ routeros_firewall_paths }}"
  loop_control:
    loop_var: _routeros_firewall_path
    label: "ip firewall {{ _routeros_firewall_path }}"
  delegate_to: localhost

- name: Audit or enforce IPv6 firewall sub-paths
  community.routeros.api_modify:
    hostname: "{{ routeros_firewall_api_host }}"
    port: "{{ routeros_firewall_api_port }}"
    username: "{{ routeros_firewall_api_username }}"
    password: "{{ routeros_firewall_api_password }}"
    tls: "{{ routeros_firewall_api_tls }}"
    validate_certs: "{{ routeros_firewall_api_validate_certs }}"
    path: "ipv6 firewall {{ _routeros_firewall_path }}"
    data: "{{ routeros_firewall_rules['ipv6-' ~ _routeros_firewall_path] | default([], true) }}"
    handle_absent_entries: remove
    handle_entries_content: remove_as_much_as_possible
    ensure_order: "{{ routeros_firewall_ordered[_routeros_firewall_path] | default(true) }}"
  register: _routeros_firewall_audit_results_v6
  check_mode: "{{ not (routeros_firewall_enforce | bool) }}"
  diff: true
  loop: "{{ routeros_firewall_ipv6_paths }}"
  loop_control:
    loop_var: _routeros_firewall_path
    label: "ipv6 firewall {{ _routeros_firewall_path }}"
  delegate_to: localhost
  when: routeros_firewall_ipv6_paths | length > 0

- name: Summarize per path
  ansible.builtin.debug:
    msg: |-
      {{ 'Enforce' if (routeros_firewall_enforce | bool) else 'Drift' }}
      summary for {{ inventory_hostname }}
      ({{ 'changes applied' if (routeros_firewall_enforce | bool) else 'no writes' }}):
      {% for r in (_routeros_firewall_audit_results_v4.results | default([])) +
                  (_routeros_firewall_audit_results_v6.results | default([])) %}
        {{ r._routeros_firewall_path }}: changed={{ r.changed }}
      {% endfor %}
      {%- if routeros_firewall_enforce | bool %}
      Pre-enforce backup: /flash/{{ _routeros_firewall_backup_stem }}.{backup,rsc}
      {%- else %}
      (Drift exists where changed=true. Run with --diff for per-field before/after.)
      {%- endif %}
