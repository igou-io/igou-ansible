---
# Shared input validation for routeros_firewall. Imported by both
# tasks/main.yml (audit) and tasks/export.yml. Fails the play with
# actionable messages when the consumer's inputs are incomplete or
# the desired-state YAML violates role invariants.
#
# Variables read:
#   routeros_firewall_api_username       (required, non-null)
#   routeros_firewall_api_password       (required, non-null)
#   routeros_firewall                    (dict; per-path rule lists)
#   routeros_firewall_paths              (list of IPv4 sub-paths)
#   routeros_firewall_ipv6_paths         (list of IPv6 sub-paths)
#   routeros_firewall_comment_prefix     (string)
#   _assert_check_desired                (bool; true = also validate desired YAML)

- name: Assert API credentials are supplied
  ansible.builtin.assert:
    that:
      - routeros_firewall_api_username is not none
      - routeros_firewall_api_username | length > 0
      - routeros_firewall_api_password is not none
      - routeros_firewall_api_password | length > 0
    fail_msg: >-
      routeros_firewall_api_username and routeros_firewall_api_password
      must be supplied (typically via inventory group_vars). Got
      username='{{ routeros_firewall_api_username | default("<unset>") }}',
      password='{{ "<set>" if routeros_firewall_api_password else "<unset>" }}'.
    quiet: true

- name: Validate desired-state YAML
  when: _assert_check_desired | default(false) | bool
  block:
    # Compose the lookup keys: IPv4 uses the bare sub-path name, IPv6
    # uses the 'ipv6-<sub>' composite (matches the spec data model).
    - name: Build managed-keys list
      ansible.builtin.set_fact:
        _routeros_firewall_managed_keys: >-
          {{
            routeros_firewall_paths
            + (routeros_firewall_ipv6_paths | map('regex_replace', '^', 'ipv6-') | list)
          }}

    # Flatten every managed rule into one list, each tagged with `_path`
    # so error messages can identify the source sub-path.
    - name: Flatten managed rules across all paths
      ansible.builtin.set_fact:
        _routeros_firewall_flat: >-
          {{
            _routeros_firewall_flat | default([])
            + (
                (routeros_firewall_rules[item] | default([], true))
                | map('combine', {'_path': item})
                | list
              )
          }}
      loop: "{{ _routeros_firewall_managed_keys }}"
      loop_control:
        label: "{{ item }}"

    - name: Find rules with missing or unprefixed comments
      ansible.builtin.set_fact:
        _routeros_firewall_bad_comments: >-
          {{
            _routeros_firewall_flat
            | rejectattr('comment', 'defined')
            | list
            +
            _routeros_firewall_flat
            | selectattr('comment', 'defined')
            | rejectattr('comment', 'match', '^' ~ routeros_firewall_comment_prefix)
            | list
          }}

    - name: Fail if any managed rule lacks the configured prefix
      ansible.builtin.assert:
        that:
          - _routeros_firewall_bad_comments | length == 0
        fail_msg: |-
          Every managed rule's `comment` must start with
          '{{ routeros_firewall_comment_prefix }}'. Offenders (path -> comment):
          {% for r in _routeros_firewall_bad_comments %}
            - {{ r._path }} -> {{ r.comment | default('<missing comment>') }}
          {% endfor %}
        quiet: true

    # Only enforce comment uniqueness on order-sensitive paths
    # (filter/nat/mangle/raw), where `comment` is the de-facto rule
    # identifier. Set-semantic paths like address-list have
    # `(list, address)` as their natural identity, so multiple rows
    # sharing one descriptive comment (e.g. 13× 'ansible: RFC6890',
    # one per subnet in a named list) is correct, not a collision.
    - name: Find duplicate comments per ordered path
      ansible.builtin.set_fact:
        _routeros_firewall_dup_report: >-
          {{
            _routeros_firewall_dup_report | default({}) | combine({
              item: (
                routeros_firewall_rules[item] | default([])
                | selectattr('comment', 'defined')
                | map(attribute='comment')
                | community.general.counter
                | dict2items
                | selectattr('value', 'gt', 1)
                | map(attribute='key')
                | list
              )
            })
          }}
      loop: "{{ _routeros_firewall_managed_keys }}"
      loop_control:
        label: "{{ item }}"
      when: routeros_firewall_ordered[item | regex_replace('^ipv6-', '')] | default(false) | bool

    - name: Fail if duplicate comments exist within any path
      ansible.builtin.assert:
        that:
          - >-
            _routeros_firewall_dup_report | dict2items
            | rejectattr('value', 'equalto', []) | list | length == 0
        fail_msg: |-
          Comments must be unique within each managed path. Duplicates:
          {% for entry in (_routeros_firewall_dup_report | dict2items | rejectattr('value', 'equalto', []) | list) %}
            - {{ entry.key }}: {{ entry.value }}
          {% endfor %}
        quiet: true
