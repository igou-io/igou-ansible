---
# Identity / lifecycle
vm_name: ""
vm_namespace: ""
vm_state: present            # present | absent
# Destructive reprovision: if the VM exists, delete it (and its root DataVolume)
# and rebuild. Attached vm_extra_pvcs data disks are PRESERVED.
vm_rebuild: false
# FULLY destructive: also wipe the attached vm_extra_pvcs data disks (delete +
# recreate blank) for a clean slate. Implies a rebuild. Do NOT use on
# externally-owned PVCs (e.g. an Argo/CDI DataVolume claim like hermes-state).
vm_destroy_data: false
vm_run_strategy: Always      # Always | RerunOnFailure | Manual | Halted | Once
vm_labels: {}

# Root disk: clone from a DataSource (golden cloud image). Clone at the source
# size to avoid CDI smart-clone resize issues; grow online later if needed.
vm_os_datasource: ""                                          # e.g. centos-stream10
vm_os_datasource_namespace: openshift-virtualization-os-images
vm_root_size: 30Gi
vm_storage_class: ""         # empty -> cluster default StorageClass

# Compute. No resources block is emitted -> Burstable QoS (works without a
# CPU-Manager static policy). Use an instancetype upstream for Guaranteed QoS.
vm_cpu_cores: 2
vm_cpu_sockets: 1
vm_cpu_threads: 1
vm_memory: 4Gi

# Firmware: bios | efi (efi uses secureBoot:false; secure boot needs smm).
vm_firmware: bios
vm_machine_type: q35

# Scheduling / placement. All optional and emitted only when set; the caller
# supplies the concrete values (e.g. the casval burst node label + taint). Keeping
# these generic keeps the role free of any node-topology knowledge.
vm_architecture: ""          # spec.template.spec.architecture (e.g. amd64); omitted when empty
vm_node_selector: {}         # spec.template.spec.nodeSelector; omitted when empty
vm_tolerations: []           # spec.template.spec.tolerations; omitted when empty

# Devices (a virtio-rng device is always attached)
vm_log_serial_console: true

# Attach EXISTING PVCs as extra data disks. Plain persistentVolumeClaim volumes
# (NOT dataVolumeTemplates) -> they SURVIVE VM delete/rebuild.
vm_extra_pvcs: []
#   - name: state          # disk/volume name inside the VM
#     claim: hermes-state   # existing PVC claimName

# cloud-init NoCloud userData (string). Empty -> no cloud-init disk attached.
vm_cloud_init: ""

# Wait for the VM to be Ready on converge.
vm_wait: true
vm_wait_timeout: 600
