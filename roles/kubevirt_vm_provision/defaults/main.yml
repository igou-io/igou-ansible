---
# Identity / lifecycle
vm_name: ""
vm_namespace: ""
vm_state: present            # present | absent
vm_rebuild: false            # delete-then-recreate before converge (when present)
vm_run_strategy: Always      # Always | RerunOnFailure | Manual | Halted | Once
vm_labels: {}

# Root disk: clone from a DataSource (golden cloud image). Clone at the source
# size to avoid CDI smart-clone resize issues; grow online later if needed.
vm_os_datasource: ""                                          # e.g. centos-stream10
vm_os_datasource_namespace: openshift-virtualization-os-images
vm_root_size: 30Gi
vm_storage_class: ""         # empty -> cluster default StorageClass

# Compute. No resources block is emitted -> Burstable QoS (works without a
# CPU-Manager static policy). Use an instancetype upstream for Guaranteed QoS.
vm_cpu_cores: 2
vm_cpu_sockets: 1
vm_cpu_threads: 1
vm_memory: 4Gi

# Firmware: bios | efi (efi uses secureBoot:false; secure boot needs smm).
vm_firmware: bios
vm_machine_type: q35

# Devices
vm_rng: true
vm_log_serial_console: true

# Attach EXISTING PVCs as extra data disks. Plain persistentVolumeClaim volumes
# (NOT dataVolumeTemplates) -> they SURVIVE VM delete/rebuild.
vm_extra_pvcs: []
#   - name: state          # disk/volume name inside the VM
#     claim: hermes-state   # existing PVC claimName

# cloud-init NoCloud userData (string). Empty -> no cloud-init disk attached.
vm_cloud_init: ""

# Wait for the VM to be Ready on converge.
vm_wait: true
vm_wait_timeout: 600
