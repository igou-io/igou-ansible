---
# Install phase — runs DURING the egress window (installer needs the network).
# Formats/mounts the persistent state disk, chowns it to the hermes user, then
# runs the Hermes Agent installer as that user. Idempotent throughout.

- name: Create xfs filesystem on the Hermes state device
  community.general.filesystem:
    fstype: xfs
    dev: "{{ hermes_state_device }}"
    force: false   # format only when the device is unformatted
  become: true

- name: Mount the Hermes state device and persist it in fstab
  ansible.posix.mount:
    path: "{{ hermes_state_mount }}"
    src: "{{ hermes_state_device }}"
    fstype: xfs
    opts: defaults
    state: mounted
  become: true

- name: Own the Hermes state mount to the hermes user
  ansible.builtin.file:
    path: "{{ hermes_state_mount }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_user }}"
    recurse: true
  become: true

# Install the host packages the convergence needs, here in the install phase
# because it runs during the egress window (dnf needs the mirrors). configure.yml
# runs with egress LOCKED, so it can only enable nftables, not install it.
#   - acl: Ansible hands become->unprivileged-hermes temp files via POSIX ACLs
#     (setfacl); without it, the broken NFSv4 `chmod A+user:...` fallback fails.
#   - nftables: the centos-stream10 cloud image ships neither the nft binary nor
#     nftables.service, which configure.yml enables for the egress ruleset.
- name: Install host packages the convergence needs (acl, nftables)
  ansible.builtin.package:
    name:
      - acl
      - nftables
    state: present
  become: true

# baseline creates hermes as a service user with /sbin/nologin, but the installer
# (and the agent, which executes shell/Python) needs a real login shell — without
# it `become_user: hermes -i` exits "This account is currently not available."
- name: Ensure the hermes user has a usable login shell
  ansible.builtin.user:
    name: "{{ hermes_user }}"
    shell: /bin/bash
  become: true

- name: Install Hermes Agent as the hermes user
  ansible.builtin.shell:
    # The installer prompts interactively (setup wizard + "install gateway as a
    # service?") and falls back to /dev/tty even with no TTY, hanging under Ansible.
    # --non-interactive --skip-setup runs it unattended (configure.yml writes the
    # cli-config/.env); --skip-browser keeps it non-sudo (hermes_install_skip_browser).
    cmd: >-
      set -o pipefail && curl -fsSL {{ hermes_install_url }}
      | bash -s -- --non-interactive --skip-setup{{ ' --skip-browser' if hermes_install_skip_browser else '' }}
    creates: "{{ hermes_home }}/.local/bin/hermes"
    executable: /bin/bash
  become: true
  become_user: "{{ hermes_user }}"
  # hermes is a service user that may have a nologin shell; -i forces a login
  # shell so the install script gets a sane $HOME/$PATH environment.
  become_flags: '-i'
  changed_when: true   # only runs when 'creates' target is absent

- name: Confirm the Hermes CLI and capture its version
  ansible.builtin.command:
    cmd: "{{ hermes_home }}/.local/bin/hermes --version"
  become: true
  become_user: "{{ hermes_user }}"
  become_flags: '-i'
  register: hermes_version
  changed_when: false

# tirith (pre-exec command scanner) is auto-downloaded from GitHub releases
# (SHA-256 verified) into ~/.hermes/bin. It MUST be fetched here in the egress
# window: at runtime (egress locked) the on-demand auto-install would fail, and
# with security.tirith_fail_open:false that would block every command. We call
# the synchronous _install_tirith — ensure_installed() downloads in a thread
# that dies when python exits, so it does not work for a one-shot invocation.
- name: Install the tirith pre-exec command scanner
  ansible.builtin.shell:
    cmd: >-
      ./venv/bin/python -c "import sys; from tools.tirith_security import _install_tirith;
      sys.exit(0 if _install_tirith(log_failures=True)[0] else 1)"
    chdir: "{{ hermes_home }}/.hermes/hermes-agent"
    creates: "{{ hermes_home }}/.hermes/bin/tirith"
    executable: /bin/bash
  become: true
  become_user: "{{ hermes_user }}"
  become_flags: '-i'
