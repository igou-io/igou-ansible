---
# --- Computer-use readiness ------------------------------------------
# LAB-ONLY tradeoff: Winlogon auto-logon stores the password readably in
# HKLM. Takes effect at next boot; rollout restarts the VM.
- name: Enable console auto-logon for the admin user
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon
    name: "{{ item.name }}"
    data: "{{ item.data }}"
    type: string
  loop:
    - name: AutoAdminLogon
      data: '1'
    - name: DefaultUserName
      data: "{{ windows_computer_use_autologon_user }}"
    - name: DefaultPassword
      data: "{{ windows_computer_use_autologon_password }}"
  no_log: true
  when: windows_computer_use_autologon | bool

- name: Never lock the desktop
  ansible.windows.win_regedit:
    path: "{{ item.path }}"
    name: "{{ item.name }}"
    data: "{{ item.data }}"
    type: "{{ item.type }}"
  loop:
    - path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization
      name: NoLockScreen
      data: 1
      type: dword
    - path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
      name: InactivityTimeoutSecs
      data: 0
      type: dword
    - path: HKCU:\Control Panel\Desktop
      name: ScreenSaveActive
      data: '0'
      type: string
  loop_control:
    label: "{{ item.path }}\\{{ item.name }}"
  when: windows_computer_use_autologon | bool

- name: Never power off the display
  ansible.windows.win_shell: |
    $idle = powercfg /q SCHEME_CURRENT SUB_VIDEO VIDEOIDLE
    if ($idle | Select-String 'Current AC Power Setting Index: 0x00000000') {
      'ok'
    } else {
      powercfg /change monitor-timeout-ac 0
      'changed'
    }
  register: windows_computer_use_monitor
  changed_when: "'changed' in windows_computer_use_monitor.stdout"
  when: windows_computer_use_autologon | bool

# UAC prompts render on a separate secure desktop that screen-driven
# agents can't see or click, so elevation would hang a computer-use run.
# EnableLUA stays 1: MSIX/Store apps (including the Codex app itself)
# refuse to run with UAC fully disabled.
- name: Elevate admins silently, off the secure desktop
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
    name: "{{ item.name }}"
    data: "{{ item.data }}"
    type: dword
  loop:
    - name: ConsentPromptBehaviorAdmin
      data: 0
    - name: PromptOnSecureDesktop
      data: 0
  loop_control:
    label: "{{ item.name }}"
  when: windows_computer_use_quiet_uac | bool

- name: Disable toast notifications for the connect user
  ansible.windows.win_regedit:
    path: "{{ item.path }}"
    name: "{{ item.name }}"
    data: 0
    type: dword
  loop:
    - path: HKCU:\Software\Microsoft\Windows\CurrentVersion\PushNotifications
      name: ToastEnabled
    - path: HKCU:\Software\Policies\Microsoft\Windows\Explorer
      name: EnableNotificationCenter
  loop_control:
    label: "{{ item.path }}\\{{ item.name }}"
  when: windows_computer_use_disable_notifications | bool

# Software-rendered VGA has no GPU to spend on eye candy, and animations/
# fades blur mid-transition screenshots for computer-use agents. The
# UserPreferencesMask value is the "adjust for best performance" set with
# the font-smoothing bit kept ON (ClearType helps vision agents read
# text). Per-user; applies at next logon.
- name: Tune visual effects for performance over appearance
  ansible.windows.win_regedit:
    path: "{{ item.path }}"
    name: "{{ item.name }}"
    data: "{{ item.data }}"
    type: "{{ item.type }}"
  loop:
    - path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects
      name: VisualFXSetting
      data: 2
      type: dword
    - path: HKCU:\Control Panel\Desktop
      name: UserPreferencesMask
      data: hex:90,12,03,80,10,00,00,00
      type: binary
    - path: HKCU:\Control Panel\Desktop
      name: DragFullWindows
      data: '0'
      type: string
    - path: HKCU:\Control Panel\Desktop
      name: MenuShowDelay
      data: '0'
      type: string
    - path: HKCU:\Control Panel\Desktop\WindowMetrics
      name: MinAnimate
      data: '0'
      type: string
    - path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
      name: TaskbarAnimations
      data: 0
      type: dword
    - path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
      name: ListviewAlphaSelect
      data: 0
      type: dword
    - path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
      name: ListviewShadow
      data: 0
      type: dword
    - path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
      name: IconsOnly
      data: 1
      type: dword
    - path: HKCU:\Software\Microsoft\Windows\DWM
      name: EnableAeroPeek
      data: 0
      type: dword
    - path: HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize
      name: EnableTransparency
      data: 0
      type: dword
  loop_control:
    label: "{{ item.path }}\\{{ item.name }}"
  when: windows_computer_use_perf_visuals | bool

# Resolution can only be changed from an interactive session, never over
# WinRM (no desktop attached), so a logon scheduled task pins it in the
# user's own session — deterministic screenshots for computer use, and it
# self-heals whatever an RDP client negotiated previously.
- name: Stage the resolution-pinning script
  ansible.windows.win_copy:
    dest: C:\ProgramData\pin-resolution.ps1
    content: |
      $w = {{ (windows_computer_use_resolution.split('x'))[0] | int }}
      $h = {{ (windows_computer_use_resolution.split('x'))[1] | int }}
      Add-Type @'
      using System;
      using System.Runtime.InteropServices;
      public class Display {
        [DllImport("user32.dll")] public static extern int EnumDisplaySettings(string deviceName, int modeNum, ref DEVMODE devMode);
        [DllImport("user32.dll")] public static extern int ChangeDisplaySettings(ref DEVMODE devMode, int flags);
        [StructLayout(LayoutKind.Sequential, CharSet = CharSet.Ansi)]
        public struct DEVMODE {
          [MarshalAs(UnmanagedType.ByValTStr, SizeConst = 32)] public string dmDeviceName;
          public short dmSpecVersion, dmDriverVersion, dmSize, dmDriverExtra;
          public int dmFields, dmPositionX, dmPositionY, dmDisplayOrientation, dmDisplayFixedOutput;
          public short dmColor, dmDuplex, dmYResolution, dmTTOption, dmCollate;
          [MarshalAs(UnmanagedType.ByValTStr, SizeConst = 32)] public string dmFormName;
          public short dmLogPixels;
          public int dmBitsPerPel, dmPelsWidth, dmPelsHeight, dmDisplayFlags, dmDisplayFrequency;
          public int dmICMMethod, dmICMIntent, dmMediaType, dmDitherType, dmReserved1, dmReserved2, dmPanningWidth, dmPanningHeight;
        }
      }
      '@
      $dm = New-Object Display+DEVMODE
      $dm.dmSize = [System.Runtime.InteropServices.Marshal]::SizeOf($dm)
      [Display]::EnumDisplaySettings($null, -1, [ref]$dm) | Out-Null
      if ($dm.dmPelsWidth -ne $w -or $dm.dmPelsHeight -ne $h) {
        $dm.dmPelsWidth = $w
        $dm.dmPelsHeight = $h
        $dm.dmFields = 0x80000 -bor 0x100000
        [Display]::ChangeDisplaySettings([ref]$dm, 1) | Out-Null
      }
  when: windows_computer_use_resolution | length > 0

# Registered via PS cmdlets, NOT community.windows.win_scheduled_task: the
# module is not idempotent for logon-trigger tasks (it compares the given
# account name against the principal/trigger identity Task Scheduler stores
# in normalized form, so every run reports changed — live-hit by this role's
# molecule idempotence step). The compare below only re-registers when the
# action, run level, enabled state, or logon trigger actually differ.
- name: Pin the display resolution at logon
  ansible.windows.win_shell: |
    $user = '{{ windows_computer_use_autologon_user }}'
    $exe = "$env:SystemRoot\System32\WindowsPowerShell\v1.0\powershell.exe"
    $taskArgs = '-NoProfile -ExecutionPolicy Bypass -File C:\ProgramData\pin-resolution.ps1'
    $name = 'pin-display-resolution'
    $t = Get-ScheduledTask -TaskName $name -ErrorAction SilentlyContinue
    $ok = $false
    if ($t) {
      $logon = @($t.Triggers | Where-Object { $_.CimClass.CimClassName -eq 'MSFT_TaskLogonTrigger' })
      $ok = ($t.Actions.Count -eq 1) -and ($t.Actions[0].Execute -eq $exe) -and ($t.Actions[0].Arguments -eq $taskArgs) -and ($t.Principal.RunLevel -eq 'Highest') -and ($t.Settings.Enabled) -and ($logon.Count -ge 1)
    }
    if ($ok) {
      'ok'
    } else {
      $action = New-ScheduledTaskAction -Execute $exe -Argument $taskArgs
      $trigger = New-ScheduledTaskTrigger -AtLogOn -User $user
      $principal = New-ScheduledTaskPrincipal -UserId $user -LogonType Interactive -RunLevel Highest
      Register-ScheduledTask -TaskName $name -Action $action -Trigger $trigger -Principal $principal -Description 'Managed by Ansible - pin resolution for computer-use determinism' -Force | Out-Null
      'changed'
    }
  register: windows_computer_use_pin_task
  changed_when: "'changed' in windows_computer_use_pin_task.stdout"
  when: windows_computer_use_resolution | length > 0
